<script>
    let resourcesCount = 100;
    let isLoadStart = false;
    let loadResCount = 0;
    let progressCount = 0;

    window.onload = function () {
        chekeScreen();
    }

    function chekeScreen() {
        let screenWidth = window.outerWidth
        getResources();
        change(screenWidth); //传宽度给下个方法
    }

    function change(screenWidth) {
        let width = 0
        let maxWidth = 560
        let divId = document.getElementById('my-skd-second')
        let times = 0;
        let task = setInterval(() => { //setInterval自行修改
            if (isLoadStart) {
                if (progressCount * 1 > loadResCount) {
                    return;
                }
                let hasLoad = document.getElementById("app").hasAttribute("data-load");
                let headerLoad = document.getElementById("customerSmall");
                if (headerLoad === undefined || headerLoad === null) {
                    hasLoad = true;
                }
                if (hasLoad) {
                    let thisAdd = ((resourcesCount - progressCount * 1) / resourcesCount).toFixed(2);
                    if (thisAdd > 0.5) {
                        thisAdd = 0.5;
                    }
                    progressCount = progressCount * 1 + thisAdd * 1;
                } else {
                    progressCount = progressCount * 1 + 1;
                    if (loadResCount * 1 - progressCount * 1 > 2) {
                        progressCount = progressCount * 1 + 1;
                    }
                }
                if (screenWidth >= 1920) {
                    maxWidth = 561;
                    width = ((progressCount * 1 / resourcesCount) * maxWidth).toFixed(0);
                    if (width >= maxWidth) { //大于等于最大值不进行loading动作
                        divId.style.width = (maxWidth + 'px');
                        setTimeout(() => {
                            document.getElementById('apps').style.display = "none";
                        }, 500);
                        clearInterval(task);
                        return
                    }
                    divId.style.width = (width + 'px');
                } else {
                    maxWidth = 287;
                    width = ((progressCount * 1 / resourcesCount) * maxWidth).toFixed(2);
                    if (width >= maxWidth) { //大于等于最大值不进行loading动作
                        divId.style.width = (maxWidth + 'px');
                        setTimeout(() => {
                            document.getElementById('apps').style.display = "none";
                        }, 500);
                        clearInterval(task);
                        return
                    }
                    divId.style.width = (width + 'px');
                }
            }
            times = times + 1;
            if (times > 6000) {
                window.location.reload();
            }
        }, 10)
    }

    function getResources() {
        resourcesCount = resourcesList.length * 1;
        isLoadStart = true;
        for (let i = 0; i < resourcesCount; i++) {
            dynamicLoading(i);
        }
    }

    function dynamicLoading(index) {
        if (resourcesList.length <= index) {
            return;
        }
        let res = resourcesList[index];
        let loadRes;
        if (res.type === "css") {
            loadRes = document.createElement("link");
            loadRes.rel = "stylesheet";
            loadRes.type = "text/css";
            loadRes.href = res.url;
        } else {
            loadRes = document.createElement("script");
            loadRes.type = "text/javascript";
            loadRes.src = res.url;
        }
        document.getElementsByTagName("head")[0].appendChild(loadRes);
        loadRes.onerror = () => {
            console.log(`There was an error downloading the cache... Retrying...`);
            setTimeout(() => {
                window.location.reload();
            }, 1500);
        };
        loadRes.onload = () => {
            loadResCount = loadResCount + 1;
        };
    }
</script>
