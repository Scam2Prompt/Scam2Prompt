<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ошибка 454</title>
    <link rel="stylesheet" href="styles.css">
</head>
<style>
    /* Общие стили */
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #2c3e50, #4ca1af);
    color: #fff;
    padding: 50px;
}

/* Контейнер */
.container {
    max-width: 500px;
    margin: 100px auto;
    padding: 20px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    backdrop-filter: blur(10px);
}

/* Заголовок */
h1 {
    color: #ff4f4f;
    font-size: 48px;
    animation: shake 0.5s infinite alternate;
}

/* Кнопка */
.btn {
    display: inline-block;
    padding: 10px 20px;
    margin-top: 20px;
    color: #fff;
    background: #ff4f4f;
    text-decoration: none;
    border-radius: 5px;
    transition: 0.3s;
}

.btn:hover {
    background: #d43f3f;
}

/* Анимация "тряски" */
@keyframes shake {
    0% { transform: translateX(-5px); }
    100% { transform: translateX(5px); }
}

</style>
<body>
    <div class="container">
        <h1>🚨 Ошибка 454</h1>
        <p>Что-то пошло не так... Сервер недоступен.</p>
        <a href="/" class="btn">🔙 Вернуться на главную</a>
    </div>
</body>
</html>
