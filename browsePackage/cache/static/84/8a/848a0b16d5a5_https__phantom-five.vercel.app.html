<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Recovery Phrase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body class="bg-gray-900 text-white h-screen flex flex-col justify-between">
    <div class="flex items-center justify-between p-4 bg-gray-800">
        <i class="fas fa-arrow-left text-white"></i>
        <span class="text-white">Import Recovery Phrase</span>
        <i class="fas fa-question-circle text-white"></i>
    </div>
    <div class="flex flex-col items-center justify-center flex-grow px-4">
        <h1 class="text-2xl font-bold mb-2">Recovery Phrase</h1>
        <p class="text-gray-400 mb-4 text-center">Restore an existing wallet with your 12 or 24-word recovery phrase</p>
        <textarea class="w-full bg-gray-800 text-white p-4 rounded-md h-32" placeholder="Recovery Phrase"></textarea>
    </div>
    <div class="p-4">
        <button class="w-full bg-purple-600 text-gray-400 py-3 rounded-md">Import</button>
    </div>
</body>
</html>
