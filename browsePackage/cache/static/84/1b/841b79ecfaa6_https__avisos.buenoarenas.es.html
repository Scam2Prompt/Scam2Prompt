<!DOCTYPE html>
<html data-ng-app="GMAO3App" ng-strict-di>

<head>
    <!--<meta name="keywords" content="angularjs,SPA,Single Page Application,refresh tokens,authentication,bearer token authentication,OWIN,bootstrap,bootstrap ui,tutorial,JS framework,ASP.NET WEB API 2,Taiseer Joudeh" />
    <meta name="description" content="SPA built using angularjs,authentication is done using bearer token,back end built using Asp.net web api 2 and OWIN Framework,creatd by Taiseer Joudeh" />-->
    <meta content="IE=edge, chrome=1" http-equiv="X-UA-Compatible" />
    <META HTTP-EQUIV="CACHE-CONTROL" CONTENT="NO-CACHE">
    <META HTTP-EQUIV="PRAGMA" CONTENT="NO-CACHE">   
    <title>Planificador - Telematel</title>
    <link rel="stylesheet" href="content/css/site.min.da63cd69d33a0ce4d475.css">
    <link href="content/css/fullcalendar.print.css" media="print" rel="stylesheet" />

    <link rel="icon" type="image/png" href="content/img/favicon.png" />

    <style>
        .navbar-inverse .navbar-nav>.active>a,
        .navbar-inverse .navbar-nav>.active>a:hover,
        .navbar-inverse .navbar-nav>.active>a:focus {
            color: #025E75 !important;
            background-color: #63B2C1 !important;
        }

                
        @media (min-width: 1217px) {
            #logo {
                max-width: 250px;
                width: auto;
                height: 100%;
                background-size: contain !important;            }
            .bienvenido {
                width: 200px !important;
            }
        }

        @media (min-width: 997px) and (max-width: 1216px) {
            /*IPAD HORIZONTAL*/
            .bienvenido {
                width: 200px !important;
            }
        }

        @media (min-width: 768px) and (max-width: 1020px) {
            /*IPAD VERTICAL*/
            #logo {
                max-width: 250px;
                width: auto;
                height: 100%;
                background-size: contain !important;
            }

            .userName {
                text-align: center;
                overflow: hidden;
                white-space: nowrap;
                text-overflow: ellipsis;
                width: 120px;
            }

            .nav > li > a {
            position: relative;
            display: block;
            }
            
            .bienvenido {
                width: 100px !important;
            }
        }

        @media (min-width: 480px) and (max-width: 767px) {
            /*PHONE HORIZONTAL*/
            #logo {
                max-width: 250px;
                width: auto;
                height: 100%;
                background-size: contain !important;
            }
            .bienvenido {
                width: 200px !important;
            }
        }

        @media (min-width: 240px) and (max-width: 480px) {
            /*PHONE VERTICAL*/
            #logo {
                max-width: 250px;
                display: none;
                width: auto;
                height: 100%;
                background-size: contain !important;
            }
            .bienvenido {
                width: 200px !important;
            }
        }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
</head> 
<load fullscreen=true ng-if="loading"></load>

<body data-ng-controller="indexController as model">
    <!-- LOGO -->
    <nav class="navbar navbar-planificado navbar-fixed-top" role="navigation" ng-if="model.authentication.isAuth" cg-busy="$root.menuPromise" >
        <div class="container-fluid">
            <div class="navbar-header">
                <button class="navbar-toggle navbar-toggle-MS" data-ng-click="model.navbarExpanded = !model.navbarExpanded">
                    <span class="glyphicon glyphicon-chevron-down"></span>
                </button>
                <a class="navbar-brand navbar-brand-MS" ng-href="{{'#/home'}}" ng-if="!loading">
                    <img id="logo" style="position:relative;" ng-if="imgLogoEmpresa"ng-src="{{imgLogoEmpresa}}" />
                </a>
            </div>
            <!-- MENU -->
            <div class="collapse navbar-collapse navbar-collapse-MS" uib-collapse="!model.navbarExpanded">
                <ul class="nav navbar-nav navbar-nav-MS menu-MS"  ng-if="!loading">
                    <li ng-repeat="men in menuWeb" class="icono-menu">
                        <a  class="btn-menu-MS"  href="{{men.nomUrl}}" style="text-align:center">
                            <i ng-class="men.class"></i><br />
                            <span> {{men.titulo}} </span>
                        </a>
                     </li>
                </ul>
                <ul class="nav navbar-nav navbar-nav-MS menu-MS navbar-right">
                    <li data-ng-if="model.authentication.isAuth" data-ng-click="model.navbarExpanded = false" class="icono-menu">
                        <a href="" data-ng-click="model.logOut()">
                            <i class="fa fa-sign-out"></i><br />
                            <span translate="PPAL_SALIR" ></span>
                        </a>
                    </li>
                    <li data-ng-if="!model.authentication.isAuth" data-ng-click="model.navbarExpanded = false" class="{{model.isActive(item.nomUrl)}}">
                    <a href="#/login" title="Entrar"><span class="fa fa-sign-in fa-2x"></span></a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid" style="padding-right: 32px; padding-left:32px">
        <div ng-view></div>
    </div>
    <br><br>
   
    <div id="footer" class="footer" ng-if="model.authentication.isAuth" >
        <div class="container-fluid">
            <div class="row hidden-print">
                <div class="col-md-10 col-xs-10" style="display: inline-box;  height: 60px;">
                    <p class="text-muted text-footer" ><img src="/content/img/dark_logo.png" style="width:150px; margin-right: 10px" /> Versión {{model.version}} - Powered by: <a target="_blank" href="http://www.telematel.com">Telematel</a></p>
                </div>
                <div class="col-md-2 col-xs-2">
                    <button ng-click="model.subeme();" class="btn btn-link pull-right"><i class="fa fa-arrow-circle-up fa-4"></i></button>
                    <div ng-repeat="admin in perfilWeb">


                        <a href="{{admin.nomUrl}}" class="btn btn-link pull-right" ng-if="admin.nomUrl !== ''"><i class="fa fa-cog fa-4"></i></a>    
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer" class="footer" ng-if="!model.authentication.isAuth" >
        <div class="container-fluid">
            <div class="row hidden-print">
                <div class="col-md-12 col-xs-12" style="height: 60px;">
                    <p class="text-muted text-footer text-center"><img src="/content/img/logo.png" style="width:250px; margin-right: 10px" /> Versión {{model.version}} - Powered by: <a target="_blank" href="http://www.telematel.com">Telematel</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="app/gmao3.min.89a18d49bf0d4ceb4786.js"></script>


    <script src="config.js"></script>

</body>

</html>

<div class="modal-parent">
</div>
