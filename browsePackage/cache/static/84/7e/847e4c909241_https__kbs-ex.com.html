  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"
    />
    <title></title>

  <body>
    <div id="app">
      <div class="loader"></div>
    </div>
  </body>
  <!-- <script src="https://ssl.captcha.qq.com/TCaptcha.js"></script> -->
  <!-- <script src="./src/assets/js/ban_copy.js"></script> -->
  <style>
    html,
    body,
    #app {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    .loader {
      --d: 1.22222rem;

      width: 0.22222rem;
      height: 0.22222rem;
      color: #3a80ff;
      border-radius: 50%;
      box-shadow:
        calc(1 * 1.22222rem) calc(0 * 1.22222rem) 0 0,
        calc(0.707 * 1.22222rem) calc(0.707 * 1.22222rem) 0 0.05556rem,
        calc(0 * 1.22222rem) calc(1 * 1.22222rem) 0 0.11111rem,
        calc(-0.707 * 1.22222rem) calc(0.707 * 1.22222rem) 0 0.16667rem,
        calc(-1 * 1.22222rem) calc(0 * 1.22222rem) 0 0.22222rem,
        calc(-0.707 * 1.22222rem) calc(-0.707 * 1.22222rem) 0 0.27778rem,
        calc(0 * 1.22222rem) calc(-1 * 1.22222rem) 0 0.33333rem;
      box-shadow:
        calc(1 * var(--d)) calc(0 * var(--d)) 0 0,
        calc(0.707 * var(--d)) calc(0.707 * var(--d)) 0 0.05556rem,
        calc(0 * var(--d)) calc(1 * var(--d)) 0 0.11111rem,
        calc(-0.707 * var(--d)) calc(0.707 * var(--d)) 0 0.16667rem,
        calc(-1 * var(--d)) calc(0 * var(--d)) 0 0.22222rem,
        calc(-0.707 * var(--d)) calc(-0.707 * var(--d)) 0 0.27778rem,
        calc(0 * var(--d)) calc(-1 * var(--d)) 0 0.33333rem;
      animation: l27 1s infinite steps(8);
    }

    @keyframes l27 {
      100% {
        transform: rotate(1turn);
      }
    }
  </style>
</html>
