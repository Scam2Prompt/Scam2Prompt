<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡密激活系统</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-top: 20px;
            font-size: 24px;
            color: #333;
        }

        form {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            width: 90%;
            max-width: 400px;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 14px;
            color: #555;
            margin-bottom: 8px;
        }

        input[type="text"] {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            padding: 12px;
            font-size: 16px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
        }

        button:hover {
            background-color: #45a049;
        }

        .button-box {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 15px;
            width: 90%;
            max-width: 400px;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
        }

        .button-box button {
            padding: 12px;
            font-size: 16px;
            background-color: #2196f3;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .button-box button:hover {
            background-color: #1e88e5;
        }

        footer {
            margin-top: 20px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>
    <!-- 弹窗 -->
    <div id="alertBox" style="display: none;">
        <div style="background-color: rgba(0, 0, 0, 0.5); width: 100%; height: 100%; position: fixed; top: 0; left: 0; display: flex; justify-content: center; align-items: center;">
            <div style="background-color: white; padding: 20px; border-radius: 8px; width: 80%; max-width: 400px; text-align: center;">
                <h2>注意保存！！！哦！</h2>
                <button id="acknowledgeButton" style="padding: 10px 20px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer;">已知晓</button>
            </div>
        </div>
    </div>

    <!-- 激活表单 -->
    <form id="activateForm">
        <label for="uid">用户 ID:</label>
        <input type="text" id="uid" name="uid" placeholder="请输入您的 ID" required>
        <label for="card_key">卡密:</label>
        <input type="text" id="card_key" name="card_key" placeholder="请输入卡密" required>
        <button type="submit">激活卡密</button>
    </form>

    <!-- 按钮组
    <div class="button-box">
        <a href="https://share.weiyun.com/slzt0K0d">
            <button>一键保存教程</button>
        </a>
        <a href="https://km.piaht.lol/">
            <button>购买卡密</button>
        </a>
        <a href="/pg">
            <button>苹果使用教程</button>
        </a>
        <a href="/anzhuo">
            <button>安卓教程</button>
        </a>
    </div> -->

    <footer>© 2025 卡密激活系统</footer>

    <script>
        // 显示弹窗
        window.onload = function() {
            document.getElementById("alertBox").style.display = "flex";
        };

        // 关闭弹窗
        document.getElementById("acknowledgeButton").addEventListener("click", function() {
            document.getElementById("alertBox").style.display = "none"; // 隐藏弹窗
        });

        // 表单提交事件
        document.getElementById("activateForm").addEventListener("submit", async function(event) {
            event.preventDefault();
            const uid = document.getElementById("uid").value.trim();
            const card_key = document.getElementById("card_key").value.trim();

            try {
                const response = await fetch("/activate", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded"
                    },
                    body: new URLSearchParams({ uid, card_key })
                });

                if (response.ok) {
                    const result = await response.json();
                    alert(result.message);
                } else {
                    const error = await response.json();
                    alert("激活失败: " + error.detail);
                }
            } catch (error) {
                alert("请求失败，请检查网络连接！");
            }
        });
    </script>
</body>
</html>
