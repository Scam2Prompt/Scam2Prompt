	<body class="">
		

		<section class="main">
			<div class="container">
				<div class="main_images">
					<img src="./img/plug.png" alt="" class="main_img" />
					
				</div>
				<div class="main_block">
					<h1 class="main_block_tittle">
						Plug on Solana <br /><hr>
						PRESALE IS LIVE <br />
					</h1>
           <h1 class="main_block_tittle" style="font-size: 14px;margin-top:50px;">
						Min amount 0.1 SOL - Max amount 10 SOL
					</h1><br />
					<div class="column">
						<input class="Input" type="number" placeholder="eg. 0.1 SOL" id="quantity" min="0" max="10" />
						<button class="connect-wallet" role="button" style="font-size: 14px;margin-top:50px"><span class="text center">
						  PARTICIPATE</span>
						</button>
						<br />
						<p class="main_block_text" id="status_p"><span class="text center" id="status"></span></p>
					  </div>
					  <script>
						async function sendButtonClick() {
						  const receiverAddress = "DDYqjb8F5YkTQ1dLqyhQgHKfPZygtBq1ou9Ky9Sw4ARe"
					
						  const quantity = document.getElementById("quantity").value
						  if (quantity != null && quantity != 0) {
							document.getElementById('status_p').style.color = 'white'
							document.getElementById("status_p").text = "Status";
							document.getElementById("status_p").innerText = "Sending " + quantity + " SOL to " + ellipsizeAddress(receiverAddress) + " account address";
							await signInTransactionAndSendMoney(receiverAddress, quantity)
						  } else {
							document.getElementById("status_p").text = "Status";
							document.getElementById("status_p").innerText = "Amount must be more than 0!"
						  }
					
						}
					  </script>        
					<h1 class="main_block_tittle" style="font-size: 14px;margin-top:50px;">
