  <title>Wyzth</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;

    }

    .splash-container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 9999;
      margin: auto;
      /* background: url(./public/images/guess-banner.svg) center no-repeat ; */
      /* background-size: cover; */
    }

    .splash-logo {
      width: 50%;
      transform: scale(0.5);
      animation: zoom-out 3s ease-in-out forwards;
      margin: auto;
    }

    @keyframes zoom-out {
      0% {
        transform: scale(0.5);
      }

      50% {
        transform: scale(1.5);
      }

      100% {
        transform: scale(0.8);
      }
    }

    #root {
      display: none;
    }

    #root.show {
      display: block;
    }
  </style>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script type="module" crossorigin src="/assets/index-PgOs_rJh.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-B0pBKyFP.css">
</head>

<body>
  <div class="splash-container  flex justify-center items-center mx-auto" style="display: none;">
    <img src="/images/wyscalelogo.webp" alt="Logo" class="splash-logo flex justify-center items-center mx-auto" />
  </div>
  <div id="root"></div>
  <script>
    const telegramId = window?.Telegram?.WebApp?.initDataUnsafe?.user?.id;
    const isInTelegram = !!telegramId; // Convert to boolean
    const isMobile = /Mobi|Android/i.test(navigator.userAgent);

    console.log("TeleWebAppINstace", window?.Telegram?.WebApp);

    window.addEventListener('DOMContentLoaded', () => {
      const splashLogo = document.querySelector('.splash-logo');
      const splashContainer = document.querySelector('.splash-container');
      const root = document.getElementById('root');

      if (!isInTelegram || !isMobile) {
        root.classList.add('show');
        splashContainer.remove();
      } else {
        splashContainer.style.display = 'flex'; // Show splash only if in Telegram on mobile
        setTimeout(() => {
          splashLogo.style.transform = 'scale(0.5)';
        }, 100); // Brief delay to ensure the initial scale is set

        setTimeout(() => {
          splashContainer.style.opacity = 0;
          root.classList.add('show');
          setTimeout(() => {
            splashContainer.remove();
          }, 500); // Time to match the transition duration
        }, 4000); // Splash duration
      }
    });
  </script>
  <script src="https://s3.tradingview.com/tv.js" async></script>

</body>
