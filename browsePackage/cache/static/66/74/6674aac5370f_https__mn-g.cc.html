  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <script>
  
      /* if sso - init account settings for user from localStorage using accountId */
      if(getParameterByName('id')){
          initAccountSettings(getParameterByName('id'));
      }
  
      function initAccountSettings(accountId) {
  
          let settingsObj;
          let accountSettingsParsed;
  
          try{
              if(localStorage.accountSettings){
                  settingsObj = JSON.parse(localStorage.accountSettings);
                  accountSettingsParsed = JSON.parse(settingsObj[accountId]);
              }
          }
          catch(e){
              settingsObj = null;
              accountSettingsParsed = {};
          }
  
          // try to find in existing accounts and get data from it
          if(accountSettingsParsed && Object.keys(accountSettingsParsed || {}).length) {
  
              // fill localStorage by saved info
              for(let key in accountSettingsParsed) {
  
                  if(accountSettingsParsed.hasOwnProperty(key)){
  
                      if(typeof accountSettingsParsed[key] === "object") {
                          localStorage[key] = JSON.stringify(accountSettingsParsed[key]);
                      }
                      else {
                          localStorage[key] = accountSettingsParsed[key];
                      }
  
                  }
              }
          }
      }
  
      function getParameterByName(name, url) {
          if (!url) url = window.location.href;
          name = name.replace(/[\[\]]/g, '\\$&');
          var regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)'),
              results = regex.exec(url);
          if (!results) return null;
          if (!results[2]) return '';
          return decodeURIComponent(results[2].replace(/\+/g, ' '));
      }
  </script>
