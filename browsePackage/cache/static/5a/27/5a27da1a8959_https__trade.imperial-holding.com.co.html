        :root {
            --white: #fff;
            --green: #26a69a;
            --red: #f73e4a;
            --blue: #027bff;
            --black: #000000;
            --grey: #415159;
            --prime: #027bff;
            --orange: #f78600;

            --black-400: #3d4e57;
            --black-500: #36454d;
            --black-600: #3d4353;
            --black-700: #2a2e39;
            --black-800: #22252e;
            --black-850: #1e222d;
            --black-900: #131722;

            --grey-0: #f5fafd;
            --grey-10: #e8edf0;
            --grey-50: #dde2e5;
            --grey-75: #d1d5d8;
            --grey-100: #96a4aa;
            --grey-200: #788388;
            --grey-250: #48575e;
            --grey-300: #434d51;
            --grey-400: #ffffff0f;

            --font-size-lg: 12px;
            --font-size-md: 11px;
            --font-size-sm: 10px;
            --font-family: 'Roboto', 'ubuntu';

            --success: var(--green);
            --error: var(--red);
            --attention: var(--orange);
            --info: var(--blue);
        }

        body.dark {

            --main-bg: var(--black);

            --app-background-header: var(--black-800);
            --app-background-section: var(--black-900);
            --app-background-box: var(--black-850);
            --bg-color-secondary: var(--black-600);

            --app-background-dark-x3: var(--black-1000);
            --app-background-dark-x2: var(--black-900);
            --app-background-dark: var(--black-800);
            --app-background: var(--black-700);
            --app-background-light: var(--black-600);
            --app-background-light-x2: var(--black-500);
            --app-background-light-x3: var(--black-400);

            --app-text: var(--grey-75);
            --app-main: var(--grey-75);
            --app-secondary: var(--grey-75);


            --app-color: var(--grey-50);
            --app-color-disabled: var(--grey-100);
            --app-color-label: var(--grey-400);

            --app-border: var(--black-700);
            --app-border-disable: var(--black-600);
            --app-border-active: var(--grey-200);

            --app-icon: var(--white);

            --app-scrollbar-thumb: var(--black-600);

            --input-background: rgba(var(--main-bg), 0.45);
            --input-readonly-background: var(--black-900);
            --input-step-background: var(--black);
            --input-border-default: var(--grey-100);
            --input-border-focus: var(--grey-50);
            --input-border-valid: var(--success);
            --input-border-invalid: var(--error);

            --button-color: var(--white);

            --button-disabled-background: var(--black);

            --tooltip-background: var(--grey-300);

            --modal-background: var(--black-800);

            --modal-title-color: var(--white);

            --notify-box-info-background: var(--info);
            --notify-box-error-background: var(--error);
            --notify-box-success-background: var(--success);
        }
        body.light {
            --main-bg: #ffffff;
            --app-background: var(--grey-10);
            --app-background-header: var(--main-bg);
            --app-background-section: var(--white);
            --app-background-footer: var(--black-700);
            --app-background-odds: var(--black-800);
            --app-background-contrast: var(--black-500);
            --app-background-box: var(--white);
            --app-background-box-active: var(--grey-75);
            --app-background-box-hover: var(--grey-50);
            --bg-color-secondary:var(--grey-75);

            --app-color: var(--black-500);
            --app-color-disabled: var(--grey-100);
            --app-color-label: var(--grey-400);

            --app-border: var(--grey-75);
            --app-border-disable: var(--grey-200);
            --app-border-active: var(--grey-100);

            --app-icon: var(--grey-250);

            --app-selection: var(--blue);

            --app-scrollbar-thumb: var(--grey-50);

            --header-account-bar-background: var(--grey-50);

            --progress-bar-background: var(--grey-75);

            --tab-background: var(var(--main-bg), 0.2);
            --tab-background-hover: rgba(var(--main-bg), 0.45);
            --tab-active-background: var(--app-background-section);
            --tab-active-color: var(--black-700);
            --tab-disabled-color: var(--app-color-disabled);
            --tab-active-border: var(--tab-active-color);

            --checkbox-background: var(--red);
            --checkbox-active-background: var(--prime);
            --checkbox-indicator-background: var(--black-600);

            --input-background: var(--grey-75);
            --input-readonly-background: var(--grey-100);
            --input-step-background: var(--grey-75);
            --input-border-default: var(--grey-100);
            --input-border-focus: var(--grey-50);
            --input-border-valid: var(--success);
            --input-border-invalid: var(--error);

            --button-color: var(--white);
            --button-disabled-background: var(--black);

            --tooltip-background: var(--black-900);
            --tooltip-color: var(--white);

            --link-color: var(--blue);

            --modal-background: var(--white);
            --modal-header-background: var(--black-600);
            --modal-title-color: var(--white);

            --notify-box-info-background: var(--info);
            --notify-box-error-background: var(--error);
            --notify-box-success-background: var(--success);
        }
    </style>
