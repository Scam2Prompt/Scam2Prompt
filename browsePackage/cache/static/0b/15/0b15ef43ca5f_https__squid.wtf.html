<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQUID.WTF - Select the Service</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden; /* Prevent scrollbars by default */
        }

        /* Split screen layout */
        .split {
            height: 100%;
            width: 33.33%; /* Three equal sections */
            position: fixed;
            display: flex;
            justify-content: center;   /* Horizontally center */
            align-items: center;       /* Vertically center */
            flex-direction: column;    /* Stack items vertically */
            top: 0;
            text-align: center;
        }

        .left {
            background-color: #a136fe; /* Deezer side */
            left: 0;
        }
		
		.left img {
		    width: 187px;
            margin-bottom: 20px;
		}
		
		.left a {
		color: black;	
		}

        .middle {
            #background-color: #fac333; /* Debrid side */
			background-color: #66a7c5; /* KHInsider side (New) */
            left: 33.33%; /* Positioned between Deezer and Qobuz */
        }
		
		.middle img {
		    width: 250px;
            margin-bottom: 20px;
		}
		
		.middle a {
		color: black;	
		}

        .right {
            background-color: #000000; /* Qobuz side */
            right: 0;
        }
		
		.right img {
		    width: 100px;
			height: 100px;
            margin-bottom: 20px;
		}
		
		.right a {
		color: white;	
		}

        .split a {
            display: block;
            margin: 10px;
            font-size: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        .split a:hover {
            text-decoration: underline;
        }
		
		/* Responsive Layout */
        @media screen and (max-width: 768px) {
            /* Reset fixed positioning for mobile */
            .split {
                width: 100%;
                height: 100vh; /* Each section takes full viewport height */
                position: relative; /* Allow stacking */
                top: auto;
                left: auto;
                right: auto;
            }

            /* Flex container for mobile */
            .mobile-container {
                display: flex;
                flex-direction: column;
                height: 100%;
            }

            /* Ensure no gaps between sections */
            .mobile-container .split {
                flex: 1; /* Each section takes equal height */
                min-height: 100vh; /* Ensure full height */
            }

            /* Enable scrolling on mobile */
            body, html {
                overflow-y: auto; /* Allow vertical scrolling */
            }
        }
    </style>
</head>
<body>

<!-- Mobile Container (for stacking sections) -->
<div class="mobile-container">
    <!-- Left Side (Deezer) -->
    <div class="split left">
        <img src="/assets/deezer-logo.png" alt="Deezer Logo">
        <div>
            <a href="https://eu.deezer.squid.wtf/">Europe</a>
            <a href="https://us.deezer.squid.wtf/">North America</a>
        </div>
		<br>
		<p>Information: Deezer doesnt currently work.</p>
    </div>

    <!-- Middle Section (KHInsider) -->
    <div class="split middle">
        <img src="/assets/khinsider-logo.png" alt="KHInsider Logo">
        <div>
            <a href="https://eu.aqua.squid.wtf/">Europe</a>
            <a href="https://us.roxas.squid.wtf/">North America</a>
        </div>
		<br>
		<p>Information: Work in Progress to repair this one.</p>
    </div>

    <!-- Right Side (Qobuz) -->
    <div class="split right">
        <img src="/assets/qobuz-logo.png" alt="Qobuz Logo">
        <div>
            <a href="https://eu.qobuz.squid.wtf/">Europe</a>
            <a href="https://us.qobuz.squid.wtf/">North America</a>
        </div>
		<br>
		<p style="color:white">Information:<br>Our European Server returned.<br>We still need donations for our North American Server.<br><a href="https://lyratris.com/donate/98e5b8d9-befc-4065-8477-567131b36a06" style="color:red">Donate Here</a></p>
    </div>
</div>
</body>
</html>
