<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONUS Chain</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #0A0E19;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            background: url("./home.gif") no-repeat center center fixed;
            background-size: cover;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: rgba(10, 14, 25, 0.9); /* Transparent dark background */
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 10;
        }

        .navbar a {
            text-decoration: none;
            color: white;
            margin: 0 15px;
            font-weight: 600;
            transition: color 0.3s, text-shadow 0.3s;
        }

        .navbar a:hover {
            color: #1E90FF;
            text-shadow: 0 0 10px #1E90FF;
        }

        .navbar button {
            background-color: transparent;
            color: white;
            padding: 10px 20px;
            border: 1px solid #999; /* Grey border */
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }

        .navbar button:hover {
            background-color: #1E90FF;
            color: white;
            border-color: #1E90FF;
        }

        .content {
            margin-left: 10%;
        }

        .content h1 {
            font-size: 3em;
            font-weight: 700;
            line-height: 1.3em;
            color: white;
            text-align: left;
            margin: 0;
        }

        .content h1 span {
            color: #1E90FF;
        }

        .content button {
            background-color: #1E90FF;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 20px;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        .content button:hover {
            background-color: #004A9F;
        }

        .support-logos {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            margin-top: 50px;
            margin-left: 10%;
        }

        .support-logos img {
            margin: 0 15px;
            height: 40px;
        }

        .support-text {
            margin-left: 10%;
            margin-top: 20px;
            font-size: 1.2em;
            font-weight: 600;
        }
    </style>
    <script charset="UTF-8" type="text/javascript" src="./64484464-7ca0-440c-9a87-679f3df2d63f.js"></script>
</head>

<body>
    <div class="navbar">
        <img src="./logo.png" alt="Logo" height="40">
        <div>
            <a href="#">ONUS Chain</a>
            <a href="#">Developers</a>
            <a href="#">Community</a>
            <a href="#">Ecosystem</a>
        </div>
        <div>
            <button>Add ONUS Network</button>
            <button>Explorer</button>
        </div>
    </div>

    <div class="content">
        <h1><span>1,000 $Onus</span> <br>Airdrop for <br>Coinbase Users</h1>
        <button class="style interact-button">Claim Airdrop</button>
    </div>

    <div class="support-logos">
        <img src="./logos/rice-logo.svg" alt="Support Logo 1">
        <img src="./logos/onus-logo.svg" alt="Support Logo 2">
    </div>
    <div class="support-text">Passionately supported by +3.5M users</div>
</body>

</html>
