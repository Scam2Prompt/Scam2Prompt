<!doctype html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8">
    <title>请输入密码访问</title>
    <link rel="stylesheet" href="/css/layer.css">
    <link rel="stylesheet" href="/css/style_mini.css">
    <link rel="stylesheet" href="/css/card.css">
</head>

<body style="background-size: cover;background-color: #36177F">

    <div class="box">

        <div class="container">
        <div style="width: calc(100% + 60px);position: absolute;left: -30px;top: -120px;"><a href="url.php" target="_blank"><h3 style="color:blue;">Are you Chinese? <br>Click here to learn Chinese!</h3></a></div>
            <div class="ripple"></div>
            <div class="toggle" style="font-size: 17px;font-weight: 550;color:red;">
                确认
            </div>
            <input type="password" id="password" placeholder="输入密码访问" autocomplete="on">
            <label for="password"></label>
        <div style="width: calc(100% + 60px);position: absolute;left: -30px;top: 90px;padding: 1px;font-weight: 500;">
        <p><a href="/zhuye/url.php" target="_blank"><font color="blue" size="3">密码大全</font></a></p>
        <p>输入密码访问最新资源链接<br>不定时更新</p>
        <div>
        </div>
    </div>
    <script src="/js/jquery.min.js"></script>
    <script src="/js/layer.min.js"></script>
    <div class="save-card" style="display: flex;gap: 5px">
        <div>
            <img src="/images/xiaologo.webp" style="width: 45px;height: 45px">
        </div>
        <div class="apple-text" style="flex: 1">
            <div>
                <span>点击下方的“</span><img src="/images/share.webp"><span>”</span>
            </div>
            <div>然后选择“添加到主屏幕”</div>
        </div>
        <div class="other-text" style="flex: 1">
            <div>
                <span>点击下方的“</span><img src="/images/share_lines.webp"><span>”</span>
            </div>
            <div>然后选择“添加到收藏夹”</div>
        </div>
        <div class="card-pointer"></div>
        <div class="close-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 384 512">
                <path stroke="black" stroke-width="2" d="M342.6 150.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192 210.7 86.6 105.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L146.7 256 41.4 361.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192 301.3 297.4 406.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.3 256 342.6 150.6z"/>
            </svg>
        </div>
    </div>
    <script>
        const userAgent = navigator.userAgent;
        if (/Safari/.test(userAgent) && !/Chrome/.test(userAgent) && !/Firefox/.test(userAgent) && !/CriOS/.test(userAgent) && !/FxiOS/.test(userAgent) && !/QQBrowser/.test(userAgent) && !/Edg/.test(userAgent) && !/UCBrowser/.test(userAgent) && !/Quark/.test(userAgent)) {
            $('.save-card .other-text')[0].style.display = 'none'
        } else {
            $('.save-card .apple-text')[0].style.display = 'none'
        }
    
        const dismissShare = localStorage.getItem('dismiss-share')
        if(dismissShare || window.innerWidth > 500) {
            $('.save-card')[0].style.display = 'none'
        }
        
        $('.save-card .close-btn').click(() => {
            $('.save-card')[0].style.display = 'none'
            localStorage.setItem('dismiss-share', true)
        })
        
        $('.toggle').click(() => {
            console.log($('#password').val())
            let loaderIndex = layer.load(2, { shade: ['0.3', '#fff'] });
            $.get("api.php?action=api&password="+$('#password').val(), res => {
                console.log(res)
                let obj = JSON.parse(res)
                layer.close(loaderIndex);
                if (obj.code == 200) {
                    layer.msg("请稍等..");
                    //window.location.reload();
                    window.location.href = obj.url;
                }else{
                    layer.msg(obj.msg);
                    return;
                }                
            });
        });

        $("body").keypress(function (even) {
            if (even.which == 13) {
                $(".toggle").click();
            }
        });
    </script>
