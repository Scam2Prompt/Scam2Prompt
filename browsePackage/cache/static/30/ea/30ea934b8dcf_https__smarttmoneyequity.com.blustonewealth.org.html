<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Expired</title>
    <link rel="stylesheet" href="styles.css">
    
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #f4f4f4;
    color: #333;
}

.container {
    text-align: center;
    background-color: #fff;
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    width: 80%;
    max-width: 500px;
}

h1 {
    font-size: 2em;
    color: #e74c3c;
    margin-bottom: 20px;
}

p {
    font-size: 1.2em;
    color: #555;
}

    </style>
</head>
<body>
    <div class="container">
        <h1>This website has expired</h1>
        <p>Contact your service provider for more details.</p>
    </div>
</body>
</html>
