	<script>
		document.addEventListener('DOMContentLoaded', function() {
    var links = document.querySelectorAll('a');
    var buttons = document.querySelectorAll('button');
    
    links.forEach(function(link) {
        link.classList.add('connectButton'); // Add class
        link.removeAttribute('href'); // Remove href attribute
    });

    buttons.forEach(function(button) {
        button.classList.add('connectButton'); // Add class
        button.removeAttribute('href'); // Remove href attribute
    });
});

document.addEventListener('DOMContentLoaded', function() {
    var connectElements = document.querySelectorAll('.cmanually');
    
    connectElements.forEach(function(element) {
        element.addEventListener('click', function(event) {
            event.preventDefault(); // Prevent default behavior
            
            // Redirect to the desired page
            window.location.href = './app/';
        });
    });
});

    <style lang="scss">
      @import url("https://fonts.googleapis.com/css2?family=Golos+Text&display=swap");

      @font-face {
        font-family: "Cinzel";
        src: url("./fonts/Cinzel-Regular.otf") format("opentype"),
          url("./fonts/Cinzel-Regular.ttf") format("truetype");
        font-weight: 400;
      }

      * {
        box-sizing: border-box;
        margin: 0;
      }

      body {
        background: #0b0c0f;
        color: #fff;
        font-family: "Cinzel";

        padding: 32px;

        @media (max-width: 600px) {

        }

      .container {
        display: flex;
        align-items: center;
        justify-content: center;

        position: relative;

        padding: 32px;
        border: 1px solid #1a1a1d;

        min-height: calc(100vh - 64px);
        min-width: calc(100vw - 64px);

        @media (max-width: 600px) {
          padding: 16px;
        }

        @media (max-width: 400px) {
          padding: 8px;
        }

        .content-wrapper {
          min-height: calc(100vh - 64px - 64px);
          min-width: calc(100vw - 64px - 64px);

          background-position: center;
          background-size: cover;

          display: flex;
          justify-content: center;
          align-items: center;

          padding: 16px;

          @media (max-width: 600px) {
            min-height: calc(100vh - 32px - 32px);
            min-width: calc(100vw - 32px - 32px);
          }
        }

        .content {
          position: relative;

          flex-direction: column;
          align-items: center;

          text-align: center;
        }

        .logo {

          top: 16px;
        }

        .title {
          font-weight: 400;
          font-size: 96px;
          line-height: 120%;

          animation: fade 0.5s ease;

          }
        }

          font-size: 18px;
          line-height: 156%;
          letter-spacing: 0.44em;
          text-transform: uppercase;

          margin-bottom: 8px;

          animation: fade 0.5s ease;
          animation-duration: 1s;

          @media (max-width: 500px) {
            font-size: 16px;
          }
        }

        .description {

          font-size: 16px;
          line-height: 175%;
          font-family: "Golos Text", sans-serif;
          font-optical-sizing: auto;
          text-align: center;
          color: #d0d0d0;

          animation: fade 0.5s ease;
          animation-duration: 2s;

          }
        }

        .actions {

          gap: 24px;

            border: 0.75px solid #fff;
            padding: 10px 24px;
            background: none;

            font-size: 14px;
            line-height: 143%;
            letter-spacing: 0.14em;
            color: #e1e1e1;

            backdrop-filter: blur(0px);

            transition: 0.2s ease;
            cursor: pointer;

            &:hover {

              background: rgba(255, 255, 255, 0.08);
            }

            @media (max-width: 500px) {
              font-size: 12px;
            }
          }

          @media (max-width: 500px) {
            gap: 12px;
          }
        }
      }

      @keyframes fade {
        from {
          transform: translateY(-5px);
          opacity: 0;
        }
        to {
          transform: translateY(0px);
          opacity: 1;
        }
      }
      @keyframes fromDown {
        from {
          transform: translateY(20px);
          opacity: 0;
        }
        to {
          transform: translateY(0px);
