			.navbar {
      position: fixed;

      left: -40000px; /* 隐藏导航栏 */

      z-index: 99999;
      background-color: #fff;

      padding: 16px;
      background-color: #fff;
    }
    
    .nav-list {

    	font-size: 16px;
    	color: #000;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.6); /* 设置阴影的颜色和透明度 */
      display: none;
      z-index: 100; /* 设置阴影的层级，比导航栏低 */
    }
    
    .navbar.show + .overlay {
      display: block; /* 导航展开时显示阴影 */
    }

        font-weight: 900;
    }
        ul li1 {

    }

    footer {

        background-color: #00b4ff;

    * {
        margin: 0;
        padding: 0;
    }

    #wrap {
        width: 100%;
        height: 60px;
        position: relative;
        overflow: hidden;
    }

    #list {
        position: absolute;
        -webkit-animation: 30s move infinite linear;
        width: 600%;
    }

    #list li {
        list-style: none;
        float: left;
        margin: 0 5px;
    }

    @-webkit-keyframes move {
        0% {
            left: 0;
        }
        100% {
            left: -500px;
        }
    }

    @keyframes move {
        0% {
            left: 0;
        }
        100% {
            left: -500px;
        }
    }

    #wrap:hover #list {
        -webkit-animation-play-state: paused; /*动画暂停播放*/
    }
    #list img{
        width: 50px;
    }
