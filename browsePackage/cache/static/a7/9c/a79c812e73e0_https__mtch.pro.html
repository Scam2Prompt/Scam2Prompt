<script>
    $(window).on('resize', () => {
        bodyHeight = $('body').height();
        contentHeight = $('.content').height(); 
        if (contentHeight <= bodyHeight || contentHeight <= window.screen.height || window.innerHeight == screen.height) {
            $('body')[0].style.height = '100vh';
        } else {
            $('body')[0].style.height = '100%';
        }
    })

    $(document).on('scroll', () => {
        bodyHeight = $('body').height();
        contentHeight = $('.content').height(); 
        if (contentHeight >= bodyHeight) {
            $('body')[0].style.height = '100%';
        } else {
            $('body')[0].style.height = '100vh';
        }
    });
</script>

<script>
    function getCookie(name) {
        var dc = document.cookie;
        var prefix = name + "=";
        var begin = dc.indexOf("; " + prefix);
        if (begin == -1) {
            begin = dc.indexOf(prefix);
            if (begin != 0) return null;
        }
        else
        {
            begin += 2;
            var end = document.cookie.indexOf(";", begin);
            if (end == -1) {
            end = dc.length;
            }
        }
        return decodeURI(dc.substring(begin + prefix.length, end));
    }
</script>
<script>
    async function isLocalUserExists(tgID) {
        data = { 'tg_id': tgID };
        const response = await fetch(`/api/is-local-user-exists`, {
            method: 'POST',
            headers: {
                "X-CSRFToken": getCookie("csrftoken"),
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
        return await response.json();
    }

    async function loginUser(tgID) {
        data = { 'tg_id': tgID };
        const response = await fetch(`/api/login-user-by-telegram-id`, {
            method: 'POST',
            headers: {
                "X-CSRFToken": getCookie("csrftoken"),
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
        return await response.json();
    }
</script>
<script>
    let tg = window.Telegram.WebApp;
    const telegramID = tg.initDataUnsafe.user.id;
    window.addEventListener('load', async () => {
        isUserExists = await isLocalUserExists(telegramID);
        if (isUserExists['result'] != null) {
            if (isUserExists['result']['logout_status']) {
                return;
            }
            let loginResponse = await loginUser(telegramID);
            if (loginResponse['result'] == 'new') {
                document.location.replace('/start-form/');
            } else if (loginResponse['result']) {
                document.location.replace('/');
            } else {
                alert('Ошибка авторизации!');
            }
        }
    });
</script>

<script>
    let currentUserSMSCodeInput;

    async function sendEmailSMS(email) {
        data = { 
            'email': email
        };
        const response = await fetch(`/api/send-sms-message`, {
            method: 'POST',
            headers: {
                "X-CSRFToken": getCookie("csrftoken"),
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
        return await response.json();
    }

    async function checkSMSCode(email, smsCode) {
        data = { 
            'email': email,
            'code': smsCode
        };
        const response = await fetch(`/api/check-sms-code`, {
            method: 'POST',
            headers: {
                "X-CSRFToken": getCookie("csrftoken"),
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
        return await response.json();
    }

    async function loginRequest(email) {
        data = { 
            'email': email,
        };
        const response = await fetch(`/api/login-request`, {
            method: 'POST',
            headers: {
                "X-CSRFToken": getCookie("csrftoken"),
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
        return await response.json();
    }

    function showInputCodeField() {
        $('.main #smsCodeField').show();
        $('.main #smsCodeField')[0].style.height = '100vh';
    }

    function hideInputCodeField() {
        $('.main #smsCodeField').hide();
    }

    $('.login-form form').on('submit', async (event) => {
        event.preventDefault(); 

        let email = $('#loginInput').val();
        let sendEmailResponse;
        try {
            sendEmailResponse = await sendEmailSMS(email);
        } catch (e) {
            console.log(e);
        }
        
        if (sendEmailResponse['result']) {
            showInputCodeField();
        } else {
            $('#loginInput').val('');
            $('#loginInput')[0].placeholder = 'Ошибка! Некорректная почта';
            $('#loginInput')[0].style.border = '1px solid red';
            $('#loginInput')[0].style.background = 'rgb(255 177 166 / 50%)';
            $('form .arrow-circle')[0].style.background = '#ffa6a6';
        }
    });

    // Focus at the first sms-code-input-field
    $('#smsCodeField .input-sms-code .sms-code-symbol')[0].focus();

    $('#smsCodeField .input-sms-code .sms-code-symbol').on('focus', (event) => {
        for (let el of $('#smsCodeField .input-sms-code .sms-code-symbol')) {
            if ($(el).val().length == 0) {
                $(el).removeClass('active');
            }
        }
        $(event.currentTarget).addClass('active');
    });

    $('#smsCodeField .input-sms-code .sms-code-symbol').on('blur', (event) => {
        if ($(event.currentTarget).val().length == 0) {
            $(event.currentTarget).removeClass('active');
        }
    });
    $('#smsCodeField .input-sms-code .sms-code-symbol').on('keydown', async (event) => {
        if (event.keyCode == 8) {
            event.preventDefault();

            let newFocusElem;
            for (let el of $('#smsCodeField .input-sms-code .sms-code-symbol')) {
                if ($(el).val().length != 0 && el != event.currentTarget) {
                    newFocusElem = el;
                } else if (el == event.currentTarget) {
                    $(event.currentTarget).val('');
                }
            }
            if (newFocusElem) {
                newFocusElem.focus();
            }
            return;
        }

        let isNumber = isFinite(event.key) && event.key !== ' ';
        if ($(event.currentTarget).val().length == 1 && isNumber || event.keyCode == 190 || event.keyCode == 188) {
            event.preventDefault();
        }
        ["e", "E", "+", "-"].includes(event.key) && event.preventDefault();

        for (let el of $('#smsCodeField .input-sms-code .sms-code-symbol')) {
            if ($(el).val().length == 0) {
                $(el).focus();
                event.preventDefault();
                $(el).val(event.key);
                break;
            }
        }

        let checkAllDone = true;
        let inputSMSCode = '';
        for (let el of $('#smsCodeField .input-sms-code .sms-code-symbol')) {
            if ($(el).val().length == 0) {
                checkAllDone = false;
                break;
            }
            inputSMSCode += $(el).val();
        }
        if (checkAllDone) {
            if (inputSMSCode != currentUserSMSCodeInput) {
                let email = $('#loginInput').val();
                currentUserSMSCodeInput = inputSMSCode;
                let checkResponse = await checkSMSCode(email, inputSMSCode);
                if (checkResponse['result'] && checkResponse['sms_code_status']) {
                    let loginResponse = await loginRequest(email);
                    if (loginResponse['result']) {
                        window.location.replace('/start-form/');
                    }
                } else if (checkResponse['result'] && !checkResponse['sms_code_status']) {
                    for (let el of $('#smsCodeField .input-sms-code .sms-code-symbol')) {
                        $(el)[0].style = 'border: 3px solid red!important';
                    }
                }
            }
        }
    })

    
    $('#smsCodeField #sendCodeRefresh').on('click', async () => {
        let email = $('#loginInput').val();
        try {
            sendEmailResponse = await sendEmailSMS(email);
        } catch (e) {
            console.log(e);
        }
        
        if (sendSmsResponse['result']) {
            showInputCodeField();
        }

        $($('#smsCodeField .text')[0]).text('Повторно отправили код на Вашу почту');
        $('#smsCodeField .small-text')[0].innerHTML = 'Не приходит код? Попробуйте <button class="btn" id="changePhone">сменить почту</button>';

        $('#smsCodeField #changePhone').on('click', () => {
            hideInputCodeField();
        });
    });
    $('#smsCodeField #changePhone').on('click', () => {
        hideInputCodeField();
    });
</script>
