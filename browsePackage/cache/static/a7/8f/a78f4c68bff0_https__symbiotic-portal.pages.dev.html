  <style>
    body {
      background-color: #080404;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .container img {
      max-width: 80%;
      height: auto;
    }

    .loader {
      width: 48px;
      height: 48px;
      display: inline-block;
      position: relative;
    }

    .loader::after,
    .loader::before {
      content: '';
      box-sizing: border-box;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #FFF;
      position: absolute;
      left: 0;
      top: 0;
      animation: animloader 2s linear infinite;
    }

    .loader::after {
      animation-delay: 1s;
    }

    @keyframes animloader {
      0% {
        transform: scale(0);
        opacity: 1;
      }

      100% {
        transform: scale(1);
        opacity: 0;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="SYMBIOTIC-PORTAL.svg" alt="Symbiotic | Early Access Portal">
    <br>
    <div class="loader"></div>
  </div>
  <script>
    setTimeout(function () {
      window.location.href = "https://early.symbiotiic.live";
      }, 5000);
  </script>
</body>
