<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Connect</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="./assets/images/tlogo.png">
</head>
</head>
<body>
        <!-- Video Background -->
    <div class="video-container">
        <video autoplay muted loop class="bg-video">
            <source src="./assets/images/02.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="video-logo">
            <img src="./assets/images/logo-1.png" alt="Logo" />
        </div>
        <div class="content-container">
            <!-- Caption -->
            <div class="caption">
                <h1>Stay Connected, Stay Informed </h1>
                <p>– Your Gateway to Seamless Client Communication.</p>
            </div>

            <!-- Login Window -->
            <div class="login-container">
                <form class="login-form" method="post">
                    <h2>Login</h2>
                    <input type="text" name="un" placeholder="Username" class="input-field">
                    <input type="password" name="pas" placeholder="Password" class="input-field">
                    <button type="submit" class="login-button">Login</button>
                                    </form>
            </div>
        </div>
    </div>

</body>
</html>
