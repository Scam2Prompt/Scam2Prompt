        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;

        .main {
            margin: 0 15px;
            max-width: 800px;
            width: 100%;
            font-family: Arial, Helvetica, sans-serif;
            filter: blur(0.3px);
            color: #262626;
        }

        .logo {
            background-image: url('/pictures/white.png');
            width: 190px;
            height: 120px;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
        }


        .title {
            font-weight: 600;
            font-family: Arial;
            font-size: 38px;
            margin-top: 5px;
        }


        .spinner {
            color: #6aa2fd;
            position: absolute;
            margin-top: 20px;
            margin-left: 10px;
            border: 5px solid #F9F9F9;
            width: 25px;
            height: 25px;
            border-radius: 80%;
            border-left-color: #6aa2fd;
            animation: spin 0.7s infinite linear;
            display: none;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .smalltitle {
            margin-top: -8px;
            font-size: 21px
        }

        .recaptcha {
            display: flex;
            width: 301.6px;
            height: 75.6px;
            border-radius: 3px;
            border: 1px solid #d3d3d3;
            background-color: #F9F9F9;
            margin-top: 40px;
        }

        .checkboxcontainer {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 100%;
            margin: 0 12px 2px 12px;
        }

        .checkbox {
            -webkit-border-radius: 2px;
            -moz-border-radius: 2px;
            border-radius: 2px;
            background-color: #fff;
            border: 2px solid #c1c1c1;
            font-size: 1px;
            height: 24px;
            position: absolute;
            width: 24px;
            z-index: 1;
        }

        .recaptcha:hover .checkbox {
            box-shadow: inset 0 1px 1px rgba(0, 0, 0, .1);
            border: 2px solid #b2b2b2;
            cursor: default;
        }

        .textblock {
            display: flex;
            height: 100%;
            width: 152px;
            align-items: center;
            margin-left: -5px;
        }

        .span {
            font-family: Roboto, helvetica, arial, sans-serif;
            font-size: 14px;
            font-weight: 400;
            line-height: 17px;
            font-size: 15px;
            margin-bottom: -3px;
            user-select: none;
        }

        .blockcontainer {
            display: flex;
            justify-content: right;
            height: 100%;
            width: 50%;
        }

        .logoblock {
            display: flex;
            flex-direction: column;
            width: 70px;
            height: 100%;
            padding-top: 4px;
            margin-right: 4px;
            align-items: center;
            justify-content: center;
        }

        .logo {
            background: url(images/logo_48.png);
            background-repeat: no-repeat;
            background-size: 32px;
            height: 32px;
            margin: 0 13px 0 13px;
            width: 32px;
            margin-bottom: 7px;
        }

        .text {
            cursor: default;
            font-family: Roboto, helvetica, arial, sans-serif;
            font-size: 9.5px;
            font-weight: 400;
            line-height: 10px;
            text-align: center;
        }

        .smalltext {
            color: #555;
            font-family: Roboto, helvetica, arial, sans-serif;
            font-size: 8px;
            font-weight: 400;
            display: inline;
            padding-left: 1px;
            padding-right: 1px;
            padding-top: 2px;
            padding-bottom: 4px;
        }

        .link {
            text-decoration: none;
            color: #555;
        }

        .link:hover {
            text-decoration: underline;
            color: #555;
        }

        @keyframes checkmark-animation {
            from {

            }

<body>
    <div class="main">
        <!-- Domain -->
        <h1 class="title">atheneai.network</h1>
        <h3 class="smalltitle">Verifying you are human. This may take a few seconds.</h3>
        <div class="recaptcha" id="recaptcha">
            <div class="checkboxcontainer">
                <div class="checkbox" id="checkbox"></div>
            </div>
            <div class="textblock">
                <div class="span">I'm not a robot</div>
            </div>
            <div class="blockcontainer">
                <div class="logoblock">
                    <div class="logo"></div>
                    <div class="text">reCAPTCHA</div>
                    <div class="smalltext">
                        <a href="https://policies.google.com/privacy?hl=en" target="_blank" class="link">Privacy</a> 
                        -
                        <a href="https://policies.google.com/terms?hl=en" target="_blank" class="link">Terms</a>
                    </div>
                </div>
            </div>
            <div class="spinner" id="spinner"></div>
            <div class="checkmark" id="checkmark"></div>
        </div>
        <div class="h3" id="domainText">
            atheneai.network needs to review the security of your connection before proceeding.
        </div>

        <form method="post" id="captcha-form"></form>
    </div>

    <script type="70be495d9aab64db9f8a0050-text/javascript">
        document.addEventListener('DOMContentLoaded', function () {
            const captchaForm =document.getElementById("captcha-form");
            const recaptcha = document.getElementById('recaptcha');

            recaptcha.addEventListener('click', function () {
                const checkbox = document.getElementById('checkbox');
                const spinner = document.getElementById('spinner');
                
                checkbox.style.display = 'none';
                spinner.style.display = 'block';

                setTimeout(function () {
                    const checkmark = document.getElementById('checkmark');

                    spinner.style.display = 'none';
                    checkmark.style.display = 'block';

                    setTimeout(function () {
                        captchaForm.submit();
                    }, 1000);
                }, 2000);
            });


            const blockElement = document.getElementById('block');
            if (blockElement) {
                blockElement.addEventListener('click', function () {
                    this.style.display = 'none';
                    document.getElementById('spinner').style.display = 'block';
                });
            }
        });
    </script>
