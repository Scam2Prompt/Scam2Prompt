<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HW</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="/assets/a/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto&display=swap">
    <link href="https://fonts.googleapis.com/css?family=Montserrat&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            border: none;
            outline: 0;
            font-family: Montserrat, sans-serif;
            user-select: none;
            color: #fff
        }

        #root {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            width: 100%;
            height: 100%;
            background-color: #20262c
        }

        .main {
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .popup_content {
            width: 250px;
            padding: 30px 50px;
        }

        input[type=password], input[type=text] {
            width: calc(100% - 22px);
            height: 34px;
            margin-bottom: 10px;
            padding-left: 20px;
            border-bottom: 1px solid #26988b;
            background-color: #20262c;
            transition: .2s;
            outline: 0;
            font-family: Montserrat
        }

        input[type=password]::placeholder, input[type=text]::placeholder {
            font-size: 12px;
            color: #26988b;
            text-transform: none
        }

        input[type=password]:focus, input[type=text]:focus {
            border-color: #fff
        }

        .btn {
            width: 100px;
            height: 30px;
            margin: 15px auto 0 auto;
            padding: 0 15px;
            border: 1px solid #248d82;
            border-radius: 3px;
            text-align: center;
            line-height: 30px;
            font-size: 12px;
            background-color: #248d82;
            box-shadow: 0 5px 25px rgba(0, 0, 0, .4);
            cursor: pointer;
            transition: .2s
        }

        .btn:hover {
            background-color: #26988b;
            border-color: #26988b
        }

        #message {
            font-size: 12px;
            color: #b61920;
            text-align: center;
            transition: 0.3s;
            height: 0;
            overflow: hidden;
        }

        .wrong input {
            border-color: #c20c0c
        }
    </style>
</head>
<body>
<div id="root" class="auth">
    <div class="main">
        <div class="popup_content">
            <form>
                <input type="text" placeholder="Login..." id="login" autocomplete="off" maxlength="64">
                <input type="password" placeholder="Password..." id="password" maxlength="64">
                <div id="message"></div>
                <div class="btn" id="submit_btn">Submit</div>
            </form>
        </div>
    </div>
</div>
