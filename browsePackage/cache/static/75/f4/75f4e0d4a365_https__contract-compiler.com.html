<style>
    /*
Sky: #081f35; 
White : #fefefe;
Neck, gloves, pant : #dee7de;
Back & belly : #b5cebe;
Glass : #0c294d;
Reflect : #18426b;
*/

/*	Body General	*/
body{margin:0;width: 100%;height: 100%;background: #081f35;}

/*	Astronaut border 	*/
.astronaut{position: absolute;left:30%;top:10%;transform:rotate(-10deg);z-index:1;-webkit-animation: turn 20s infinite;animation: turn 20s infinite;}

/*	Head 	*/
.head{position: absolute;width: 100px;height: 100px;border-radius: 50px;background: #fefefe;overflow: hidden;}
.head .glass{position: absolute;width: 100px;height: 100px;border-radius: 50px;left:10px;top:5px;background: #0c294d;overflow: hidden;-webkit-animation: glass 20s infinite;animation: glass 20s infinite;}
.head .glass .reflect{position: absolute;background: #18426b;width: 80px;height: 100px;transform:rotate(35deg);left:-30px;top:-30px;}

/*	Neck 	*/
.neck{position: absolute;background: #dee7de;width: 90px;height: 10px;border-radius: 20px;top:90px;left:5px;z-index:20;}

/*	Chest 	*/
.chest{position: absolute;background: #fefefe;width: 110px;height: 140px;border-radius: 50px 50px 5px 5px;top:90px;left:-5px;z-index:19;box-sizing:border-box;}
.chest .face-panel{background: #b5cebe;width: 70px;height: 60px;margin: auto;margin-top:50px;}

/*	Back 	*/
.back{position: absolute;background: #b5cebe;width: 135px;height: 120px;border-radius: 10px;top: 100px;left: -18px;}

/*	Arm  	*/
.arm{position: absolute;}

/*	Arm left 	*/
.arm.left{top:100px;left: 12px;transform:rotate(80deg);transform-origin: 0 0;z-index: 20;-webkit-animation: armDownLeft 20s infinite;animation: armDownLeft 20s infinite;}
.arm.left .top-arm{background: #fefefe;width: 20px;height: 80px;}
.arm.left .bottom-arm{background: #fefefe;width: 20px;height: 70px;transform:rotate(-40deg);transform-origin: 0 0;margin:0px 0 0 -2px;border-radius: 5px 5px 0 0;}

/*	Hand left 	*/
.arm.left .hand-left{position: relative;background: #dee7de;width: 20px;height: 20px;margin-top:-39px;margin-left: 50px;transform:rotate(50deg);transform-origin: 0 0;z-index:16;}
.arm.left .finger{position: relative;background: #dee7de;width: 15px;height: 5px;border-radius: 20px; margin-top:8px;margin-left: 55px;transform:rotate(65deg);transform-origin: 0 0;}
.arm.left .fingers{position: relative;background: #dee7de;width: 20px;height: 30px;border-radius: 15px;margin-top: -22px;margin-left: 50px;transform: rotate(-50deg);}

/*	Arm right 	*/
.arm.right{top:120px;left: 82px;transform:rotate(-95deg);transform-origin: 0 0;z-index:20;-webkit-animation: armDownRight 20s infinite;animation: armDownRight 20s infinite;}
.arm.right .top-arm{background: #fefefe;width: 20px;height: 80px;}
.arm.right .bottom-arm{background: #fefefe;width: 20px;height: 70px;transform:rotate(-40deg);margin:-15px 0 0 18px;border-radius: 5px 5px 0 0;}

/*	Hand right 	*/
.arm.right .hand-right{position: relative;background: #dee7de;width: 20px;height: 20px;margin-top:-24px;margin-left: 50px;transform:rotate(50deg);transform-origin: 0 0;z-index:16;}
.arm.right .finger{position: relative;background: #dee7de;width: 15px;height: 5px;border-radius: 20px; margin-top:5px;margin-left: 52px;transform:rotate(65deg);transform-origin: 0 0;}
.arm.right .fingers{position: relative;background: #dee7de;width: 20px;height: 30px;border-radius: 15px;margin-top: -22px;margin-left: 47px;transform: rotate(-50deg);}

/*	Bottom 		*/
.bottom{position: absolute;background: #dee7de;width: 110px;height: 80px;border-radius: 0 0 80px 80px;overflow: hidden;top:210px;left:-5px;z-index:18;}
.bottom .belt{background: #b5cebe;width: 110px;height: 15px;margin-top: 20px;}
.bottom .line{background: #b5cebe;width: 110px;height: 5px;margin-top: 5px;}

/*	leg 	*/
.leg{position: absolute;}

/*	leg left	*/
.left{-webkit-animation: legLeft 20s infinite;animation: legLeft 20s infinite;}
.left .pant{position: absolute;background: #fefefe;width: 45px;height: 60px;border-radius:0 0 10px 10px;top: 255px;transform:rotate(30deg);transform-origin: 0 0;z-index:17;}
.left .tibia .one{position: absolute;background: #dee7de;width: 35px;height: 30px;top:305px;left: -23px;border-radius: 0 0 10px 10px;transform:rotate(30deg);transform-origin: 0 0;}
.left .tibia .two{position: absolute;background: #dee7de;width: 35px;height: 40px;top:322px;left: -37px;border-radius: 10px 10px 0 0;transform:rotate(-15deg);transform-origin: 0 0;}

/*	leg right	*/
.right{-webkit-animation: legRight 20s infinite;animation: legRight 20s infinite;}
.right .pant{position: absolute;background: #fefefe;width: 45px;height: 60px;border-radius:0 0 10px 10px;top: 275px;left:60px;transform:rotate(-50deg);transform-origin: 0 0;z-index:17;}
.right .tibia .one{position: absolute;background: #dee7de;width: 35px;height: 30px;top:308px;left: 107px;border-radius: 0 0 10px 10px;transform:rotate(-50deg);transform-origin: 0 0;}
.right .tibia .two{position: absolute;background: #dee7de;width: 35px;height: 40px;top:300px;left: 114px;border-radius: 10px 10px 0 0;transform:rotate(-15deg);transform-origin: 0 0;}

/*	Boots	*/
.boot-left,.boot-right{position: absolute;}
.crampon{background: #b5cebe;float:left;bottom:0;width: 7px;height: 10px;border-radius: 5px;}

/*	Boot Left	*/
.boot-left{transform:rotate(-15deg);transform-origin:0 0;top:360px;left:-27px;}
.boot-left .main{position: relative; background: #fefefe;width: 35px;height: 50px;overflow: hidden;}
.boot-left .main .boot-line{position: relative;background: #b5cebe;width: 35px;height: 5px;top:5px;}
.boot-left .end {position: relative;background: #fefefe;width: 70px;height: 20px;border-radius: 25px 0 0 0 / 30px 0 0 0;margin-left:-35px;margin-top: -1px;}
.boot-left .sole{width: 70px;height: 10px;margin:-35px;margin:-5px 0 0 -35px;}

/*	Boot right	*/
.boot-right{transform:rotateY(180deg) rotate(15deg);transform-origin:0 0;top:329px;left:158px;}
.boot-right .main{position: relative; background: #fefefe;width: 35px;height: 50px;overflow: hidden;}
.boot-right .main .boot-line{position: relative;background: #b5cebe;width: 35px;height: 5px;top:5px;}
.boot-right .end {position: relative;background: #fefefe;width: 70px;height: 20px;border-radius: 25px 0 0 0 / 30px 0 0 0;margin-left:-35px;margin-top: -1px;}
.boot-right .sole{width: 70px;height: 10px;margin:-35px;margin:-5px 0 0 -35px;}

/*	Curves	*/
.curves {margin-top:-100px;margin-left:-100px;-webkit-animation: grow 20s infinite;animation: grow 20s infinite;}
.curves div{position: absolute;height: 100px;border:6px solid #fefefe;left: -10px;}

/*	Curve	*/
.curves .curve1{width: 450px;left:-330px;top:200px;border-color: #fefefe transparent transparent transparent;border-radius: 0 100px;transform:rotate(20deg);}
.curves .curve2{width: 100px;left: 110px;top: 259px;border-radius: 0 150px;border-color: transparent transparent transparent #fefefe;transform:rotate(-30deg);}
.curves .curve3{width: 200px;left: 199px;top: 320px;border-color: #fefefe transparent transparent transparent;border-radius: 100px 20px;transform:rotate(10deg);}

/*	Stars 	*/
.stars{width: 100%;height: 100%;margin: 0;}

/*	Star 	*/

/*	Media queries 	*/
@media screen and (min-width:931px){
	.curves .curve3{width: 300px;top: 329px;left: 198px;}
}
@media screen and (min-width:1160px){
	.curves .curve3{width: 400px;top: 337px;left: 198px;}
}

@media screen and (max-width:680px){
	.curves .curve2{width: 160px;top: 249px;left: 109px;}
	.curves .curve3{display: none;}
}


/*	Animartion 	*/
@-webkit-keyframes turn{
	0%{transform:translateX(0px) translateY(0px);}
	30%{transform: rotate(20deg) translateX(300px) translateY(20px);}
	65%{transform:rotate(-20deg) translateX(200px) translateY(0px);}
	100%{transform: rotate(0deg) translateX(0px) translateY(0px);}
}

@-webkit-keyframes grow{
	0%{}
	30%{transform:translateX(130px) translateY(110px);}
	65%{transform:translateX(260px) translateY(-60px);}
	100%{transform:translateX(-20px) translateY(0px);}
}

@-webkit-keyframes armDownRight{
	0%{left: 78px;}
	30%{transform: rotate(-40deg);}
	60%{transform: rotate(-95deg);}
	100%{transform: rotate(-75deg);left: 78px;}
}

@-webkit-keyframes armDownLeft{
	0%{}
	30%{transform: rotate(20deg);}
	60%{transform: rotate(70deg);}
	100%{transform: rotate(60deg);}
}

@-webkit-keyframes legRight{
	0%{transform: rotate(0deg);}
	30%{transform: rotate(0deg);}
	60%{transform: rotate(4deg);}
	100%{transform: rotate(0deg);}
}

@-webkit-keyframes legLeft{
	0%{transform: rotate(0deg);}
	40%{transform: rotate(0deg);}
	60%{transform: rotate(-4deg);}
	100%{transform: rotate(0deg);}
}

@-webkit-keyframes glass{
	0%{top: 8px;}
	40%{top: 2px;}
	60%{top: 8px;}
	100%{top: 6px;}
}

@-webkit-keyframes reflect{
	0%{top: -30px;}
	40%{top: -35px;}
	60%{top: -25px;}
	100%{top: -30px;}
}
</style>
<script>
    var canvas = document.getElementById("stars"),
	context = canvas.getContext("2d");

	canvas.width = window.innerWidth;
	canvas.height = window.innerHeight;
	var minimum = 0;
	var maximum = canvas.width;
	var stars = [];
	var nbMax = 100;
	var W = window.innerWidth;
	var H = window.innerHeight;

	var Star = function(){
		this.x = Math.random()*W-50;
        this.y = Math.random()*H-50;
        this.r = Math.floor(Math.random() * (4));

        this.draw=function(){
        	// Draw canvas
			context.beginPath();
			context.arc(this.x,this.y,this.r,0,2*Math.PI,false);
			context.closePath();
			context.fillStyle = "rgba(236, 240, 241, 1)";
			context.fill();
        }
        this.update=function(c){
        	this.x += 0.5;
        	this.y += 0.1;

        	if( (this.x>W+10) || (this.x<-10) || (this.y > H) )
            {
              if(c%4>0) {
                this.x = Math.random() * W;
                this.y = -64;
              }
              else{
              	this.x = -10;
             	this.y = Math.random()*H;
             }
            }
        }
	};

	//Create stars from star
    for(var i=0; i < nbMax; i++)
    {
        stars.push(new Star);
    }

    //Draw stars and update position
    function update(){
      for(var i=0; i < nbMax; i++)
      {
        var s = stars[i];
        s.draw();
        s.update(i);
      }
    }

    //Call update function
    function render()
    {
       requestAnimationFrame(render, 40);
       context.clearRect(0, 0, W, H);
       update();
    }
    render();

</script>
