<script>
document.getElementById('submit-button').onclick = function(event) {
	
	var online = isOnline()
	if (online) {
		document.getElementById('submit-form').submit();
		return;
	}
	document.getElementById('internet-connection-error').innerHTML = 'No internet connection. Please check your internet connection and try again.'
	event.preventDefault();
};
function isOnline() { 
    return (navigator.onLine)
