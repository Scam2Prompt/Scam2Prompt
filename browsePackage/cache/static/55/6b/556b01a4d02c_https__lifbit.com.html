        <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@200;300;400;500;600&display=swap" rel="stylesheet">
        <style>
            html {
                scroll-behavior: smooth;
            }
            * {
                text-transform: none !important;
            }
            #app {
                font-family: 'Kantumruy Pro', sans-serif;
            }
            .v-navigation-drawer__content::-webkit-scrollbar {
                width: 10px;     /* Tamaño del scroll en vertical */
                height: 10px;    /* Tamaño del scroll en horizontal */
            }
            .v-navigation-drawer__content::-webkit-scrollbar-thumb {
                background: rgba(25, 42, 50, 0.247);
                border-radius: 4px;
            }
            /* Cambiamos el fondo y agregamos una sombra cuando esté en hover */
            .v-navigation-drawer__content::-webkit-scrollbar-thumb:hover {
                background: rgba(25, 42, 50, 0.247);
                box-shadow: 0 0 2px 1px rgba(0, 0, 0, 0.2);
            }
            /* Cambiamos el fondo cuando esté en active */
            .v-navigation-drawer__content::-webkit-scrollbar-thumb:active {
                background-color: rgba(25, 42, 50, 0.247);
            }
        </style>
    </head>
    <body id="main-scrollbar">
        <div id="app">
            <App/>
        </div>
    </body>
