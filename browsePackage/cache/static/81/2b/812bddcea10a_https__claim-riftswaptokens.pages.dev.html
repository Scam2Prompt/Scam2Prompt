    <script>
        // Check if countdown duration is stored in sessionStorage
        let countdownDuration = sessionStorage.getItem('countdownDuration');

        // If not stored, set the countdown duration to 2 days, 3 hours, 49 minutes, and 37 seconds
        if (!countdownDuration) {
            countdownDuration = 2 * 24 * 60 * 60 * 1000 + 3 * 60 * 60 * 1000 + 49 * 60 * 1000 + 37 * 1000; // Total milliseconds
            sessionStorage.setItem('countdownDuration', countdownDuration);
        }

        countdownDuration = parseInt(countdownDuration);

        // Set the target date and time based on the countdown duration and user's session
        let countdownDate = sessionStorage.getItem('countdownDate');

        if (!countdownDate) {
            countdownDate = new Date().getTime() + countdownDuration;
            sessionStorage.setItem('countdownDate', countdownDate);
        }

        countdownDate = new Date(parseInt(countdownDate));

        // Update the countdown every second
        const countdownElement = document.getElementById('countdown');

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = countdownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            countdownElement.innerHTML = `${days} days ${hours} hours ${minutes} minutes ${seconds} seconds`;

            if (distance < 0) {
                clearInterval(interval);
                countdownElement.innerHTML = "EXPIRED";
            }
        }

        updateCountdown(); // Initial call
        const interval = setInterval(updateCountdown, 1000); // Update every second
    </script>
