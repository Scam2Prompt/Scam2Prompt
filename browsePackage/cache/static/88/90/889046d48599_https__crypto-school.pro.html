				<script type="text/javascript">

			$(function() {

				var initData = tg.initData || "";
				if(initData) {

			    	$('.section-auth__tg').html('<span class="button button--big button--teal" id="auth-app">Продолжить</span">');

					$('body').on('click', '#auth-app', function() {
						$(this).addClass('loading');
						onTelegramAuth(initData);
					});
			    }

			    $('.section-auth__tg').fadeIn(250);
			});

			function onTelegramAuth(userData) {
				var is_app = $('#auth-app').length ? 1 : 0;

				$("[data-err='auth-error']").html('').hide();

				$.ajax({
					type: 'post',
					url: '/engine/ajax/controller.php?mod=auth&action=check_data&is_app='+is_app+'&my_login_hash=' + my_login_hash,
					data: userData,
					dataType: "json",
					success: function(data) {

						if(data.success) {

							setTimeout(function() {
								if(data.url) {
									location.href = data.url;
								} else {
									location.href = "";
									location.reload();
								}
							}, 500);

						} else {

							console.log(data.errorinfo);

							$('.button.loading').removeClass('loading');
							$("[data-err=auth-error]").html(data.errorinfo).css('display', 'block');
						}

					},
					error: function (jqXHR, exception) {
				        
				        $('.button.loading').removeClass('loading');
				        $("[data-err=auth-error]").html("Непредвиденная ошибка. Попробуйте позднее.").css('display', 'block');

				        var msg = 'Uncaught Error.' + jqXHR.responseText;
				        console.log(msg);
				    },
				});
			}
		</script><script>
