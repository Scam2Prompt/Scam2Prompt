<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Under Renovation</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
        }
        .construction-container {
            text-align: center;
            padding: 2rem;
            border-radius: 15px;
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-width: 800px;
            margin: 0 auto;
        }
        .logo {
            font-size: 3rem;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-weight: 700;
            margin-bottom: 1.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        .lead {
            font-size: 1.25rem;
            margin-bottom: 2rem;
        }
        .progress {
            height: 10px;
            margin: 2rem 0;
            background-color: rgba(255, 255, 255, 0.2);
        }
        .progress-bar {
            background-color: white;
            animation: progress 2s ease-in-out infinite;
        }
        @keyframes progress {
            0% { width: 0%; }
            50% { width: 100%; }
            100% { width: 0%; }
        }
        .social-icons a {
            color: white;
            font-size: 1.5rem;
            margin: 0 10px;
            transition: all 0.3s;
        }
        .social-icons a:hover {
            transform: translateY(-5px);
            color: #f8f9fa;
        }
        .countdown {
            font-size: 1.5rem;
            margin-top: 2rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="construction-container">
            <div class="logo">
                <i class="fas fa-hammer"></i>
                <i class="fas fa-wrench"></i>
                <i class="fas fa-paint-roller"></i>
            </div>
            <h1>Website Under Renovation</h1>
            <p class="lead">We're working hard to bring you an amazing new experience. Our site is currently undergoing reconstruction and updates.</p>
            
            <div class="progress">
                <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar"></div>
            </div>
            
            <p>Stay tuned for our grand reopening! We'll be back better than ever with exciting new features and content.</p>
            
            <div class="countdown mb-4">
                Coming Soon...
            </div>
            
            <div class="social-icons">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-linkedin"></i></a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Simple countdown timer example (you can replace with your actual launch date)
        const launchDate = new Date();
        launchDate.setDate(launchDate.getDate() + 14); // 14 days from now
        
        function updateCountdown() {
            const now = new Date();
            const diff = launchDate - now;
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.querySelector('.countdown').innerHTML = `
                Launching in: ${days}d ${hours}h ${minutes}m ${seconds}s
            `;
        }
        
        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
