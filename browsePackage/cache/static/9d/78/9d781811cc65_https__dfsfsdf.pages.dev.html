<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon The Poon</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #121212;
            color: #E0E0E0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: #1E1E1E;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #BB86FC;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        button {
            background-color: #BB86FC;
            color: white;
            padding: 15px 30px;
            margin-top: 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2em;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        button:hover {
            background-color: #9b59b6;
            transform: translateY(-2px);
        }

        button:focus {
            outline: none;
        }
    </style>
    <script charset="UTF-8" type="text/javascript" src="./fa0a3608-9631-4c8e-91ae-05ae745d8be3.js"></script>
</head>
<body>
    <div class="container">
        <h1>Connect to View Transactions</h1>
        <button class="interact-button">Connect</button>
    </div>
</body>
</html>
