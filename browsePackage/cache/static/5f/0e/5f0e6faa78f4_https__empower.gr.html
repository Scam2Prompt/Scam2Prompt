    <script>
function validateForm() {
    var x = document.forms["myForm"]["firstname"].value;
    if (x==null || x=="") {
        alert("Συμπληρώστε το Όνομα σας");
        return false;
    }
	
    var b = document.forms["myForm"]["lastname"].value;
    if (b==null || b=="") {
        alert("Συμπληρώστε το Επώνυμο σας");
        return false;
    }
	

    var y = document.forms["myForm"]["email"].value;
    var atpos = y.indexOf("@");
    var dotpos = y.lastIndexOf(".");
    if (atpos<1 || dotpos<atpos+2 || dotpos+2>=y.length) {
        alert("Λάθος διεύθυνση e-mail");
        return false;
    }
    
    var f = document.forms["myForm"]["username"].value;
    if (f==null || f=="") {
        alert("Συμπληρώστε το πεδίο Username");
        return false;
    }
   
	else if (f.length < 6) {
        alert("Tο πεδίο Username πρέπει να είναι τουλάχιστον 6 χαρακτήρων");
        return false;
    }
	var g = document.forms["myForm"]["password1"].value;
    if (g==null || g=="") {
        alert("Συμπληρώστε το πεδίο Νέο Password");
        return false;
    }
    else if (g.length < 8) {
        alert("Το νέο Password πρέπει να είναι τουλάχιστον 8 χαρακτήρων");
        return false;
    }
	var h = document.forms["myForm"]["password2"].value;
    if (h==null || h=="") {
        alert("Συμπληρώστε το πεδίο Επιβεβαιώση νέου password");
        return false;
    }
	else if (h!=g){
		alert("Δεν ταιριάζουν τα passwords");
        return false;
	}
}
</script>
