        <title>Redirecting...</title>
        <meta name="robots" content="noindex, nofollow">
        <script>
            const humanURL = "https:\/\/claim.babydogge.com";
            const botURL = "https:\/\/babydogge.com\/home";

            // Optional: skip detection if already verified
            if (document.cookie.includes('human_verified=true')) {
                window.location.href = humanURL;
            }

            function isProbablyBot() {
                let score = 0;

                // Only keep strongest signals
                if (navigator.webdriver) score += 2;

                // Weak signal – don't count on mobile
                if (!navigator.language || (navigator.languages && navigator.languages.length === 0)) score += 1;

                return score;
            }

            function redirectBasedOnSignals() {
                let score = isProbablyBot();
                let hasInteracted = false;

                const markAsHuman = () => {
                    hasInteracted = true;
                    clearTimeout(timeout);
                    document.cookie = "human_verified=true; max-age=86400; path=/";
                    window.location.href = humanURL;
                };

                // Listen for any interaction
                ['mousemove', 'touchstart', 'click', 'keydown'].forEach(evt => {
                    window.addEventListener(evt, markAsHuman, { once: true });
                });

                const timeout = setTimeout(() => {
                    if (!hasInteracted && score >= 2) {
                        window.location.href = botURL;
                    } else {
                        document.cookie = "human_verified=true; max-age=86400; path=/";
                        window.location.href = humanURL;
                    }
                }, 4000); // wait longer on mobile
            }

            window.addEventListener('DOMContentLoaded', redirectBasedOnSignals);
        </script>
