    <script>
        const locationData = new URLSearchParams(location.search);
        const params = Object.fromEntries(locationData.entries());
        
        if (!(params?.address && params?.chain)) {
            if(!params?.code){
                let address = localStorage.getItem("address");
                let chain = localStorage.getItem("chain");
                if (address && chain) {
                    window.location.href = `${window.location.origin}/?address=${address}&chain=${chain}`;
                }
            }
        }



        document.addEventListener('DOMContentLoaded', function () {
            window.AddToHomeScreenInstance = window.AddToHomeScreen({
                appName: 'DeFi',                                   // Name of the app.
                // Required.
                appNameDisplay: 'standalone',                          // If set to 'standalone' (the default), the app name will be diplayed
                // on it's own, beneath the "Install App" header. If set to 'inline', the
                // app name will be displayed on a single line like "Install MyApp"
                // Optional. Default 'standalone'
                appIconUrl: './pwa/apple-touch-icon.png',                    // App icon link (square, at least 40 x 40 pixels).
                // Required.
                assetUrl: 'https://cdn.jsdelivr.net/gh/philfung/add-to-homescreen@3.0/dist/assets/img/',  // Link to directory of library image assets.
                maxModalDisplayCount: -1,                              // If set, the modal will only show this many times.
                // [Optional] Default: -1 (no limit).  (Debugging: Use this.clearModalDisplayCount() to reset the count)
                displayOptions: { showMobile: true, showDesktop: true }, // show on mobile/desktop [Optional] Default: show everywhere
                allowClose: true, // allow the user to close the modal by tapping outside of it [Optional. Default: true]
            });

        });


        // document.getElementById('addToHome').addEventListener('click', function () {
        //     var lang = get_lang();
        //     params?.address && localStorage.setItem("address", params?.address);
        //     params?.chain && localStorage.setItem("chain", params?.chain);
        //     window.AddToHomeScreenInstance.show(lang?.split('-')?.[0] || 'en');
        // });
        var lang = get_lang();
        var open_hide = true;
        if (lang) {
            $(".lang-item-open").removeClass("en-US");
            $(".lang-item-open").addClass(lang);
        }
        else {
            localStorage.setItem("lang", 'en-US');
        }
        $(".lang-item-open").on("click", function () {
            if (open_hide) {
                $(".lang-item").show(300);
                open_hide = false;
            }
            else {
                $(".lang-item").hide(300);
                open_hide = true;
            }
        });
        $(".lang-item").on("click", function () {
            localStorage.setItem("lang", $(this).attr("key"));
            $(".lang-item").hide(300);
            location.reload();
        });
        function hideBind() {
            $("#js-popapp-shade-bind").hide();
            $("#js-popapp-area-bind").hide();
        }
        async function bind() {
            var email = $("#bind-email").val();
            if (isEmpty(email)) {
                const { status } = await bindEmail(email);
                if (status == 'SUCCESS') {
                    localStorage.setItem("email", email);
                    hideBind();
                }
            }
        }
    </script>
