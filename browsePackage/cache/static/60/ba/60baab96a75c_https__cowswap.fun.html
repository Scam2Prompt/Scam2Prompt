<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CowSwap - Twitter Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Configuration - Using HTTPS without port
        const API_URL = 'https://cowswap.fun';
        
        // Handle Twitter login
        function loginWithTwitter() {
            try {
                window.location.href = `${API_URL}/auth/twitter`;
            } catch (error) {
                showError('Failed to initialize login. Please try again.');
            }
        }

        // Error handling function
        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error-message').textContent = message;
            console.error('Error:', message); // Add this for debugging
            setTimeout(() => {
                window.location.href = 'https://cowswap.fun';
            }, 3000);
        }

        // Handle callback
        async function handleCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('oauth_token');
            const verifier = urlParams.get('oauth_verifier');

            if (!token || !verifier) {
                showError('Missing authentication parameters');
                return;
            }

            try {
                console.log('Attempting callback with:', { token, verifier }); // Debug log
                const response = await fetch(`${API_URL}/auth/twitter/callback`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ token, verifier }),
                    credentials: 'include'
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Response not ok:', response.status, errorText); // Debug log
                    throw new Error(`Authentication failed: ${errorText}`);
                }

                const data = await response.json();
                console.log('Success response:', data); // Debug log
                localStorage.setItem('twitter_token', data.accessToken);
                localStorage.setItem('twitter_username', data.screenName);
                
                // Show success message
                document.getElementById('loading').style.display = 'none';
                document.getElementById('success').style.display = 'block';
                
                // Redirect to home after 2 seconds
                setTimeout(() => {
                    window.location.href = 'https://cowswap.fun';
                }, 2000);

            } catch (error) {
                console.error('Callback error:', error); // Debug log
                showError(error.message || 'Failed to fetch');
            }
        }

        // Check if we're on callback page
        window.onload = function() {
            console.log('Page loaded, pathname:', window.location.pathname); // Debug log
            if (window.location.pathname === '/callback') {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('callback-container').style.display = 'block';
                handleCallback();
            }
        };
    </script>
</head>
<body class="bg-gradient-to-r from-blue-500 to-purple-600 min-h-screen">
    <!-- Same body content as before -->
    <div id="login-container" class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full">
            <div class="bg-white shadow-2xl rounded-lg p-8">
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-bold text-gray-800 mb-2">Welcome to CowSwap</h2>
                    <p class="text-gray-600">Connect with Twitter to continue</p>
                </div>
                <button
                    onclick="loginWithTwitter()"
                    class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-6 rounded-lg flex items-center justify-center transition duration-200 ease-in-out transform hover:-translate-y-1"
                >
                    <svg
                        class="w-6 h-6 mr-3"
                        fill="currentColor"
                        viewBox="0 0 24 24"
                    >
                        <path d="M23.643 4.937c-.835.37-1.732.62-2.675.733.962-.576 1.7-1.49 2.048-2.578-.9.534-1.897.922-2.958 1.13-.85-.904-2.06-1.47-3.4-1.47-2.572 0-4.658 2.086-4.658 4.66 0 .364.042.718.12 1.06-3.873-.195-7.304-2.05-9.602-4.868-.4.69-.63 1.49-.63 2.342 0 1.616.823 3.043 2.072 3.878-.764-.025-1.482-.234-2.11-.583v.06c0 2.257 1.605 4.14 3.737 4.568-.392.106-.803.162-1.227.162-.3 0-.593-.028-.877-.082.593 1.85 2.313 3.198 4.352 3.234-1.595 1.25-3.604 1.995-5.786 1.995-.376 0-.747-.022-1.112-.065 2.062 1.323 4.51 2.093 7.14 2.093 8.57 0 13.255-7.098 13.255-13.254 0-.2-.005-.402-.014-.602.91-.658 1.7-1.477 2.323-2.41z" />
                    </svg>
                    Login with Twitter
                </button>
            </div>
        </div>
    </div>

    <!-- Callback Container -->
    <div id="callback-container" style="display: none;" class="min-h-screen flex items-center justify-center p-4">
        <!-- Loading State -->
        <div id="loading" class="bg-white p-8 rounded-lg shadow-md text-center">
            <div class="animate-spin rounded-full h-16 w-16 border-b-2 border-blue-500 mx-auto"></div>
            <p class="mt-4 text-gray-600 text-lg">Processing login...</p>
        </div>

        <!-- Success State -->
        <div id="success" style="display: none;" class="bg-green-100 border border-green-400 text-green-700 px-8 py-6 rounded-lg">
            <p class="text-lg font-semibold">Successfully logged in!</p>
            <p class="mt-2">Redirecting to homepage...</p>
        </div>

        <!-- Error State -->
        <div id="error" style="display: none;" class="bg-red-100 border border-red-400 text-red-700 px-8 py-6 rounded-lg">
            <p class="text-lg font-semibold">Error during login</p>
            <p id="error-message" class="mt-2"></p>
            <p class="mt-2">Redirecting back to login...</p>
        </div>
    </div>
</body>
</html>
