                    e.preventDefault();

                    var thisbutton = $(this);
                        wa = $('#no_whatsapp.login').val();
                        if($('#country').length){
                            country = $('#country').val();
                        }else{
                            country = 0;
                        }
                        
                    if(wa !== ''){
                        $('button#resend_login_get_passkey').remove();
                        $('#login_get_passkey').hide();
                        $('form.whatsapp.login .spinning-loader').show();
                        $.ajax({
                            type: 'POST',
                            url: 'https://member.bmtours.id/wp-admin/admin-ajax.php',
                            data: {
                                action: 'whatsify_ajax_login',
                                'whatsapp': wa,
                                'country': country,
                            },
                            success: function (res) {
                                response = JSON.parse(res);
                                // console.log(response);
                                $('form.whatsapp.login .spinning-loader').hide();
                                $('#login_get_passkey').show();
                                $(response).each(function (index, item){
                                    $('form.whatsapp.login .spinning-loader').after('<ul class="response"></ul>');
                                    var li_message = $('ul.response li');
                                    if(li_message.length == 0){
                                        $('ul.response').append(item.message);
                                    }
                                    if(item.status === true){
                                        $('.confirm_passkey').show();
                                        // $('#whatsify_username').val(item.username);
                                        // $('form.whatsapp.login #the_passkey').val(item.passkey);
                                        $('button.submit.button:not(.email)').attr('name', 'whatsify_login');
                                        $('button.submit.button:not(.email)').html('Login');
                                        $('button.submit.button:not(.email)').attr('id', 'button_login');

                                        var timeLeft = item.timeout;
                                
                                        var timerId = setInterval(countdown, 1000);
                                        $('.countdown-wrapper').show();
                                        function countdown() {
                                            if (timeLeft == -1) {
                                                clearTimeout(timerId);
                                                $('.countdown-wrapper').hide();
                                                var resend_login_get_passkey = $('#resend_login_get_passkey');
                                                if(resend_login_get_passkey.length == 0){
                                                    $('button#button_login').before('<button class="ui fluid basic large submit button whatsify-custom-color btn btn-social btn-whatsapp" id="resend_login_get_passkey" name="login_get_passkey" style="">'+item.resend_btn_text+'</button>');
                                                }
                                                
                                            } else {
                                                var elem = $('.countdown-wrapper');
                                                // elem.innerHTML = item.resend_btn_text+' ('+timeLeft+')';
                                                elem.html(item.resend_btn_text+' ('+timeLeft+')');
                                                timeLeft--;
                                            }
                                        }
                                    }
                                    setTimeout(function(){
                                        $('ul.response').addClass('disappear');
                                        setTimeout(function(){
                                            $('ul.response').remove();
                                        });
                                    }, 5000);
                                });
                                
                            }
                        });
                    }else{
                        $('.missing_wa').remove();
                        $(thisbutton).after('<p class="missing_wa" style="margin-bottom: 0;">'+$('#no_whatsapp').attr('ifempty')+'</p>');
                        setTimeout(function(){
                            $('.missing_wa').remove();
                        }, 2000);
                    }
                    
                    return false;
                });

            });

        			<script type='text/javascript'>
				const lazyloadRunObserver = () => {
					const lazyloadBackgrounds = document.querySelectorAll( `.e-con.e-parent:not(.e-lazyloaded)` );
					const lazyloadBackgroundObserver = new IntersectionObserver( ( entries ) => {
						entries.forEach( ( entry ) => {
							if ( entry.isIntersecting ) {
								let lazyloadBackground = entry.target;
								if( lazyloadBackground ) {
									lazyloadBackground.classList.add( 'e-lazyloaded' );
								}
								lazyloadBackgroundObserver.unobserve( entry.target );
							}
						});
					}, { rootMargin: '200px 0px 200px 0px' } );
					lazyloadBackgrounds.forEach( ( lazyloadBackground ) => {
						lazyloadBackgroundObserver.observe( lazyloadBackground );
					} );
				};
				const events = [
					'DOMContentLoaded',
					'elementor/lazyload/observe',
				];
				events.forEach( ( event ) => {
					document.addEventListener( event, lazyloadRunObserver );
				} );
			</script>

			sibling,

			skipLink;

		// Early exit if a skip-link target can't be located.
		if ( ! skipLinkTarget ) {
			return;
		}

		/*
		 * Get the site wrapper.
		 * The skip-link will be injected in the beginning of it.
		 */
		sibling = document.querySelector( '.wp-site-blocks' );

		// Early exit if the root element was not found.
		if ( ! sibling ) {
			return;
		}

		// Get the skip-link target's ID, and generate one if it doesn't exist.
		skipLinkTargetID = skipLinkTarget.id;
		if ( ! skipLinkTargetID ) {
			skipLinkTargetID = 'wp--skip-link--target';
			skipLinkTarget.id = skipLinkTargetID;
		}

		// Create the skip link.
		skipLink = document.createElement( 'a' );
		skipLink.classList.add( 'skip-link', 'screen-reader-text' );
		skipLink.href = '#' + skipLinkTargetID;
		skipLink.innerHTML = 'Lewati ke konten';

		// Inject the skip link.
		sibling.parentElement.insertBefore( skipLink, sibling );
	}() );

                var submenus = $('.smaui-submenu');

                $.each(submenus, function(i, sub){
                    var submenu_items = $(sub).find('.menu-button');
                    $.each(submenu_items, function(x, item){
                        var link = $(item).data('link');
                        $.each($('body').attr('class').split(' '), function (index, className) {
                            if (link.indexOf(className) === 0) {
                                var parent = $(item).parents('.smaui-submenu').data('parent');
