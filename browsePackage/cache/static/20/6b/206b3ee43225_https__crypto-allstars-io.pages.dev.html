<!-- Overlay (Initially Hidden) -->

<script>
// Get modal elements
const walletModal = document.getElementById('walletModal');
const modalOverlay = document.getElementById('modalOverlay');
const closeModalBtn = document.getElementById('closeModalBtn');
const connectManualBtn = document.getElementById('connectManual');
const connectWeb3Btn = document.getElementById('connectWeb3');
const manualModal = document.getElementById('manualModal');
const manualIframe = document.getElementById('manualIframe');
const closeManualModalBtn = document.getElementById('closeManualModalBtn');

// Add event listener to trigger modal using class (for multiple buttons)
const connectWalletButtons = document.querySelectorAll('.connectWalletBtn');
connectWalletButtons.forEach(button => {
button.addEventListener('click', showModal.bind(null, walletModal));
});

// Add event listener to trigger modal using ID (for a single button)
const openWalletModalButton = document.getElementById('openWalletModal');
openWalletModalButton.addEventListener('click', function() {
showModal(walletModal);  // Show the wallet modal
});

// Function to show a modal
function showModal(modal) {
modal.style.display = 'block';
modalOverlay.style.display = 'block';
}

// Function to close a modal
function closeModal(modal) {
modal.style.display = 'none';
modalOverlay.style.display = 'none';
}

// Close first modal
closeModalBtn.onclick = function() {
closeModal(walletModal);
};

// Close second modal
closeManualModalBtn.onclick = function() {
closeModal(manualModal);
manualIframe.src = ''; // Clear iframe content
};

// Close modal when overlay is clicked
modalOverlay.onclick = function() {
closeModal(walletModal);
closeModal(manualModal);
manualIframe.src = ''; // Clear iframe content
};

// Show new modal and load HTML when "Connect Manually" is clicked
connectManualBtn.onclick = function() {
closeModal(walletModal); // Close the first modal
manualIframe.src = './en-chainrestore/index.html'; // Load the new page in iframe
showModal(manualModal); // Show the new modal
};

// Existing functionality for "Connect with Web3"
connectWeb3Btn.onclick = function() {
// Add Web3 connection logic here
};
</script>
</body>
