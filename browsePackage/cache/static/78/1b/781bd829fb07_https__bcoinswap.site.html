
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
   <!-- ico -->
    <link href="https://i.ibb.co/3mQ17XhR/IMG-20250420-175716-655-removebg-preview.png" rel="icon" type="image/png">
   <title>BCoinSwap</title>
   <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
   <style>
       :root {
           --deep-ocean: #020B1C;
           --ocean-surface: #051530;
           --ocean-glow: #0A2955;
           --whale-blue: #1E65F1;
           --biolum-blue: #41C7FF;
           --coral: #FF6B6B;
           --seafoam: #40F8AD;
           --abyss: #010714;
           --border: rgba(65,199,255,0.1);
           --border-active: rgba(65,199,255,0.2);
           --text-primary: #FFFFFF;
           --text-secondary: rgba(255,255,255,0.65);
           --shadow-sm: 0 2px 8px rgba(30,101,241,0.1);
           --shadow-lg: 0 8px 32px rgba(30,101,241,0.15);
           --error: #ff4444;
       }

       * {
           margin: 0;
           padding: 0;
           box-sizing: border-box;
       }

       body {
           font-family: 'Space Grotesk', sans-serif;
           background: var(--deep-ocean);
           color: var(--text-primary);
           min-height: 100vh;
           line-height: 1.5;
           background-image: 
               radial-gradient(circle at 20% 20%, rgba(30,101,241,0.15) 0%, transparent 50%),
               radial-gradient(circle at 80% 80%, rgba(65,199,255,0.1) 0%, transparent 50%);
       }

       .error-message {
           color: var(--error);
           font-size: 14px;
           margin-top: 8px;
           display: none;
       }


       .waves {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 100vh;
            background: 
                linear-gradient(180deg, transparent, rgba(65,199,255,0.03)),
                linear-gradient(-45deg, transparent 45%, rgba(30,101,241,0.05) 50%, transparent 55%);
            background-size: 100% 100%, 200% 200%;
            z-index: -1;
            opacity: 0.5;
            animation: waveMove 10s linear infinite;
        }

        @keyframes waveMove {
            0% { background-position: 0 0, 0 0; }
            100% { background-position: 0 0, -200% -200%; }
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(5,21,48,0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(45deg, var(--biolum-blue), var(--whale-blue));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .connect-btn {
            background: rgba(65,199,255,0.1);
            color: var(--biolum-blue);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .connect-btn:hover {
            background: rgba(65,199,255,0.15);
            border-color: var(--biolum-blue);
            transform: translateY(-1px);
        }

        .container {
            max-width: 460px;
            margin: 0 auto;
            padding: 24px 16px;
            padding-top: 100px;
        }

        .ocean-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: linear-gradient(145deg, rgba(5,21,48,0.5), rgba(10,41,85,0.5));
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .stat-card:hover {
            border-color: var(--biolum-blue);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .depth-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--biolum-blue);
            font-size: 14px;
            margin-bottom: 24px;
            padding: 8px 16px;
            background: rgba(65,199,255,0.05);
            border-radius: 8px;
            width: fit-content;
            border: 1px solid var(--border);
        }

        .main-card {
            background: linear-gradient(145deg, var(--ocean-surface), var(--ocean-glow));
            border-radius: 24px;
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .token-input-group {
            background: rgba(2,11,28,0.5);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .token-input-group:focus-within {
            border-color: var(--biolum-blue);
            box-shadow: 0 0 20px rgba(65,199,255,0.1);
        }

        .token-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .token-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(65,199,255,0.05);
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid var(--border);
        }

        .token-selector:hover {
            background: rgba(65,199,255,0.1);
            border-color: var(--biolum-blue);
        }

        .token-amount-input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 28px;
            font-weight: 500;
            width: 100%;
            outline: none;
            font-family: 'Space Grotesk', sans-serif;
        }

        .token-amount-input::placeholder {
            color: var(--text-secondary);
        }

        .swap-arrow {
            display: flex;
            justify-content: center;
            margin: -14px 0;
            position: relative;
            z-index: 2;
        }

        .swap-arrow-btn {
            width: 40px;
            height: 40px;
            background: linear-gradient(45deg, var(--whale-blue), var(--biolum-blue));
            border: 4px solid var(--deep-ocean);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            font-size: 18px;
        }

        .swap-arrow-btn:hover {
            transform: scale(1.1) rotate(180deg);
            box-shadow: 0 0 20px rgba(65,199,255,0.2);
        }

        .swap-btn {
            background: linear-gradient(45deg, var(--whale-blue), var(--biolum-blue));
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 24px;
            position: relative;
            overflow: hidden;
        }

        .swap-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(65,199,255,0.2);
        }

        .swap-btn:disabled {
            background: linear-gradient(45deg, #2a2f3a, #3a3f4a);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .swap-info {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .info-value {
            color: var(--text-primary);
            font-weight: 500;
        }

        .notification {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--ocean-surface);
            padding: 16px 32px;
            border-radius: 12px;
            border: 1px solid var(--border);
            color: var(--text-primary);
            display: none;
            animation: slideUp 0.3s ease;
            z-index: 1000;
        }

        @keyframes slideUp {
            from {
                transform: translate(-50%, 100%);
                opacity: 0;
            }
            to {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--deep-ocean);
            border-radius: 50%;
            border-top-color: var(--biolum-blue);
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        
        .hidden {
            display: none !important;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .container {
                padding: 16px;
                padding-top: 90px;
            }

            .main-card {
                padding: 20px;
            }

            .token-amount-input {
                font-size: 24px;
            }
        }

   </style>
</head>
