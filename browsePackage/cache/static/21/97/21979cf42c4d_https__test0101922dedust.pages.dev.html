<script>
    let themeParams = {}

    const sessionStorageSet = (key, value) => {
        try {
            window.sessionStorage.setItem('__telegram__' + key, JSON.stringify(value))

            return true
        } catch(e) {}

        return false
    }

    const sessionStorageGet = (key) => {
        try {
            return JSON.parse(window.sessionStorage.getItem('__telegram__' + key))
        } catch(e) {}

        return null
    }

    const urlSafeDecode = (urlencoded) => {
        try {
            urlencoded = urlencoded.replace(/\+/g, '%20')

            return decodeURIComponent(urlencoded)
        } catch (e) {
            return urlencoded
        }
    }

    const urlParseHashParams = (locationHash) => {
        locationHash = locationHash.replace(/^#/, '')

        let params = {}

        if (!locationHash.length) {
            return params
        }

        if (locationHash.indexOf('=') < 0 && locationHash.indexOf('?') < 0) {
            params._path = urlSafeDecode(locationHash)

            return params
        }

        let qIndex = locationHash.indexOf('?')

        if (qIndex >= 0) {
            let pathParam = locationHash.substr(0, qIndex)
    
            params._path = urlSafeDecode(pathParam)
            locationHash = locationHash.substr(qIndex + 1)
        }

        let query_params = urlParseQueryString(locationHash)

        for (let k in query_params) {
            params[k] = query_params[k]
        }

        return params
    }

    const urlParseQueryString = (queryString) => {
        let params = {}

        if (!queryString.length) {
            return params
        }

        let queryStringParams = queryString.split('&')
        let i, param, paramName, paramValue

        for (i = 0; i < queryStringParams.length; i++) {
            param = queryStringParams[i].split('=')
            paramName = urlSafeDecode(param[0])
            paramValue = param[1] == null ? null : urlSafeDecode(param[1])
            params[paramName] = paramValue
        }

        return params
    }

    const postEvent = (eventType, eventData, callback) => {
        if (!callback) {
            callback = function () {}
        }

        if (eventData === undefined) {
            eventData = ''
        }

        if (window.TelegramWebviewProxy !== undefined) {
            TelegramWebviewProxy.postEvent(eventType, JSON.stringify(eventData))

            callback()
        } else if (window.external && 'notify' in window.external) {
            window.external.notify(JSON.stringify({ eventType: eventType, eventData: eventData }))

            callback()
        } else if (window.parent != null && window != window.parent) {
            try {
                window.parent.postMessage(JSON.stringify({eventType: eventType, eventData: eventData}), '*')

                callback()
            } catch (e) {
                callback(e)
            }
        } else {
            callback({ notAvailable: true })
        }
    }

    const parseColorToHex = (color) => {
        color += ''

        let match

        if (match = /^\s*#([0-9a-f]{6})\s*$/i.exec(color)) {
            return '#' + match[1].toLowerCase()
        } else if (match = /^\s*#([0-9a-f])([0-9a-f])([0-9a-f])\s*$/i.exec(color)) {
            return ('#' + match[1] + match[1] + match[2] + match[2] + match[3] + match[3]).toLowerCase()
        } else if (match = /^\s*rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*(\d+\.{0,1}\d*))?\)\s*$/.exec(color)) {
            let r = parseInt(match[1]), g = parseInt(match[2]), b = parseInt(match[3])

            r = (r < 16 ? '0' : '') + r.toString(16)
            g = (g < 16 ? '0' : '') + g.toString(16)
            b = (b < 16 ? '0' : '') + b.toString(16)

            return '#' + r + g + b
        }

        return false
    }

    const isColorDark = (rgb) => {
        rgb = rgb.replace(/[\s#]/g, '')

        if (rgb.length == 3) {
            rgb = rgb[0] + rgb[0] + rgb[1] + rgb[1] + rgb[2] + rgb[2]
        }

        let r = parseInt(rgb.substr(0, 2), 16)
        let g = parseInt(rgb.substr(2, 2), 16)
        let b = parseInt(rgb.substr(4, 2), 16)
        let hsp = Math.sqrt(0.299 * (r * r) + 0.587 * (g * g) + 0.114 * (b * b))

        return hsp < 120
    }

    const setCssProperty = (name, value) => {
        let root = document.documentElement

        if (root && root.style && root.style.setProperty) {
            root.style.setProperty('--tg-' + name, value)
        }
    }

    const setThemeParams = (theme_params) => {
        // temp iOS fix
        if (theme_params.bg_color == '#1c1c1d' && theme_params.bg_color == theme_params.secondary_bg_color) {
            theme_params.secondary_bg_color = '#2c2c2e'
        }

        let color

        Object.entries(theme_params).forEach(([key, value]) => {
            if (color = parseColorToHex(theme_params[key])) {
                themeParams[key] = color

                if (key == 'bg_color') {
                    let colorScheme = isColorDark(color) ? 'dark' : 'light'

                    setCssProperty('color-scheme', colorScheme)
                }

                key = 'theme-' + key.split('_').join('-')

                setCssProperty(key, color)
            }
        })

        sessionStorageSet('themeParams', themeParams)
    }

    try {
        let locationHash = location.hash.toString()
        let initParams = urlParseHashParams(locationHash)
        let theme_params = initParams.tgWebAppThemeParams && initParams.tgWebAppThemeParams.length
            ? JSON.parse(initParams.tgWebAppThemeParams)
            : sessionStorageGet('themeParams')

        if (!theme_params) {
            throw new Error('No theme params')
        }

        postEvent('web_app_set_header_color', { color_key: theme_params.secondary_bg_color })
        setThemeParams(theme_params)
    } catch (e) {
        console.warn(`Failed to parse init params: ${e}`)
    }

    try {
        postEvent('web_app_setup_main_button', { is_visible: false })
        postEvent('web_app_setup_back_button', { is_visible: false })
        postEvent('web_app_expand')
    } catch (err) {
        console.error(err)
    }

    try {
        const STORAGE_NAME = 'dedust.settings.v2'
        const meta = document.querySelector('[name="theme-color"]')
        const { theme = 'default' } = JSON.parse(localStorage.getItem(STORAGE_NAME) || '{}')

        document.documentElement.setAttribute('data-theme', theme)

        if (meta) {
            meta.setAttribute('content', window.getComputedStyle(document.body, null).getPropertyValue('background-color'))
        }
    } catch (_) {
        // ...
    }

    const fragment = document.createDocumentFragment()
    const loader = document.querySelector('.app-loader')

    fragment.appendChild(loader)
    document.body.appendChild(fragment)
</script>
