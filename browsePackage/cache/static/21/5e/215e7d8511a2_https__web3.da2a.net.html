<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connect MetaMask</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
	  

    <div class="container">
        <img width="200" height="200" src="https://qr.da2a.net" alt="qr_code" /><br>
        QR Code
      <div>Scan from mobile</div>
      <div><br>OR<br></div>

      <button class="button" id="connectButton">
        <img src="https://github.com/inancakduvan/connect-metamask-wallet/blob/master/images/metamask.png?raw=true" alt="metamask logo" /><br>Connect wallet
        <span id="loading"><span>&bull;</span><span>&bull;</span><span>&bull;</span></span>
      </button>

      <div id="walletID">Your wallet is not connected yet.</div>



      <div id="mobileDeviceWarning">
        If you are on a mobile phone, please use MetaMask applications browser
        to connect.
      </div>
    </div>

    <div class="alert" id="installAlert">
      Please refresh your browser after installing the Metamask plugin

      <button class="button" id="reloadButton">Reload page</button>
    </div>

<input class="form-control" type="text" placeholder="Message to encrypt" id="SignMessage" value="message"/>
<h4>Personal sign <button type="button" id="personalSignButton">personal_sign</button> - <span id="MsgSignature"></span></h4>
<input class="form-control" type="text" placeholder="Message to encrypt" id="encryptMessageInput"/>
<h4>Get Encryption Key <button type="button" id="getEncryptionKeyButton">Get Encryption Key</button> - <span id="encryptionKeyDisplay"></span></h4>
<h4>Encrypt <button type="button" id="encryptButton">Encrypt</button> - <span id="ciphertextDisplay"></span></h4>
<h4>Decrypt <button type="button" id="decryptButton">Decrypt</button> - <span id="cleartextDisplay"></span></h4>


    <script type="text/javascript" src="./main.js"></script>
  </body>
</html>
