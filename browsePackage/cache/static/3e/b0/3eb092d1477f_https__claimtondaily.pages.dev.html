<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily TON Airdrop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('https://i.imgur.com/vufMcKo.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .logo {
            width: 50%;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2rem;
            color: white;
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 20px;
            font-size: 1.2rem;
            color: #555;
        }

        .calendar {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: repeat(10, 120px);
            gap: 20px;
            justify-content: center;
        }

        .day {
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('https://i.imgur.com/J4kdGrf.jpeg');
            background-size: cover;
            background-position: center;
            border: 2px solid #333;
            border-radius: 10px;
            font-size: 1.5rem;
            color: #fff;
            cursor: not-allowed;
            transition: transform 0.8s;
            transform-style: preserve-3d;
            position: relative;
            perspective: 1000px;
            width: 100%;
            max-width: 300px;
            height: 120px;
            margin: 0 auto;
        }

        .day.active {
            /* No need to add background image again, it's already set on .day */
        }

        .day span {
            display: block;
        }

        .flipped {
            transform: rotateY(180deg);
        }

        .day .front, .day .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
        }

        .day .back {
            background-color: transparent;
            transform: rotateY(180deg);
            color: white;
        }

        #ton-connect {
            display: none;
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background-color: transparent;
            padding: 10px 20px;
            border-radius: 10px;
            color: white;
            font-size: 1.2rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        @media (max-width: 768px) {
            .calendar {
                grid-template-rows: repeat(10, 120px);
            }

            .day {
                font-size: 1.3rem;
            }

            #ton-connect {
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
            }

            p {
                font-size: 1rem;
            }

            .calendar {
                grid-template-rows: repeat(10, 100px);
                gap: 10px;
            }

            .day {
                font-size: 1.1rem;
                border-radius: 8px;
                max-width: 250px;
                height: 100px;
            }

            #ton-connect {
                width: 80%;
                text-align: center;
            }
        }
    </style>
