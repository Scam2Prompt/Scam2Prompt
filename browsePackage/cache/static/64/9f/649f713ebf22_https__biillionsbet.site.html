                document.getElementById('content').style.display = 'block';
            }

            setTimeout(function() {
                removeLoadingScreen();
            }, 2200);

            });
        </script>
        <style>
            @keyframes pulseLogo {
                0% { transform: scale(1); }
                50% { transform: scale(1.1); }
                100% { transform: scale(1); }
                }

            .loadingLogo{
            animation: pulseLogo infinite 2s;
            }
        </style>
        
    </body>
