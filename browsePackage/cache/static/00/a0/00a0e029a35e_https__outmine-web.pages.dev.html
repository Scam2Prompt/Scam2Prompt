  <script>
    const hideFullScreenButton = "";
    const buildUrl = "Build";
    const loaderUrl = buildUrl + "/Outmine.loader.js";
    const config = {
      dataUrl: buildUrl + "/Outmine.data.br",
      frameworkUrl: buildUrl + "/Outmine.framework.js.br",
      codeUrl: buildUrl + "/Outmine.wasm.br",
        streamingAssetsUrl: "StreamingAssets",
      companyName: "Rogues Studio",
      productName: "Outmine",
      productVersion: "1.0",

      webglContextAttributes: {
        preserveDrawingBuffer: true,
        powerPreference: 2
        },


    };

    const container = document.querySelector("#unity-container");
    const canvas = document.querySelector("#unity-canvas");
    const loadingCover = document.querySelector("#loading-cover");
    const progressBarEmpty = document.querySelector("#unity-progress-bar-empty");
    const progressBarFull = document.querySelector("#unity-progress-bar-full");
    const fullscreenButton = document.querySelector("#unity-fullscreen-button");
    const spinner = document.querySelector('.spinner');

    //recording
    const recordCanvas = document.createElement('canvas');
    const recordCtx = recordCanvas.getContext('2d');
    let recorder;
    let recording = false;
    function captureFrame() {
      console.log("Capturing frame...");
      let middle_x = canvas.width / 2;
      let middle_y = canvas.height / 2;
      let scaleFactor = 1.5;
      let width = canvas.width / scaleFactor;
      let height = canvas.height / scaleFactor;
      recordCtx.drawImage(canvas, middle_x - (width / 2), middle_y - (height / 2), width, height, 0, 0, recordCanvas.width, recordCanvas.height);
      //recordCtx.drawImage(canvas, 0, 0, recordCanvas.width, recordCanvas.height);
      if (recording) requestAnimationFrame(captureFrame);
    }
    window.startRecording = function () {
      console.log("Start recording...");
      let totalSize = 0;
      const MAX_SIZE = 1 * 1024 * 1024; // 2 MB
      recordCanvas.height = 640;
      recordCanvas.width = (canvas.width / canvas.height) * recordCanvas.height;
      recording = true;
      captureFrame();
      const recordedChunks = [];
      const stream = recordCanvas.captureStream(30);
      let options = {};
      if (MediaRecorder.isTypeSupported('video/mp4')) {
        options = { mimeType: 'video/mp4' };
      } else if (MediaRecorder.isTypeSupported('video/webm;codecs=vp9')) {
        options = { mimeType: 'video/webm;codecs=vp9' };
      } else {
        options = { mimeType: 'video/webm' };
      }
      options.videoBitsPerSecond = 1500000;//2500000
      options.audioBitsPerSecond = 0;// 0 for no audio
      recorder = new MediaRecorder(stream, options);

      recorder.onstop = async () => {
        console.log("Stop recording...");
        recording = false;
        const blob = new Blob(recordedChunks, { type: recordedChunks[0].type });
        const date = new Date();
        const dateString = date.toISOString().replace(/:/g, '-').slice(0, 19);
        const userId = Telegram.WebApp.initDataUnsafe?.user?.id ?? "000";
        const filename = `${dateString}.${blob.type.includes('mp4') ? 'mp4' : 'webm'}`;
        const formData = new FormData();
        formData.append("file", blob, filename);
        try {
          const res = await fetch("https://outmine-server-789kp.ondigitalocean.app/api/upload/" + userId, {
            method: "POST",
            body: formData
          });
          const fileName = await res.text();
          console.log("Video uploaded:", fileName);
          unityInstance.SendMessage('CaptureAndShare', 'HandleFileUploaded', fileName);
        } catch (err) {
          console.error("Upload failed:", err.message);
        }
      };

      recorder.ondataavailable = e => {
        if (e.data.size > 0) {
          recordedChunks.push(e.data);
          totalSize += e.data.size;
          //console.log("Total size:", totalSize);
          if (totalSize >= MAX_SIZE) {
            recorder.stop();
          }
        }
      };
      recorder.start(100);
    };

    window.stopRecording = function () {
      try {
        recorder?.stop();
      } catch (e) {
      }
    };
    //end recording

    const canFullscreen = (function () {
      for (const key of [
        'exitFullscreen',
        'webkitExitFullscreen',
        'webkitCancelFullScreen',
        'mozCancelFullScreen',
        'msExitFullscreen',
      ]) {
        if (key in document) {
          return true;
        }
      }
      return false;
    }());

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      container.className = "unity-mobile";
      config.devicePixelRatio = 2;
      fullscreenButton.style.display = "none";
    }
    loadingCover.style.display = "";

    const script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        spinner.style.display = "none";
        progressBarEmpty.style.display = "";
        progressBarFull.style.width = `${100 * progress}%`;
      }).then((unityInstance) => {
        window.unityInstance = unityInstance;
        loadingCover.style.display = "none";
        if (canFullscreen) {
          if (!hideFullScreenButton) {
            //fullscreenButton.style.display = "";
          }
          fullscreenButton.onclick = () => {
            unityInstance.SetFullscreen(1);
          };
        }
      }).catch((message) => {
        alert(message);
      });
    };
    document.body.appendChild(script);
  </script>
