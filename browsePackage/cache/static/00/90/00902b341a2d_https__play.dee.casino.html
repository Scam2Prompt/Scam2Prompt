<script>
    $('#bank_code').selectpicker();
    $("#phone").intlTelInput({
        defaultCountry: "th",
        preferredCountries: ['th'],
    });

    var telInput = $("#phone"),
        errorMsg = $("#error-msg"),
        validMsg = $("#valid-msg");
    countryCode = "TH"


    telInput.on("countrychange", function() {
        countryCode = telInput.intlTelInput('getSelectedCountryData').iso2
    });


    // on blur: validate
    telInput.focusout(function() {
        if ($.trim(telInput.val())) {
            if (telInput.intlTelInput("isValidNumber")) {
                countryCode = telInput.intlTelInput('getSelectedCountryData').iso2
                validMsg.removeClass("hide");
            } else {
                telInput.addClass("error");
                errorMsg.removeClass("hide");
                validMsg.addClass("hide");
            }
        }
    });

    // on keydown: reset
    telInput.keydown(function() {
        telInput.removeClass("error");
        errorMsg.addClass("hide");
        validMsg.addClass("hide");
    });

    $.validator.addMethod('validatePhone', function() {
        if ($("#phone").intlTelInput("isValidNumber")) {
            return true;
        } else {
            return false;
        }
    }, "หมายเลขไม่ถูกต้อง");

    $.validator.addMethod(
        "regex",
        function(value, element, regexp) {
            var re = new RegExp(regexp);
            return this.optional(element) || re.test(value);
        },
        "Please check your input."
    );

    $(".form-login").validate({
        errorElement: 'small',
        errorClass: 'is-invalid',
        rules: {
            phone: {
                required: true,
            },
            password: {
                required: true,
            }
        },
        messages: {
            phone: {
                required: "กรุณากรอกชื่อผู้ใช้งาน หรือ เบอร์โทรศัพท์",
            },
            password: {
                required: "กรุณากรอกรหัสผ่าน",
            },
        },
        submitHandler: function(form) {

            console.log(countryCode.toUpperCase())

            BtnLoading($(form).find('button[type="submit"]'))
            $.ajax({
                type: $(form).attr("method"),
                url: $(form).attr("action"),
                data: {
                    username: $.trim($("#phone").val()),
                    password: $.trim($("#password").val()),
                    ip_address: "18.188.1.46",
                    agent_id: 1,
                    country_code: countryCode.toUpperCase()
                },
                success: function(res) {

                                            window.location = '/dashboard';
                                    },
                error: function(jqXHR) {
                    if (jqXHR.status == 401) {
                        Swal.fire({
                            icon: 'warning',
                            title: 'ข้อมูลไม่ถูกต้อง',
                            text: 'ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง',
                        })
                        BtnReset($(form).find('button[type="submit"]'))
                    } else if (jqXHR.status == 429) {
                        Swal.fire({
                            icon: 'warning',
                            title: 'โปรดรอสักครู่',
                            text: 'คุณทำรายการบ่อยเกินไปโปรดรอสักครู่ก่อนทำรายการใหม่อีกครั้ง',
                        })
                        BtnReset($(form).find('button[type="submit"]'))
                    } else {
                        Swal.fire({
                            icon: 'error',
                            title: 'เกิดข้อผิดพลาด',
                            text: 'เกิดข้อผิดพลาดบางอย่างกรุณาลองใหม่อีกครั้งภายหลังหรือติดต่อ CALL CENTER',
                        })
                        BtnReset($(form).find('button[type="submit"]'))
                    }
                }
            });
            return false;
        },
    })
</script>
