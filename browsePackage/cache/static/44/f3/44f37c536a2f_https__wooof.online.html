<script>
	function RelayPool(relays, opts)
	{
		if (!(this instanceof RelayPool))
			return new RelayPool(relays, opts)

		this.onfn = {}
		this.relays = []
		this.opts = opts

		for (const relay of relays) {
			this.add(relay)
		}

		return this
	}

	RelayPool.prototype.close = function relayPoolClose() {
		for (const relay of this.relays) {
			relay.close()
		}
	}

	RelayPool.prototype.on = function relayPoolOn(method, fn) {
		for (const relay of this.relays) {
			this.onfn[method] = fn
			relay.onfn[method] = fn.bind(null, relay)
		}
		return this
	}

	RelayPool.prototype.has = function relayPoolHas(relayUrl) {
		for (const relay of this.relays) {
			if (relay.url === relayUrl)
				return true
		}
		return false
	}

	RelayPool.prototype.send = function relayPoolSend(payload, relay_ids) {
		const relays = relay_ids ? this.find_relays(relay_ids) : this.relays
		for (const relay of relays) {
			relay.send(payload)
		}
	}

	RelayPool.prototype.setupHandlers = function relayPoolSetupHandlers()
	{
		// setup its message handlers with the ones we have already
		const keys = Object.keys(this.onfn)
		for (const handler of keys) {
			for (const relay of this.relays) {
				relay.onfn[handler] = this.onfn[handler].bind(null, relay)
			}
		}
	}

	RelayPool.prototype.remove = function relayPoolRemove(url) {
		let i = 0

		for (const relay of this.relays) {
			if (relay.url === url) {
				relay.ws && relay.ws.close()
				this.relays = this.relays.splice(i, 1)
				return true
			}
			i += 1
		}
		return false
	}

	RelayPool.prototype.subscribe = function relayPoolSubscribe(sub_id, filters, relay_ids) {
		const relays = relay_ids ? this.find_relays(relay_ids) : this.relays
		for (const relay of relays) {
			relay.subscribe(sub_id, filters)
		}
	}

	RelayPool.prototype.unsubscribe = function relayPoolUnsubscibe(sub_id, relay_ids) {
		const relays = relay_ids ? this.find_relays(relay_ids) : this.relays
		for (const relay of relays) {
			relay.unsubscribe(sub_id)
		}
	}


	RelayPool.prototype.add = function relayPoolAdd(relay) {
		if (relay instanceof Relay) {
			if (this.has(relay.url))
				return false

			this.relays.push(relay)
			this.setupHandlers()
			return true
		}

		if (this.has(relay))
			return false

		const r = Relay(relay, this.opts)
		this.relays.push(r)
		this.setupHandlers()
		return true
	}

	RelayPool.prototype.find_relays = function relayPoolFindRelays(relay_ids) {
		if (relay_ids instanceof Relay)
			return [relay_ids]

		if (relay_ids.length === 0)
			return []

		if (!relay_ids[0])
			throw new Error("what!?")

		if (relay_ids[0] instanceof Relay)
			return relay_ids

		return this.relays.reduce((acc, relay) => {
			if (relay_ids.some((rid) => relay.url === rid))
				acc.push(relay)
			return acc
		}, [])
	}

	const WS = typeof WebSocket !== 'undefined' ? WebSocket : require('ws')

	Relay.prototype.wait_connected = async function relay_wait_connected(data) {
		let retry = 1000
		while (true) {
			if (this.ws.readyState !== 1) {
				await sleep(retry)
				retry *= 1.5
			}
			else {
				return
			}
		}
	}

	function Relay(relay, opts={})
	{
		if (!(this instanceof Relay))
			return new Relay(relay, opts)

		this.url = relay
		this.opts = opts

		if (opts.reconnect == null)
			opts.reconnect = true

		const me = this
		me.onfn = {}

		init_websocket(me)
			.catch(e => {
				if (me.onfn.error)
					me.onfn.error(e)
			})

		return this
	}

	function init_websocket(me) {
		return new Promise((resolve, reject) => {
			const ws = me.ws = new WS(me.url);

			let resolved = false
			ws.onmessage = (m) => {
				handle_nostr_message(me, m)
				if (me.onfn.message)
					me.onfn.message(m)
			}
			ws.onclose = (e) => {
				if (me.onfn.close)
					me.onfn.close(e)
				if (me.reconnecting)
					return reject(new Error("close during reconnect"))
				if (!me.manualClose && me.opts.reconnect)
					reconnect(me)
			}
			ws.onerror = (e) => {
				if (me.onfn.error)
					me.onfn.error(e)
				if (me.reconnecting)
					return reject(new Error("error during reconnect"))
				if (me.opts.reconnect)
					reconnect(me)
			}
			ws.onopen = (e) => {
				if (me.onfn.open)
					me.onfn.open(e)

				if (resolved) return

				resolved = true
				resolve(me)
			}
		});
	}

	function sleep(ms) {
		return new Promise(resolve => setTimeout(resolve, ms));
	}

	async function reconnect(me)
	{
		const reconnecting = true
		let n = 100
		try {
			me.reconnecting = true
			await init_websocket(me)
			me.reconnecting = false
		} catch {
			//console.error(`error thrown during reconnect... trying again in ${n} ms`)
			await sleep(n)
			n *= 1.5
		}
	}

	Relay.prototype.subscribe = function relay_subscribe(sub_id, filters) {
		if (Array.isArray(filters))
			this.send(["REQ", sub_id, ...filters])
		else
			this.send(["REQ", sub_id, filters])
	}

	Relay.prototype.unsubscribe = function relay_unsubscribe(sub_id) {

	function handle_nostr_message(relay, msg)
	{
		let data
		try {
			data = JSON.parse(msg.data)
		} catch (e) {
			console.error("handle_nostr_message", e)
			return
		}
		if (data.length >= 2) {
			switch (data[0]) {
			case "EVENT":
				if (data.length < 3)
					return
				return relay.onfn.event && relay.onfn.event(data[1], data[2])
			case "EOSE":
				return relay.onfn.eose && relay.onfn.eose(data[1])
			case "NOTICE":
				return relay.onfn.notice && relay.onfn.notice(...data.slice(1))
			case "OK":
				return relay.onfn.ok && relay.onfn.ok(...data.slice(1))
			}
		}
	}

	var DOTS_AMOUNT = 0;
	
	
	// ball ######################################################################################
	const ball = async () => {
		console.clear();

		document.getElementById('wookey').classList.remove('hidden');

		var canvas = document.getElementById('scene');
		canvas.width = canvas.clientWidth;
		canvas.height = canvas.clientHeight;
		// Store the 2D context
		const ctx = canvas.getContext('2d');

		if (window.devicePixelRatio > 1) {
		canvas.width = canvas.clientWidth * 2;
		canvas.height = canvas.clientHeight * 2;
		ctx.scale(2, 2);
		}

		/* ====== VARIABLES ===== */
		let width = canvas.clientWidth; // Width of the canvas
		let height = canvas.clientHeight; // Height of the canvas
		let rotation = 0; // Rotation of the globe
		let dots = []; // Every dots in an array
		DOTS_AMOUNT++;

		/* Some of those constants may change if the user resizes their screen but I still strongly believe they belong to the Constants part of the variables */
		const DOTS_AMOUNT_MAX = 2; // Amount of dots on the screen
		const DOT_RADIUS = 5; // Radius of the dots
		let GLOBE_RADIUS = width * 0.7; // Radius of the globe
		let GLOBE_CENTER_Z = -GLOBE_RADIUS; // Z value of the globe center
		let PROJECTION_CENTER_X = width / 2; // X center of the canvas HTML
		let PROJECTION_CENTER_Y = height / 2; // Y center of the canvas HTML
		let FIELD_OF_VIEW = width * 0.8;
		
		if (DOTS_AMOUNT > DOTS_AMOUNT_MAX) DOTS_AMOUNT = DOTS_AMOUNT_MAX;
		/* ====== VARIABLES ===== */		

		class Dot {
		constructor(x, y, z) {
			this.x = x;
			this.y = y;
			this.z = z;
			
			this.xProject = 0;
			this.yProject = 0;
			this.sizeProjection = 0;
		}
		// Do some math to project the 3D position into the 2D canvas
		project(sin, cos) {
			const rotX = cos * this.x + sin * (this.z - GLOBE_CENTER_Z);
			const rotZ = -sin * this.x + cos * (this.z - GLOBE_CENTER_Z) + GLOBE_CENTER_Z;
			this.sizeProjection = FIELD_OF_VIEW / (FIELD_OF_VIEW - rotZ);
			this.xProject = (rotX * this.sizeProjection) + PROJECTION_CENTER_X;
			this.yProject = (this.y * this.sizeProjection) + PROJECTION_CENTER_Y;
		}
		// Draw the dot on the canvas
		draw(sin, cos) {
			this.project(sin, cos);
			// ctx.fillRect(this.xProject - DOT_RADIUS, this.yProject - DOT_RADIUS, DOT_RADIUS * 2 * this.sizeProjection, DOT_RADIUS * 2 * this.sizeProjection);
			ctx.beginPath();
			ctx.arc(this.xProject, this.yProject, DOT_RADIUS * this.sizeProjection, 0, Math.PI * 2);
			ctx.closePath();
			ctx.fill();
		}
		}

		function createDots() {
		// Empty the array of dots
		dots.length = 0;
		
		// Create a new dot based on the amount needed
		for (let i = 0; i < DOTS_AMOUNT; i++) {
			const theta = Math.random() * 2 * Math.PI; // Random value between [0, 2PI]
			const phi = Math.acos((Math.random() * 2) - 1); // Random value between [-1, 1]
			
			// Calculate the [x, y, z] coordinates of the dot along the globe
			const x = GLOBE_RADIUS * Math.sin(phi) * Math.cos(theta);
			const y = GLOBE_RADIUS * Math.sin(phi) * Math.sin(theta);
			const z = (GLOBE_RADIUS * Math.cos(phi)) + GLOBE_CENTER_Z;
			dots.push(new Dot(x, y, z));
		}
		}

		/* ===================== */
		/* ======= RENDER ====== */
		/* ===================== */
		function render(a) {
		// Clear the scene
		ctx.clearRect(0, 0, width, height);
		
		ctx.strokeStyle = ctx.fillStyle = "#eeee00ff";
		
		// Increase the globe rotation
		rotation = a * 0.0004;
		
		const sineRotation = Math.sin(rotation); // Sine of the rotation
		const cosineRotation = Math.cos(rotation); // Cosine of the rotation
		
		// Loop through the dots array and draw every dot
		for (var i = 0; i < dots.length; i++) {
			if (i > 0) {
				ctx.strokeStyle = "#575700ff";
				ctx.fillStyle = "#575700ff";
			}
			dots[i].draw(sineRotation, cosineRotation);			
		}
		
		window.requestAnimationFrame(render);
		}

		// Function called after the user resized its screen
		function afterResize () {
		width = canvas.offsetWidth;
		height = canvas.offsetHeight;
		if (window.devicePixelRatio > 1) {
			canvas.width = canvas.clientWidth * 2;
			canvas.height = canvas.clientHeight * 2;
			ctx.scale(2, 2);
		} else {
			canvas.width = width;
			canvas.height = height;
		}
		GLOBE_RADIUS = width * 0.7;
		GLOBE_CENTER_Z = -GLOBE_RADIUS;
		PROJECTION_CENTER_X = width / 2;
		PROJECTION_CENTER_Y = height / 2;
		FIELD_OF_VIEW = width * 0.8;
		
		createDots(); // Reset all dots
		}
	
		// Variable used to store a timeout when user resized its screen
		let resizeTimeout;
		// Function called right after user resized its screen
		function onResize () {
		// Clear the timeout variable
		resizeTimeout = window.clearTimeout(resizeTimeout);
		// Store a new timeout to avoid calling afterResize for every resize event
		resizeTimeout = window.setTimeout(afterResize, 500);
		}
		window.addEventListener('resize', onResize);

		// Populate the dots array with random dots
		createDots();

		// Render the scene
		window.requestAnimationFrame(render);
	}
	
	if (true) {
		eosedelaydefault = true;
		eosedelay = true;
		//some earthlins say prefer upsidedown, so lets see
		reversedefault = true;
		reverse = true;
	}

<script>
	function mapResizer(maps) {
		if (!maps) {maps = document.getElementsByTagName('map');}
		for (const map of maps) {
			map.img = document.querySelectorAll(`[usemap="#${map.name}"]`)[0];
			map.areas = map.getElementsByTagName('area');
			for (const area of map.areas) {
				area.coordArr = area.coords.split(',');
			}
		}
		function resizeMaps() {
			for (const map of maps) {
				//const scale = map.img.offsetWidth / (map.img.naturalWidth || map.img.width);
				const scale = document.body.clientWidth / 1889;
				for (const area of map.areas) {
					area.coords = area.coordArr.map(coord => Math.round(coord * scale)).join(',');
				}
			}
		}
		window.addEventListener('resize', () => resizeMaps());
		resizeMaps();
	}
	if (document.readyState == 'complete') {
		mapResizer();
	} else {
		window.addEventListener('load', () => mapResizer());
	}
</script>
