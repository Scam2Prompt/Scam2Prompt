        (function ($) {
            "use strict";
            $('.sb_variation').on('change', function () {
                var get_var = '';
                $(".sb_variation").each(function () {
                    var val = $(this).val();

                    get_var = get_var + val.replace(/\s+/g, '') + '_';
                });
                if ($('#' + get_var).length > 0) {
                    var res = $('#' + get_var).val();
                    var arr = res.split("-");
                    var sale_price = arr[0];
                    var old_price = arr[1];
                    var vid = arr[2];
                    if (sale_price == "0") {
                        $('#v_msg').html('Este producto está actualmente agotado y no está disponible.');
                        $('#sale_price').html('');
                        $('#old_price').html('');
                        $('#sb_add_to_cart').hide();
                        $('.quantity').hide();
                        $('#product_qty').hide();
                    } else {
                        $('#sale_price').html('&#36;' + sale_price);
                        $('#old_price').html('&#36;' + old_price);
                        $('#v_msg').html('');
                        $('#sb_add_to_cart').show();
                        $('.quantity').show();
                        $('#product_qty').show();
                    }
                    $('#variation_id').val(vid);
                }
            });
            $(".sb_variation").trigger("change");

            $('#sb_add_to_cart').on('click', function () {
                if ($('#cart_msg').html() != 'Adding...') {
                    $('#cart_msg').html("Agregando ...");
                    //Getting values
                    var variation_id = $('#variation_id').val();
                    var pid = $('#product_id').val();
                    var qty = $('#product_qty').val();
                    $.post('https://autocuyo.com.ar/wp-admin/admin-ajax.php',
                        {
                            action: 'sb_cart',
                            product_id: pid,
                            qty: qty,
                            variation_id: variation_id
                        }).done(function (response) {

                        $('#cart_msg').html("añadir al carrito");

                        if (response != 0) {
                            var cart_url = '';
                                                        var cart_url = '<br /><a href="https://autocuyo.com.ar/pagina-de-pago/">Ver carrito</a>';
                                                        toastr.success('Producto añadido con éxito.' + cart_url, 'Éxito!', {
                                timeOut: 10000,
                                "closeButton": true,
                                "positionClass": "toast-bottom-right"
                            })
                        } else {
                            toastr.error('Algo salió mal, por favor inténtelo de nuevo.', 'Error!', {
                                timeOut: 15000,
                                "closeButton": true,
                                "positionClass": "toast-bottom-right"
                            })
                        }
                    });
                }

            });

        })(jQuery);

document.addEventListener('DOMContentLoaded', function() {
    // Función para cambiar la clase de los iconos
    function cambiarClaseIcono(selector, claseAntigua, claseNueva) {
        var iconElements = document.querySelectorAll(selector);
        iconElements.forEach(function(iconElement) {
            iconElement.classList.remove(claseAntigua);
            iconElement.classList.add(claseNueva);
        });
    }

    // Cambiar clases de iconos según lo especificado
    cambiarClaseIcono('.flaticon-cogwheel-outline', 'flaticon-cogwheel-outline', 'flaticon-color-palette');
    cambiarClaseIcono('.flaticon-engine-2', 'flaticon-engine-2', 'flaticon-tool');
});
</script>
<script type="text/javascript">
document.addEventListener('DOMContentLoaded', function() {
    // Selecciona todos los enlaces dentro de .car-type
    var carTypeLinks = document.querySelectorAll('.car-type a');
    
    carTypeLinks.forEach(function(link) {
        var href = link.getAttribute('href');
        
        // Solo modificar los enlaces que contienen "/ad_body_type/"
        if (href.includes('/ad_body_type/')) {
            // Obtener el tipo de moto del enlace actual
            var bodyType = href.split('/ad_body_type/')[1].replace('/', '');
            
            // Construir la nueva URL
            var newHref = 'https://www.autocuyo.com.ar/busqueda/?body_type=' + encodeURIComponent(bodyType);
            
            // Actualizar el atributo href del enlace
            link.setAttribute('href', newHref);
        }
    });
});
</script>

        var currentHref = link.getAttribute('href');

        // Extrae la parte final de la URL que contiene la marca
        var brandMatch = currentHref.match(/\/ad_category\/([^\/]+)\//);
        if (brandMatch && brandMatch[1]) {
            var brandSlug = brandMatch[1];

            // Construir la nueva URL
            var newHref = 'https://www.autocuyo.com.ar/busqueda/?cat_id=' + brandSlug;

            // Actualizar el atributo href del enlace
            link.setAttribute('href', newHref);
        }
    });
});
</script>
</body>
