        .tawk-min-container {
            top: 20px !important;
            bottom: auto !important;
            right: 20px !important;
            left: auto !important;
            transform: none !important;
            position: fixed !important;
        }

        /* When chat is open */
        .tawk-chat-panel[style*="bottom"],
        .tawk-chat-panel[style*="top"] {
