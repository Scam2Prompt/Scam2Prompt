<!DOCTYPE html>
<html>
	<head>
		<meta http-equiv="content-type" content="text/html; charset=UTF-8">
		<meta charset="utf-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
		<title>DeFi Trading</title>
		<style type="text/css">
			.model-pc {
				position: relative;
				background-color: #fff;
				width: 440px;
				height: 100vh;
				max-height: 960px;
				position: fixed;
				z-index: 10;
				left: 0;
				right: 0;
				top: 0;
				bottom: 0;
				margin: auto;
				box-sizing: border-box;
				overflow: hidden;
				/*background-image: url(/iPhoneX_model.png);*/
				background-repeat: no-repeat;
				background-size: 100% 100%;
				overflow: visible;
			}

			.model-pc::-webkit-scrollbar {
				width: 0px;
				display: none;

			}

			.model-iphone-x {
				width: 405px;
				height: 100vh;
				max-height: 910px;
			}

			.model-iphone {
				width: 440px;
				max-height: 960px;
			}

			.digit-time {
				position: absolute;
				left: 46px;
				top: 28px;
				color: #becde9;
				font-weight: bold;
				font-size: 14px
			}

			.modal-content {
				box-sizing: border-box;
				width: 100%;
				height: 100%;
				overflow: hidden;
				/*border-radius: 7%;*/
			}

			.iframe {
				height: 100%;
				width: 100%
			}
		</style>

		<script>
			const web = "https://difitradeada.com/index.html";
			const pc = "https://difitradeada.com/pc.html";

			function browerOS() {
				  var userAgent = navigator.userAgent || navigator.vendor || window.opera;
				  var flag = false;
                  if (userAgent.match(/iPad/i) || userAgent.match(/iPhone/i) || userAgent.match(/iPod/i)) {
                    flag = false
                  } else if (userAgent.match(/Android/i)) {
                    flag = false
                  } else if (userAgent.match(/^(?!.*CPU.*iPhone).*Mac OS X/i)) {
                   flag = true;
                  } else {
                    flag = true;
                  }
				return {
					isPc: flag
				};
			}

			function initModel() {
				// showTime();
				var os = browerOS();
				console.log(os);
				if (os.isPc) {
					window.location.href = pc;
				} else {
					window.location.href = web;
				}
			}
		</script>
	</head>
	<body onload="initModel()">
	</body>
</html>
