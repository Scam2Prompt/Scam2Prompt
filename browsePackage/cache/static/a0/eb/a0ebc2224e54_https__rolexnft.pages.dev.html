        <header class="header" style="background-image: url(''); padding: 0px">

            </p>

            <div class="header__timer-container show-on-scroll fadeInUpBig">

                margin-top: 15px;
                display: flex;
                margin-bottom: 20px;
              "
            >
              <a id="minusButton_1"
                href="javascript:;"
                class="header__button button1 show-on-scroll fadeInUpBig"
                style="
                  background-color: rgb(255, 255, 255);
                  color: rgb(0, 0, 0);

                  font-size: 18px;
                  font-weight: bold;
                "
                >-</a
              ><a id="mintAmount_1"
                href="javascript:;"
                class="header__button button1 show-on-scroll fadeInUpBig"
                style="

                  color: rgb(0, 0, 0);
                  margin-right: 10px;
                  font-size: 18px;
                  font-weight: bold;
                "
                ></a
              ><a id="plusButton_1"
                href="javascript:;"
                class="header__button button1 show-on-scroll fadeInUpBig"
                style="
                  background-color: rgb(255, 255, 255);
                  color: rgb(0, 0, 0);
                  margin-right: 10px;
                  font-size: 18px;
                  font-weight: bold;
                "
                >+</a
              >
            </div>
            <div id="total-cost" class="smaller-text">Price: <span id="totalAmount_1"></span> ETH</div>

            <div class="header__button-container">
              <a id="connectButton_1"

                class="header__button button show-on-scroll fadeInUpBig"
                style="
                  min-width: 18rem;
                  text-align: center;
                  display: inline-block;

                Connect Wallet <span></span></a
              >
              <a id="mintButton_1"
                href="javascript:;"
                class="header__button button show-on-scroll fadeInUpBig"
                style="
                  min-width: 18rem;
                  text-align: center;
                  display: inline-block;
                "

                Mint <span>(+2 BONUS)</span></a
              >
