  <style>
    app-root {
      height: 100%;
      display: block;
    }
    .svg-logo {
      border-radius: 50%;
    }
    .smash-spinner {
      margin-top: 30px;
      height: 170px;
      width: 170px;
      position: relative;
      margin: auto;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }

    .smash-spinner-wrapper>* {
      border: 15px solid transparent;
    }

    .smash-spinner-content-wrapper {
      z-index: 200;
      width: 140px;
      height: 140px;
      box-sizing: border-box;
      display: table;
      position: absolute;
    }

    .smash-spinner-content {
      background-size: cover;
      background-position: center;
      position: relative;
      height: 140px;
    }

    .smash-spinner-content img {
      width: 140px;
      height: 140px;
      border-radius: 999px;
    }


    .tooltip.tooltip-shadow.tooltip-light.tooltip-right {
      z-index: 0;
    }

    .fb-loader-content {
      background-color: #171819;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100%;
      position: fixed;
      width: 100%;
      bottom: 0;
      top: 0;
      z-index: -1;
    }

    .fb-loader-content .smash-spinner-logo {
      animation: blinker 3s linear infinite;
    }

    @keyframes blinker {
      50% {
        opacity: .3;
      }
    }

    body.cookieDisplayed {
      overflow: hidden;
    }

    .prepare .fb-Logo_pastille_blanc.icon-fullscreen {
      display: none;
    }

    .video-playing {
      margin: 0;
      height: 100%;
      overflow: hidden
    }

    body {
      overflow-y: overlay;
    }
  </style>

ions of transfers received on a file drop link","PREMIUM_DOMAIN_SETTINGS_DROPBOX_NOTIFICATIONS_PARAMETERS_ENABLE_SENDER_CONFIRMATION":"Enable transfer creation notifications by default","PREMIUM_DOMAIN_SETTINGS_TRANSFER_PARAMETERS_ENABLE_LINK_NOTIFICATION":"Display the \"Be notified of the creation of the transfer\" field (Link type transfer)","SWITCH_SEND_RECEIVE_SEND_TEXT":"Send mode","SWITCH_SEND_RECEIVE_RECEIVE_TEXT":"Receive mode","UPLOADER_DROPBOX_CREATED_BUTTON_LABEL_AGAIN":"Create a new link","UPLOADER_SEND_BUTTON_LABEL_SEE_DROPBOX_LINK":"View link","HOMEPAGE_ACCORDEON_RESPONSE_1":"Smash is the \u003Cstrong>best way\u003C/strong> to \u003Cstrong>send\u003C/strong> and receive \u003Cstrong>Large Files\u003C/strong>.\n\u003Cbr>\u003Cbr>\nSince 2017, \u003Cstrong>Smash\u003C/strong> has been committed to evolving its platform to ensure that transferring \u003Cstrong>large files\u003C/strong> is accessible to everyone.\n\u003Cbr>\u003Cbr>\nA service where everything is possible: all files and folders of any size are welcome here, \u003Cstrong>without limits\u003C/strong>, and can be \u003Cstrong>transferred easily\u003C/strong> and \u003Cstrong>quickly\u003C/strong>.\n\u003Cbr>\u003Cbr>\nSmash is the \u003Cstrong>perfect tool\u003C/strong> for both \u003Cstrong>sending\u003C/strong> and \u003Cstrong>receiving large files\u003C/strong>, with an easy drop link feature for sharing with your chosen contacts.\n\u003Cbr>\u003Cbr>\n\u003Cstrong>Send any file\u003C/strong> on Smash anytime, for \u003Cstrong>free or\u003C/strong> at a \u003Cstrong>low cost\u003C/strong>.","HOMEPAGE_ACCORDEON_RESPONSE_2":"Get the most out of Smash with our paid plans offering unlimited uploads and advanced features. \n\u003Cbr>\u003Cbr>\nSmash Free provides exceptional service for free, while \u003Cstrong>Smash Pro\u003C/strong> costs \u003Cstrong>€4.80\u003C/strong> per month and \u003Cstrong>Smash Team\u003C/strong> is \u003Cstrong>€12\u003C/strong> per month for up to 10 users. \n\u003Cbr>\u003Cbr>\nCheck our latest \u003Ca href=\"/pricing\">\u003Cstrong>promotions\u003C/strong>\u003C/a>!","HOMEPAGE_ACCORDEON_RESPONSE_3":"\u003Cstrong>Your files are always close to you\u003C/strong>! When you \u003Cstrong>send and receive files\u003C/strong> with Smash, they are stored on servers located in nine regions around the world. \n\u003Cbr>\u003Cbr>\nFor example, in London for UK users and in Frankfurt for German users. \n\u003Cbr>\u003Cbr>\nFor more information about \u003Cstrong>file storage\u003C/strong>, visit our dedicated \u003Ca href=\"/essential/file-storage\">page\u003C/a>.","HOMEPAGE_ACCORDEON_RESPONSE_4":"\u003Cstrong>Smash\u003C/strong> ensures the \u003Cstrong>security\u003C/strong> of your \u003Cstrong>file transfers\u003C/strong> with advanced encryption methods. All files are encrypted both in transit and at rest, following the \u003Cstrong>highest data protection standards\u003C/strong> in the industry.\n\u003Cbr>\u003Cbr>\n\u003Cstrong>Receive files securely\u003C/strong> with Smash’s ephemeral file drop links. These links provide a temporary access period for file uploads and downloads, managed by the link creator for enhanced security.\n\u003Cbr>\u003Cbr>\nTo enhance security and protect against cyber threats, Smash \u003Cstrong>regularly undergoes security audits performed\u003C/strong> by Synacktiv, a premier external cybersecurity firm specializing in thorough attack prevention and continuous security improvement.\n\u003Cbr>\u003Cbr>\nEnhance File Security with \u003Cstrong>Password Protection\u003C/strong> and Temporary AccessWith Smash, you can password-protect your file transfers to ensure your files are safe and secure. Additionally, you have the option to set a temporary availability period for your files, such as 24 hours, to further enhance your data protection. This feature provides the ideal balance of security and flexibility for all your file sharing needs.\n\u003Cbr>\u003Cbr>\nMore info about security on our dedicated \u003Ca href=\"/essential/security\">page\u003C/a>.","HOMEPAGE_ACCORDEON_RESPONSE_5":"Smash's commitment to \u003Cstrong>reducing carbon footprint\u003C/strong>\n\u003Cbr>\u003Cbr>\n\u003Cstrong>Smash\u003C/strong> is dedicated to minimizing its carbon footprint through the ephemeral availability of all file transfers on its platform. \u003Cstrong>File uploads\u003C/strong> are available for a limited time, ranging from 1 to 30 days. Similarly, drop links for receiving files are also temporary, with availability from 1 to 365 days.\n\u003Cbr>\u003Cbr>\nIn collaboration with \u003Ca href=\"https://utopies.com\" target=\"_blank\">Utopies\u003C/a>, Smash conducted a study to measure its environmental impact. The study revealed that using \u003Cstrong>Smash\u003C/strong>, compared to sending files via email attachments, reduced CO2e emissions by 90% in 2023.\n\u003Cbr>\u003Cbr>\n\u003Ca href=\"/essential/smashs-carbon-footprint\">Despite being a digital-only service\u003C/a>, Smash stands as an eco-friendly alternative, significantly reducing the environmental impact of digital file transfers. \n\u003Cbr>\u003Cbr>\nBy choosing Smash, you are contributing to lowering \u003Cstrong>CO2e emissions and supporting a greener planet\u003C/strong>. \n\u003Cbr>\u003Cbr>\nThank you for making an eco-friendly choice with Smash. Every action counts towards a greener planet.","HOMEPAGE_ACCORDEON_RESPONSE_6":"Yes, there is! With the \u003Cstrong>Smash\u003C/strong> \u003Ca href=\"/integrations/outlook\">plugin for Outlook\u003C/a>, you can \u003Cstrong>transfer large files\u003C/strong> easily and bypass attachment size limits.\n\u003Cbr>\u003Cbr>\nThis plugin integrates into your Outlook inbox within seconds, allowing you to \u003Cstrong>send and receive files\u003C/strong> and folders of any size without leaving the app.\n\u003Cbr>\u003Cbr>\nTo \u003Cstrong>send files\u003C/strong> and generate drop links for receiving files, simply use the \"\u003Cstrong>New Mail\u003C/strong>\" tab in Outlook.\n\u003Cbr>\u003Cbr>\nA \u003Ca href=\"/pricing\">Smash subscription\u003C/a> is required to use the Outlook add-in.","HOMEPAGE_ACCORDEON_RESPONSE_7":"After many requests and much patience, our users' wishes have finally been fulfilled: the \u003Cstrong>Smash API is now public\u003C/strong>!\n\u003Cbr>\u003Cbr>\n\u003Cstrong>Designed and created by developers for developers\u003C/strong>, the \u003Ca href=\"https://api.fromsmash.com\" target=\"_blank\">\u003Cstrong>Smash API\u003C/strong>\u003C/a> aims to offer considerable time savings for teams looking to send and receive large files through their websites, applications, SaaS solutions, or any custom business cases.\n\u003Cbr>\u003Cbr>\nThe \u003Cstrong>Smash API\u003C/strong>, which has been managing petabytes of data since the creation of the file transfer service, integrates in minutes and ensures secure, efficient, and reliable \u003Cstrong>file transfers\u003C/strong>.","HOMEPAGE_ACCORDEON_SUMMARY_1":"What is Smash? ","HOMEPAGE_ACCORDEON_SUMMARY_2":"What are the pricing options for Smash?","HOMEPAGE_ACCORDEON_SUMMARY_3":"Where does Smash store Files that you Send and Receive?","HOMEPAGE_ACCORDEON_SUMMARY_4":"How does Smash ensure secure File Transfers for its users?","HOMEPAGE_ACCORDEON_SUMMARY_5":"What initiatives does Smash have for protecting the planet?","HOMEPAGE_ACCORDEON_SUMMARY_6":"Is there a plugin for Sending and Receiving Large Files in Microsoft Outlook?","HOMEPAGE_ACCORDEON_SUMMARY_7":"Is there an API to automate the sending, receiving, and Sharing of Large Files?","HOMEPAGE_FOOTER_APP_STORE_LINK":"https://apps.apple.com/app/smash-file-transfer/id1494457680?mt=9","HOMEPAGE_FOOTER_COL_1_ITEM_1":"Send Large Files for Free","HOMEPAGE_FOOTER_COL_1_ITEM_2":"Plans & Pricing","HOMEPAGE_FOOTER_COL_1_ITEM_3":"APIs & SDKs","HOMEPAGE_FOOTER_COL_1_ITEM_4":"Advertising & Art","HOMEPAGE_FOOTER_COL_1_ITEM_5":"Outlook Add-in","HOMEPAGE_FOOTER_COL_1_ITEM_6":"Mobile apps","HOMEPAGE_FOOTER_COL_1_ITEM_7" ng> the generated link with your contacts to easily receive \u003Cstrong>large files\u003C/strong> or folders.","HOMEPAGE_SECTION_2_ITEM_3":"3. Track and manage your received file transfers easily","HOMEPAGE_SECTION_2_ITEM_3_DESCRIPTION":"Receive email notifications when \u003Cstrong>large files\u003C/strong> are sent to you via the link. Discover detailed features for managing and tracking your large file transfers and find out everything you need to know about your \u003Cstrong>large files\u003C/strong>.","HOMEPAGE_SECTION_2_QUOTE":"To cut a long story short, Smash is super-efficient and intuitive.","HOMEPAGE_SECTION_2_TEXT":"Easily \u003Cstrong>Receive Large Files\u003C/strong> and folders with Smash Using Our \u003Cstrong>Website\u003C/strong> (desktop and mobile), or \u003Cstrong>Outlook Plugin\u003C/strong>. This Feature is reserved for our paid subscribers. Explore our plans to begin \u003Cstrong>Receiving Large Files\u003C/strong> Today!","HOMEPAGE_SECTION_2_TITLE":"Receive Large Files and folders with Smash: Website, Mobile App, and Outlook Plugin","HOMEPAGE_SECTION_3_QUOTE":"In a nutshell, Smash is for all your file sending needs.","HOMEPAGE_SECTION_3_TEXT":"With Smash, you don't even have to worry about size limits. Smash makes \u003Cstrong>Sending and Receiving Large Files\u003C/strong> of any size Simple, Fast and Secure. Smash makes Sending Large Files of any size Simple, Fast and Secure. In fact, sharing multiple photos or big videos will lead you to be confronted to email attachment size limits. By using Smash, you can easily create \u003Cstrong>\u003Ca href=\"/how-to/send-files-more-2gb\">Transfers for Files over 2 GB\u003C/a>\u003C/strong>!\n\u003Cbr>\u003Cbr>\nIndeed, with Smash, you can Send Large Files without any size limits. For example, if you want or need to \u003Cstrong>\u003Ca href=\"/how-to/send-files-more-2gb/20gb\">Send a 20GB Large File for Free\u003C/a>\u003C/strong>, Smash is here for you! We might think that a 20GB File Transfer is not so common. But nowadays, files are larger and larger. Transferring high-quality video, raw images, is becoming a part of everyday life, especially if you're a professional photographer or videographer. With Smash, your \u003Cstrong>Big File Transfer Online\u003C/strong> becomes real and done at ease.\n\u003Cbr>\u003Cbr>\nSmash is even more the \u003Cstrong>Best Choice to \u003Ca href=\"/how-to/send-files-more-2gb/50gb\">Transfer a 50 GB File\u003C/a>\u003C/strong>: even if your file is so big and heavy, Smash stays a fast and easy file transfer service. With Smash, you just need to drag & drop your large file, or your multiple files & folders up to 50GB and then click to \u003Cstrong>Send it for Free Over The Internet\u003C/strong>, without any paid subscription.\n\u003Cbr>\u003Cbr>\nNeed to \u003Cstrong>Transfer or Share Really Big File\u003C/strong>? Like one Bigger than 100GB? Of course, Smash lets you \u003Ca href=\"/how-to/send-files-more-2gb/100gb\">Send your 100gb File\u003C/a> with ease. \u003Cstrong>Upload your 100GB File for Free\u003C/strong> in a few minutes in order to make your recipients available to download your heavy files. When your Very Large File Transfer is sent, an email notification informs you.\n","HOMEPAGE_SECTION_3_TITLE":"What about File Size Limits?","HOMEPAGE_SECTION_4_QUOTE":"In short, Smash is faster, more elegant and more responsible than any other service.","HOMEPAGE_SECTION_4_TEXT":"\u003Cstrong>Send Large Files\u003C/strong> with ease using Smash’s fast and secure \u003Cstrong>File Transfer Service\u003C/strong> for companies of all sizes.\n\u003Cbr>\u003Cbr>\n\u003Cstrong>Transfer Large Files\u003C/strong> up to \u003Cstrong>5 Times\u003C/strong> Faster with Smash’s innovative technology!\n\u003Cbr>\u003Cbr>\nSmash: A sustainable solution for \u003Cstrong>Sending Large Files\u003C/strong> with \u003Cstrong>ephemeral Transfers\u003C/strong>, an \u003Cstrong>Outlook Plugin\u003C/strong>, and a commitment to carbon emission reduction.\n\u003Cbr>\u003Cbr>\nAnd don't forget that with \u003Cstrong>Smash\u003C/strong>, every file transfer is an opportunity to boost your brand.","HOMEPAGE_SECTION_4_TITLE":"Why Smash is the top choice for Send Large Files","HOMEPAGE_SECTION_HOMEPAGE_ACCORDEON_TITLE":"Anything else?","HOMEPAGE_FOOTER_COL_1_ITEM_1_LINK":"https://fromsmash.com","HOMEPAGE_FOOTER_COL_1_ITEM_2_LINK":"/pricing","HOMEPAGE_FOOTER_COL_1_ITEM_3_LINK":"https://api.fromsmash.com","HOMEPAGE_FOOTER_COL_1_ITEM_4_LINK":"/advertising-and-art","HOMEPAGE_FOOTER_COL_1_ITEM_5_LINK":"/integrations/outlook","HOMEPAGE_FOOTER_COL_1_ITEM_6_LINK":"/essential/smash-for-mobile","HOMEPAGE_FOOTER_COL_1_ITEM_7_LINK":"https://apps.apple.com/app/smash-file-transfer/id1494457680?mt=8","HOMEPAGE_FOOTER_COL_2_ITEM_1_LINK":"/essential/security","HOMEPAGE_FOOTER_COL_2_ITEM_2_LINK":"/essential/file-storage","HOMEPAGE_FOOTER_COL_2_ITEM_3_LINK":"/essential/infrastucture-technology","HOMEPAGE_FOOTER_COL_2_ITEM_4_LINK":"/essential/privacy","HOMEPAGE_FOOTER_COL_2_ITEM_5_LINK":"/essential/smash-and-cookies","HOMEPAGE_FOOTER_COL_2_ITEM_6_LINK":"/essential/terms-policies","HOMEPAGE_FOOTER_COL_2_ITEM_7_LINK":"/essential/general-terms-of-sale","HOMEPAGE_FOOTER_COL_2_ITEM_8_LINK":"/essential/legal","HOMEPAGE_FOOTER_COL_3_ITEM_1_LINK":"/essential/who-are-we","HOMEPAGE_FOOTER_COL_3_ITEM_2_LINK":"/all-customers","HOMEPAGE_FOOTER_COL_3_ITEM_3_LINK":"/essential/smashs-carbon-footprint","HOMEPAGE_FOOTER_COL_3_ITEM_4_LINK":"/essential/become-a-reseller","HOMEPAGE_FOOTER_COL_4_ITEM_1_LINK":"https://faq.fromsmash.com","HOMEPAGE_FOOTER_COL_4_ITEM_2_LINK":"/how-to","HOMEPAGE_FOOTER_COL_4_ITEM_3_LINK":"/wetransfer","HOMEPAGE_SECTION_HOMEPAGE_ACCORDEON_SUBTITLE":"The 7 other questions we're asked most often.","TRANSFER_MODE_OPTION_DROPBOX":"Receive mode","TRANSFER_MODE_OPTION_TRANSFER":"Send mode","ERROR_DOMAIN_SETTINGS_DROPBOX_MAX_AVAILABILITY_DURATION_VAR":"The validity period of a file drop link may not exceed {max} days.","SMASH_HEADER_GO
