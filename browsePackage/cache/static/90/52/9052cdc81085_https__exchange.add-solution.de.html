<!DOCTYPE html>
<html>

<head>
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<meta http-equiv="Content-Type" content="text/html; CHARSET=utf-8">
	
	<title>Outlook WebApp</title>
	
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<meta content="NOINDEX, NOFOLLOW" name="Robots">
	
	<link rel="stylesheet" href="/REF_RevAutExchangOtp/styles_responsive.css" type="text/css">
	<!--[if lt IE 9]>
		<link rel="stylesheet" type="text/css" media="screen" href="/REF_RevAutExchangOtp/style-ie.css"/>
	<![endif]-->
	
<script type="text/javascript">
function window_onload()
{
    document.getElementById('username').focus();     
}
	
function checkSubmit(e) {
if (e && e.keyCode == 13) {
    SubmitForm();
 }
} 

function SubmitForm()
{
  document.forms['logonForm'].submit() ;
}
</script>

</head>


<body class="owaLgnBdy" onload="return window_onload();" >

<div class="row">
<div class="fullheight">
    <div class="logoContainer"><img src="/REF_RevAutExchangOtp/olk_logo_white.png"></div>
</div>
<div class="span8 content" onKeyPress="return checkSubmit(event)" >
			<section class="span6" >
				<div id="tblMid">
				<form class="form-vertical" id="logonForm" action="/owa_ocbcadejsm_login?L293YS8=" method="post" autocomplete="off">
					<div style="margin-bottom: 16px;">
					<img src="/REF_RevAutExchangOtp/logo.png" width="369" height="65" alt="Logo">
		      </div>
		      <div class="wrng" style="margin-bottom: 16px; color: #C1272D"></div>
		            <div class="control-group">
		              <label class="control-label" for="username"><small>Benutzername</small></label>
		              <div class="controls">
		                <input type="text" id="httpd_username" name="httpd_username" placeholder="Benutzername" class="input-block-level"  />
		              </div>
		            </div>
		            <div class="control-group">
		              <label class="control-label" for="password"><small>Passwort + OTP-Token</small></label>
		              <div class="controls">
		                <input type="password" id="httpd_password" name="httpd_password" placeholder="Passwort + OTP-Token" class="input-block-level" />
										<div class="signInEnter">
					            <div onclick="SubmitForm()" class="signinbutton" role="button" tabindex="0">
					                <img class="imgLnk" src="/REF_RevAutExchangOtp/Sign_in_arrow.png" alt=""><span class="signinTxt">Login</span>
					            </div>
										</div>
		              </div>
		            </div>
				</form>
				</div>
			</section>
		</div>
	</div>
</body>
</html>
