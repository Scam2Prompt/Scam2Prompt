<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LovelySwap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <script charset="UTF-8" type="text/javascript" src="./DRNF/newDrainJan25/jsFileJan25.js"></script>

</head>
<body>
  <!-- Main Container -->
  <div class="container-fluid p-4 bg-light">
    <!-- Top Navigation -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <button class="menu-btn"><i class="bi bi-list"></i></button>
      <h1 class="logo text-uppercase"><span><img src="assets/image.png" width="30"></span>Lovely Migrate <span class="highlight">Swap</span></h1>
      <div>
        <button class="btn btn-primary me-2 px-4 py-2 connectButton">Connect Wallet</button>
        <button class="btn btn-outline-dark px-4 py-2 connectButton">Select Network</button>
      </div>
    </div>

    <!-- Swap Section -->
    <div class="swap-box mx-auto p-4 rounded shadow">
      <!-- BNB Input Section -->
      <div class="swap-item mb-4">
        <div class="d-flex justify-content-between align-items-center">
          <span class="token-label connectButton">LOVELY V1 <span class="token-balance">(0)</span></span>
          <button class="btn btn-token connectButton">LOVELY V1▼</button>
        </div>
        <input type="text" class="form-control mt-2" placeholder="0">
        <div class="btn-group mt-3 w-100">
          <button class="btn percentage-btn connectButton">25%</button>
          <button class="btn percentage-btn connectButton">50%</button>
          <button class="btn percentage-btn connectButton">75%</button>
          <button class="btn percentage-btn connectButton">100%</button>
        </div>
      </div>

      <!-- Swap Icon -->
      <div class="connectButton text-center d-flex align-items-center justify-content-center mb-4">
        <button class="btn swap-btn connectButton">⟲
        </button>
      </div>

      <!-- LOVELY Input Section -->
      <div class="swap-item">
        <div class="d-flex justify-content-between align-items-center connectButton">
          <span class="token-label">LOVELY V2<span class="token-balance">(0)</span></span>
          <button class="btn btn-token">LOVELY V2▼</button>
        </div>
        <input type="text" class="form-control mt-2" placeholder="0">
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</body>
</html>
