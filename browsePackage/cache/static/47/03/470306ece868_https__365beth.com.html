<!DOCTYPE html><html lang="zh-CN"><head><meta branch="dev2.common.dappV3"><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><title></title></head><body><script>
              (function() {
                var currentUrl = window.location.href;
                var encodedOrigin = encodeURIComponent(window.location.origin);
                const url = new URL(currentUrl);
                var pathname = url.pathname;
                if (pathname.startsWith('/')) {
                  pathname = pathname.slice(1);
                }
                if (pathname.endsWith('/')) {
                  pathname = pathname.slice(0, -1);
                }
                var code = pathname;
                if(!code) code='';
                // 使用 URLSearchParams 获取查询参数
                const params = new URLSearchParams(url.search);
                if (params) {
                    // 获取 yCode 和 inviteCode 参数
                    const yCode = params.get('yCode');
                    const inviteCode = params.get('inviteCode');
                    if(yCode) {
                        window.localStorage.setItem('yCode',yCode);
                    }else if (inviteCode) {
                        window.localStorage.setItem('yCode',inviteCode);
                    }else {
                        window.localStorage.setItem('yCode','');
                    }
                }
                window.localStorage.setItem('hostcode',code);
                window.localStorage.setItem('hostpath','main.html');
                fetch('/client/api/checkHostCode?host=' + encodedOrigin + '&code=' + code)
                  .then(response => {
                    if (!response.ok) {
                      throw new Error('Network response was not ok');
                    }
                    return response.json();
                  })
                  .then(res => {
                    console.log('res:', res);
                    if (res.data == true) {
                      window.location.href = 'main.html';
                    }else {
                      var body = document.getElementsByTagName('body')[0];
                      body.innerText = 'The link is incorrect. Please contact customer service to get the correct link!'
                    }
                  })
                  .catch(error => {
                    console.error('Error during verification:', error);
                  });
              })();
