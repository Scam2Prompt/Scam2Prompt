    <script>
        // Function to show/hide navigation based on scroll
        window.addEventListener('scroll', function() {
            const desktopNav = document.querySelector('.desktop-scroll-nav');
            const mobileNav = document.querySelector('.mobile-scroll-nav');

            if (window.innerWidth >= 768) {
                // Show desktop navigation on scroll
                if (window.scrollY > 0) {
                    desktopNav.style.display = 'block';
                } else {
                    desktopNav.style.display = 'none';
                }
                mobileNav.style.display = 'none'; // Hide mobile nav
            } else {
                // Show mobile navigation on scroll
                if (window.scrollY > 0) {
                    mobileNav.style.display = 'block';
                } else {
                    mobileNav.style.display = 'none';
                }
                desktopNav.style.display = 'none'; // Hide desktop nav
            }
        });
    </script>
