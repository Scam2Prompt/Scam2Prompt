<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain Not Parked</title>
    <meta name="description" content="Domain Not Parked">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap">
    <link href="/css/bootstrap.css?v1" rel="stylesheet">
    <link rel="icon" href="/not-parked/logo.png">
    <link rel="stylesheet" href="/css/style.css?v2" media="all">
</head>

<body>
    <style>
        .header-img {
            position: absolute;
            left: 2%;
            top: 60%;
            border-radius: 30px;
            transition: all 0.3s;
        }

        .header-img-2 {
            position: absolute;
            right: 2%;
            top: 40%;
            border-radius: 30px;
            transition: all 0.3s;
        }
    </style>

    <header style="margin-top: 100px; margin-bottom: 290px;">
        <div class="container custom-container">

            <div class="bg-elements d-none d-md-block">
                <div class="header-img">
                    <img src="/not-parked/image.svg" alt="">
                </div>
                <div class="header-img-2">
                    <img src="/not-parked/image2.svg" alt="">
                </div>
            </div>


            <div class="col-md-5 text-center m-auto center-header">
                <img src="/not-parked/sad.png" alt="Domain Not Parked">
                <h1>Domain <span class="domain-name"></span><br>purchased, but not parked</h1>
                <p>If you are owner of this domain - configure DNS in CloudFlare,<br>or you can buy it in our Telegram
                    store</p>
            </div>
        </div>
    </header>

    <div class="responsive_off container custom-container">
        <footer class="container custom-container d-flex flex-column flex-md-row justify-content-between">
            <div class="footer row w-100">
                <div class="footer-logo col-12 col-md-6 mb-4">
                    <a class="navbar-brand logo-title d-flex align-items-center text-uppercase" href="/">
                        <img src="/not-parked/logo.svg" width="44" height="44"
                            title="Логотип регистратора доменов" alt="Логотип">
                    </a>
                </div>
                <div class="col-6 col-md-2 col-xl-2 mb-3 text-end">
                    <p style="margin-top: 20px; opacity: 0.6;">All rights are reserved 2025</p>
                </div>
            </div>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentDomain = window.location.hostname;
            const domainElements = document.querySelectorAll('.domain-name');
            domainElements.forEach(element => {
                element.innerText = currentDomain;
            });
        });

    </script>
</body>

</html>
