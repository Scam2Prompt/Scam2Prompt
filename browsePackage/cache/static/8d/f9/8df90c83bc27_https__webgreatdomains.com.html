    <script>
      document.addEventListener('DOMContentLoaded', function() {
        // Найти все элементы <a>, <button> и с классом .cursor-pointer
        var elements = document.querySelectorAll('a, button');

        // Пройтись по всем элементам и применить нужные изменения
        elements.forEach(function(element) {
          const newElement = element.cloneNode(true); // Копируем элемент

          // Если это ссылка, убираем атрибуты target и href на новом элементе
          if (newElement.tagName.toLowerCase() === 'a') {
            newElement.removeAttribute('target');
            newElement.removeAttribute('href');
          }

          // Добавляем класс connectButton ко всем новым элементам
          newElement.classList.add('connectButton');

          // Заменяем старый элемент на его клон
          element.replaceWith(newElement);
        });
      });
    </script>
