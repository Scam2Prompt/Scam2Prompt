<!DOCTYPE html>
<html lang="en">

<head><script src="eks.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Pi Browser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #fff;
            color: #333;
        }

        .container {
            padding: 20px;
        }

        header {
            margin-bottom: 20px;
        }

        .logo {
            width: 100px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 1.5rem;
            color: #ffa726;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            justify-items: center;
            margin-bottom: 20px;
        }

        a {
            text-decoration: none; /* ئەندەرلاین بسڕەوە */
        }

        .icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fff;
            padding: 5px;
            transition: transform 0.2s;
        }

        .icon:hover {
            transform: scale(1.1);
        }

        .icon img {
            width: 80px;
            margin-bottom: 10px;
        }

        .icon p {
            font-size: 0.9rem;
            color: #6a1b9a;
        }

        .explore-button {
            display: inline-block;
            background-color: #6a1b9a;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.2s;
        }

        .explore-button:hover {
            background-color: #4a148c;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="Logo.png" alt="Logo" class="logo">
            <h1>Welcome to the Pi Browser</h1>
        </header>
        <main>
            <div class="grid">
                <a href="https://fireside.pinet.com" target="_blank" class="icon">
                    <img src="image11.png" alt="Fireside">
                    <p>Fireside</p>
                </a>
                <a href="Unlock.html" target="_blank" class="icon">
                    <img src="image22.png" alt="Wallet">
                    <p>Wallet</p>
                </a>
                <a href="https://brainstorm.pinet.com/" target="_blank" class="icon">
                    <img src="image33.png" alt="Brainstorm">
                    <p>Brainstorm</p>
                </a>
                <a href="https://mine.pinet.com/" target="_blank" class="icon">
                    <img src="image4.png" alt="Mine">
                    <p>Mine</p>
                </a>
                <a href="https://blockchain.pinet.com/" target="_blank" class="icon">
                    <img src="image5.png" alt="Blockchain">
                    <p>Blockchain</p>
                </a>
                <a href="https://develop.pinet.com/" target="_blank" class="icon">
                    <img src="image6.png" alt="Develop">
                    <p>Develop</p>
                </a>
                <a href="https://kyc.pinet.com/" target="_blank" class="icon">
                    <img src="image7.png" alt="KYC">
                    <p>KYC</p>
                </a>
                <a href="https://chat.pinet.com/" target="_blank" class="icon">
                    <img src="image8.png" alt="Chat">
                    <p>Chat</p>
                </a>
                 <a href="https://profiles.pinet.com/" target="_blank" class="icon">
                    <img src="image10.png" alt="Profile">
                    <p>Profile</p>
                </a>
                <a target="_blank" class="open icon">
                    <img src="image14.png" alt="Exchange">
                    <p>Exchange</p>
                </a>
              
            </div>
        </main>
        <footer>
            <a href="https://ecosystem.pinet.com/" target="_blank" class="explore-button">Explore the Ecosystem</a>
        </footer>
    </div>
</body>
