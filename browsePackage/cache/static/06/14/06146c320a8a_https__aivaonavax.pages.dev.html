  <script>
let scene, camera, renderer;
let flagGroup, flag, pole;
let loader;

let w, h;
if (window.innerWidth < 700) {
  w = 550;
  h = 450;
} else {
  w = 800;
  h = 700;
}
const [width, height] = [w, h];
const [sizeW, sizeH]  = [30, 20];
const [segW,  segH ]  = [30, 20];
const waveH  = 0.9;
const waveV  = 0.5;
const waveW  = 0.3;
const waveS  = 0.5;
const cameraAngle    = -40;
const cameraDistance = 40;
let flagColor = "#ffffff";
const defaultFlagUrl = "https://cdn.prod.website-files.com/67eee8a8f35371c8c3419343/67f01466392f3872d930b513_flag2.png";

function init() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(60, width / height, 1, 1000);
  scene.add(camera);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(width, height);
  const container = document.getElementById("renderArea");
  container.appendChild(renderer.domElement);

  const frontLight = new THREE.DirectionalLight("#ffffff", 0.5);
  frontLight.position.set(10, 50, 100);
  scene.add(frontLight);

  const ambientLight = new THREE.AmbientLight("#ffffff", 0.5);
  scene.add(ambientLight);

  const backLight = new THREE.DirectionalLight("#ab9261", 1);
  backLight.position.set(-50, 30, -100);
  scene.add(backLight);

  flagGroup = new THREE.Group();
  scene.add(flagGroup);

  const geometryPole = new THREE.CylinderGeometry(0.9, 0.3, 40, 16, 1);
  const materialPole = new THREE.MeshToonMaterial({ color: "#ab9261" });
  pole = new THREE.Mesh(geometryPole, materialPole);
  pole.position.set(-15, -10, 0);
  flagGroup.add(pole);

  const geometryFlag = new THREE.PlaneGeometry(sizeW, sizeH, segW, segH);
  loader = new THREE.TextureLoader();
  loader.load(defaultFlagUrl, texture => {
    texture.magFilter = THREE.LinearFilter;
    texture.minFilter = THREE.LinearFilter;
    const flagMaterial = new THREE.MeshLambertMaterial({
      color: flagColor,
      map: texture,
      side: THREE.DoubleSide
    });
    flag = new THREE.Mesh(geometryFlag, flagMaterial);
    flag.position.set(0, -1, 0);
    flagGroup.add(flag);
  });

  flagGroup.rotation.y = THREE.Math.degToRad(180);
  flagGroup.rotation.x = THREE.Math.degToRad(1);
  flagGroup.rotation.z = THREE.Math.degToRad(40);

  setCamera(cameraAngle);
  animate();
}

function setCamera(angleDeg) {
  camera.position.x = cameraDistance * Math.sin(angleDeg * Math.PI / 180);
  camera.position.z = cameraDistance * Math.cos(angleDeg * Math.PI / 180);
  camera.position.y = 0;
  camera.lookAt(new THREE.Vector3(0, 0, 0));
}

function animate() {
  requestAnimationFrame(animate);
  if (flag && flag.geometry && flag.geometry.vertices) {
    for (let y = 0; y <= segH; y++) {
      for (let x = 0; x <= segW; x++) {
        const index = x + y * (segW + 1);
        const vertex = flag.geometry.vertices[index];
        const time = Date.now() * waveS / 50;
        vertex.z = Math.sin(-waveH * x + waveV * y - time) * waveW * (x / 4);
      }
    }
    flag.geometry.verticesNeedUpdate = true;
  }
  renderer.render(scene, camera);
}

function updateFlag(newUrl) {
  if (!flag) return;
  loader.load(newUrl, texture => {
    texture.magFilter = THREE.LinearFilter;
    texture.minFilter = THREE.LinearFilter;
    flag.material.map = texture;
    flag.material.needsUpdate = true;
  });
}

const lettersAndSymbols = [
  "a","b","c","d","e","f","g","h","i","j","k","l","m",
  "n","o","p","q","r","s","t","u","v","w","x","y","z",
  "!","@","#","$","%","^","&","*","-","_","+","=",";",":","<",">",","
];

class TextAnimator {
  constructor(textElement) {
    if (!textElement || !(textElement instanceof HTMLElement)) {
      throw new Error("Invalid text element provided.");
    }
    this.textElement = textElement;
    this.originalChars = [];
    this.splitText();
  }

  splitText() {
    this.splitter = new SplitType(this.textElement, {
      types: "words, chars"
    });
    this.originalChars = this.splitter.chars.map(char => char.innerHTML);
  }

  animate() {
    this.reset();
    const chars = this.splitter.chars;
    chars.forEach((char, position) => {
      let initialHTML = char.innerHTML;
      gsap.fromTo(
        char,
        { opacity: 0 },
        {
          duration: 0.03,
          onComplete: () => gsap.set(char, { innerHTML: initialHTML, delay: 0.1 }),
          repeat: 2,
          repeatRefresh: true,
          repeatDelay: 0.05,
          delay: (position + 1) * 0.06,
          innerHTML: () => lettersAndSymbols[Math.floor(Math.random() * lettersAndSymbols.length)],
          opacity: 1
        }
      );
    });
    gsap.fromTo(
      this.textElement,
      { "--anim": 0 },
      {
        duration: 1,
        ease: "expo",
        "--anim": 1
      }
    );
  }

  animateBack() {
    gsap.killTweensOf(this.textElement);
    gsap.to(this.textElement, {
      duration: 0.6,
      ease: "power4",
      "--anim": 0
    });
  }

  reset() {
    const chars = this.splitter.chars;
    chars.forEach((char, index) => {
      gsap.killTweensOf(char);
      char.innerHTML = this.originalChars[index];
    });
    gsap.killTweensOf(this.textElement);
    gsap.set(this.textElement, { "--anim": 0 });
  }
}

document.addEventListener("DOMContentLoaded", () => {
  const textBlocks = Array.from(document.querySelectorAll(".grid_list .text-block"));
  if (!textBlocks.length) {
    console.warn("Aucun .text-block trouvé dans .grid_list !");
    return;
  }

  const textAnimators = textBlocks.map(block => new TextAnimator(block));
  let currentIndex = 0;
  let previousIndex = null;

  function highlightItem(index) {
    textBlocks.forEach(tb => tb.classList.remove("current-style"));
    const chosen = textBlocks[index];
    chosen.classList.add("current-style");
    const newFlagUrl = chosen.getAttribute("data-flag-url");
    if (newFlagUrl) {
      updateFlag(newFlagUrl);
    }
    if (previousIndex !== null && previousIndex !== index) {
      textAnimators[previousIndex].animateBack();
    }
    textAnimators[index].animate();
    previousIndex = index;
  }

  function openItemLink(index) {
    const chosen = textBlocks[index];
    const linkUrl = chosen.getAttribute("data-link-url");
    if (linkUrl) {
      window.location = linkUrl;
    }
  }

  textBlocks.forEach((block, i) => {
    block.addEventListener("mouseenter", () => {
      currentIndex = i;
      highlightItem(i);
    });
    block.addEventListener("click", () => {
      openItemLink(i);
    });
  });

  document.addEventListener("keydown", e => {
    if (e.key === "ArrowUp") {
      e.preventDefault();
      currentIndex--;
      if (currentIndex < 0) currentIndex = textBlocks.length - 1;
      highlightItem(currentIndex);
    } else if (e.key === "ArrowDown") {
      e.preventDefault();
      currentIndex++;
      if (currentIndex >= textBlocks.length) currentIndex = 0;
      highlightItem(currentIndex);
    } else if (e.key === "ArrowRight") {
      e.preventDefault();
      openItemLink(currentIndex);
    }
  });

  highlightItem(currentIndex);

  let startX = 0;
  let startY = 0;
  const swipeThreshold = 50;

  document.addEventListener("touchstart", (e) => {
    const touch = e.changedTouches[0];
    startX = touch.clientX;
    startY = touch.clientY;
  });

  document.addEventListener("touchend", (e) => {
    const touch = e.changedTouches[0];
    const endX = touch.clientX;
    const endY = touch.clientY;
    const dx = endX - startX;
    const dy = endY - startY;

    if (Math.abs(dx) > Math.abs(dy)) {
      if (dx > swipeThreshold) {
        openItemLink(currentIndex);
      }
    } else {
      if (dy < -swipeThreshold) {
        currentIndex--;
        if (currentIndex < 0) currentIndex = textBlocks.length - 1;
        highlightItem(currentIndex);
      } else if (dy > swipeThreshold) {
        currentIndex++;
        if (currentIndex >= textBlocks.length) currentIndex = 0;
        highlightItem(currentIndex);
      }
    }
  });
});

window.onload = init;
  </script>

<script src="https://unpkg.com/split-type"></script>

<script>
  const lettersAndSymbols = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h', 'i', 'j', 'k', 'l', 'm', 'n', 'o', 'p', 'q', 'r', 's', 't', 'u', 'v', 'w', 'x', 'y', 'z', '!', '@', '#', '$', '%', '^', '&', '*', '-', '_', '+', '=', ';', ':', '<', '>', ','];

  class TextAnimator {
    constructor(textElement) {
      if (!textElement || !(textElement instanceof HTMLElement)) {
        throw new Error('Invalid text element provided.');
      }
      this.textElement = textElement;
      this.originalChars = [];
      this.splitText();
    }

    splitText() {
      this.splitter = new SplitType(this.textElement, {
        types: 'words, chars'
      });
      this.originalChars = this.splitter.chars.map(char => char.innerHTML);
    }

    animate() {
      this.reset();
      const chars = this.splitter.chars;
      chars.forEach((char, position) => {
        let initialHTML = char.innerHTML;
        gsap.fromTo(char, {
            opacity: 0
          }, {
            duration: 0.03,
            onComplete: () => gsap.set(char, { innerHTML: initialHTML, delay: 0.1 }),
            repeat: 2,
            repeatRefresh: true,
            repeatDelay: 0.05,
            delay: (position + 1) * 0.06,
            innerHTML: () => lettersAndSymbols[Math.floor(Math.random() * lettersAndSymbols.length)],
            opacity: 1
          });
      });
      gsap.fromTo(this.textElement, {
        '--anim': 0
      }, {
        duration: 1,
        ease: 'expo',
        '--anim': 1
      });
    }

    animateBack() {
      gsap.killTweensOf(this.textElement);
      gsap.to(this.textElement, {
        duration: .6,
        ease: 'power4',
        '--anim': 0
      });
    }

    reset() {
      const chars = this.splitter.chars;
      chars.forEach((char, index) => {
        gsap.killTweensOf(char);
        char.innerHTML = this.originalChars[index];
      });
      gsap.killTweensOf(this.textElement);
      gsap.set(this.textElement, { '--anim': 0 });
    }
  }

const init = () => {
  document.querySelectorAll('.grid_list').forEach(item => {
    const cols = Array.from(item.querySelectorAll('.hover-effect'));
    const animators = cols.map(col => new TextAnimator(col));

    item.addEventListener('mouseenter', () => {
      animators.forEach(animator => animator.animate());
    });
    item.addEventListener('mouseleave', () => {
      animators.forEach(animator => animator.animateBack());
    });
  });

  document.querySelectorAll('a.hover-effect').forEach(item => {
    const animator = new TextAnimator(item);
    item.addEventListener('mouseenter', () => {
      animator.animate();
    });
    item.addEventListener('mouseleave', () => {
      animator.animateBack();
    });
  });
};

init();
</script>
