        * {
            font-family: monospace;
        }

        html,
        body {
            height: 100%;
            background-color: black;
        }

        .container {
            height: 100%;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .container-logo {
            width: 100px;
            border-radius: 100px;
            border: solid 2px rgb(59, 59, 59);
        }

        .container-box {
            border: solid 2px rgb(59, 59, 59);
            padding: 30px;
            border-radius: 30px;
            background-color: rgb(41, 41, 41);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1 !important;
        }

        .container-select {
            font-size: 20px;
            /* border-radius: 100px; */
            padding: 5px;
            color: black;

        }

        .container-button {
            font-size: 20px;
            background-color: white;
            border: none;
            cursor: pointer;
            color: black;
        }

        #popup {
            z-index: 99999;
        }
    </style>
