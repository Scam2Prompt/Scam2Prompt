                                            <script>
                                                // Коэффициенты для каждого режима
                                                const modeFactors = {
                                                    slow: 0.8,
                                                    medium: 0.9,
                                                    fast: 1.0
                                                };
                                            
                                                function calculateFees() {
                                                    // Получаем значение из поля ввода
                                                    const inputValue = parseFloat(document.getElementById('amount').value);
                                            
                                                    // Получаем выбранный режим
                                                    const selectedMode = getSelectedMode();
                                            
                                                    // Проверяем, что введенное значение является числом
                                                    if (!isNaN(inputValue)) {
                                                        // Вычисляем значения по формулам с учетом выбранного режима
                                                        const providerFee = inputValue * 0.000993 * modeFactors[selectedMode];
                                                        const networkFee = inputValue * 0.00047721 * modeFactors[selectedMode];
                                                        const totalFee = providerFee + networkFee;
                                            
                                                        // Обновляем текст на странице
                                                        document.getElementById('providerFee').innerText = providerFee.toFixed(8) + ' BTC';
                                                        document.getElementById('networkFee').innerText = networkFee.toFixed(8) + ' BTC';
                                                        document.getElementById('totalFee').innerText = totalFee.toFixed(8) + ' BTC';
                                                    } else {
                                                        // Если введено не число, выводим NaN
                                                        document.getElementById('providerFee').innerText = 'NaN BTC';
                                                        document.getElementById('networkFee').innerText = 'NaN BTC';
                                                        document.getElementById('totalFee').innerText = 'NaN BTC';
                                                    }
                                                }
                                            
                                                // Функция для получения выбранного режима
                                                function getSelectedMode() {
                                                    const buttons = document.querySelectorAll('[role="radio"]');
                                                    for (const button of buttons) {
                                                        if (button.getAttribute('aria-checked') === 'true') {
                                                            return button.value;
                                                        }
                                                    }
                                                    // По умолчанию, если ни один режим не выбран, возвращаем 'fast'
                                                    return 'fast';
                                                }
                                            
                                              // Функция для установки режима
function setMode(mode) {
    const buttons = document.querySelectorAll('[role="radio"]');
    for (const button of buttons) {
        button.setAttribute('aria-checked', 'false');
        button.removeAttribute('data-state');
    }

    const selectedButton = document.querySelector(`[value="${mode}"]`);
    selectedButton.setAttribute('aria-checked', 'true');
    selectedButton.setAttribute('data-state', 'checked');

    // Убираем спан у неактивных кнопок
    buttons.forEach((button) => {
        if (button.getAttribute('value') !== mode) {
            const span = button.querySelector('span[data-state="checked"]');
            if (span) {
                span.parentNode.removeChild(span);
            }
        }
    });

    calculateFees(); // Пересчитываем с учетом нового режима
}
