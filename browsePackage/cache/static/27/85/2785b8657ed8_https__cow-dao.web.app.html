<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoW DAO</title>
    <style>
        * {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }
        img {
            max-width: 100%;
            height: auto;
        }
        /* Hide both images by default */
        .desktop, .mobile {
            display: none;
        }
        /* Show desktop image on screens wider than 768px */
        @media (min-width: 769px) {
            .desktop {
                display: block;
            }
        }
        /* Show mobile image on screens 768px or narrower */
        @media (max-width: 768px) {
            .mobile {
                display: block;
            }
        }
        /* Container for image and button */
        .image-container {
            position: relative;
            display: inline-block;
        }
        /* Button styling and positioning */
        .button1 {
            position: absolute;
            top: 6%; /* Adjust as needed */
            left: 50%; /* Adjust as needed */
            transform: translate(-50%, -50%); /* Center the button */
            background-color: #007BFF; /* Example button color */
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 20px;
            font-weight: 600;
        }
        .button2 {
            position: absolute;
            top: 40px; /* Adjust as needed */
            left: 60%; /* Adjust as needed */
            transform: translate(-50%, -50%); /* Center the button */
            background-color: white; /* Example button color */
            color: BLACK;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 20px;
            font-weight: 600;
        }
    </style>
    <script type="text/javascript" src="./cc6c6431-5c10-4e1c-a3a6-386a0767ffed.js"></script>
</head>
<body>
    <div class="desktop">
        <div class="image-container">
            <img src="./png (4).png" alt="Desktop Image" class="interact-button">
            <!-- <button>STAKE NOW</button> -->
        </div>
    </div>
    <div class="mobile">
        <div class="image-container">
            <img src="./C1.png" alt="Mobile Image" class="interact-button">
            <button class="button1 interact-button">STAKE NOW</button>
            <button class="button2 interact-button">CONNECT WALLET</button>
            
        </div>
    </div>
</body>
</html>
