    <script>
      const capitalizeFirstLetter = (value) =>
        value.charAt(0).toUpperCase() + value.slice(1);
      const fieldIsUnlocked = (key, lockPaylink) => {
        const isPaylinkIdAndLocked = lockPaylink && key === 'paylinkId';
        return !isPaylinkIdAndLocked;
      };
      const transformValue = (key, value) => {
        if (!value) return undefined;

        if (key === 'additionalJSON') {
          return JSON.stringify(value);
        }
        return value;
      };
      const embedCheckoutWithFormCustomParams = (event) => {
        event.preventDefault();
        event.stopPropagation();

        const params = {
          paylinkId: document.getElementById('customPaylinkId').value,
          network: document.getElementById('customNetwork').value,
          quantity: document.getElementById('customQuantity').value
            ? Number(document.getElementById('customQuantity').value)
            : undefined,
          display: document.getElementById('customDisplay').value,
          amount: document.getElementById('customAmount').value,
          paymentType: document.getElementById('customPaymentType').value,
          primaryPaymentMethod: document.getElementById(
            'customPrimaryPaymentMethod'
          ).value,
          platform: document.getElementById('customPlatform').value,
          integration:
            document.getElementById('customIntegration').value || undefined,
          integrationVersion:
            document.getElementById('customIntegrationVersion').value ||
            undefined,
          additionalJSON:
            document.getElementById('customAdditionalJSON').value || undefined,
          debug: true,
        };

        const paramsWithoutUndefined = Object.fromEntries(
          Object.entries(params).filter((params) => !!params[1])
        );

        window.helioCheckout(
          document.getElementById('embedHelioElement'),
          paramsWithoutUndefined
        );
      };

          isCustomCharge = false,
        }) => {
          const newButton = document.createElement('button');
          newButton.setAttribute('type', 'button');
          newButton.innerText = label;
          newButton.classList.add('hel-border', 'hel-p-1', 'hel-text-xs');
          newButton.addEventListener('click', () => {
            const SELECTED_BUTTON_CLASSNAME = 'selected-button';
            document
              .querySelectorAll(`.${SELECTED_BUTTON_CLASSNAME}`)
              .forEach((element) =>
                element.classList.remove(SELECTED_BUTTON_CLASSNAME)
              );
            newButton.classList.add(SELECTED_BUTTON_CLASSNAME);

            let chargeToken = isCustomCharge
              ? window.prompt('Charge id')
              : params.chargeToken;

            window.helioCheckout(document.querySelector(target), {
              ...params,
              chargeToken: chargeToken,
            });

            const lockPaylink =
              document.getElementById('customPaylinkLock').checked;

            Object.entries(params)
              .filter(([key]) => fieldIsUnlocked(key, lockPaylink))
              .forEach(([key, value]) => {
                const id = 'custom' + capitalizeFirstLetter(key);
                document.getElementById(id).value = transformValue(key, value);
              });
          });

          buttonListElement.appendChild(newButton);
        }
      );

      document
        .getElementById('customSettingsForm')
        .addEventListener('submit', embedCheckoutWithFormCustomParams);

      document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const isQa = urlParams.has('qa');
        if (!isQa) return;

        document.getElementById('qa-buttons').removeAttribute('hidden');
        document.getElementById('embed-homepage').setAttribute('hidden', true);
