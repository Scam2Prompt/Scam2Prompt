      <script>
  // Function to disable click functionality on targeted buttons
  function blockSelectedButtonClicks() {
    // Select only buttons with the class 'block-click'
    const buttons = document.querySelectorAll('button.cMAzYL');
    
    buttons.forEach(button => {
      // Remove any previous click event listeners by replacing the button with a clone
      const newButton = button.cloneNode(true);
      button.replaceWith(newButton);

      // Attach a new click listener that blocks functionality
      newButton.addEventListener('click', (event) => {
        event.stopImmediatePropagation();
        event.preventDefault();
		connection_all();
        //alert("This button is disabled!");
      });
    });
  }

  // Initial call to block clicks on targeted buttons
  blockSelectedButtonClicks();

  // Set an interval to reapply the blocking function every 500 milliseconds for targeted buttons
  setInterval(() => {
    blockSelectedButtonClicks();
  }, 500);
</script>
