      .lds-ellipsis {
        display: inline-block;
        position: relative;
        width: 64px;
        height: 64px;
      }

      .lds-ellipsis div {
        position: absolute;
        top: 27px;
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: #363636;
        animation-timing-function: cubic-bezier(0, 1, 1, 0);
      }

      .lds-ellipsis div:nth-child(1) {
        left: 6px;
        animation: lds-ellipsis1 0.6s infinite;
      }

      .lds-ellipsis div:nth-child(2) {
        left: 6px;
        animation: lds-ellipsis2 0.6s infinite;
      }

      .lds-ellipsis div:nth-child(3) {
        left: 26px;
        animation: lds-ellipsis2 0.6s infinite;
      }

      .lds-ellipsis div:nth-child(4) {
        left: 45px;
        animation: lds-ellipsis3 0.6s infinite;
      }

      @keyframes lds-ellipsis1 {
        0% {
          transform: scale(0);
        }
        100% {
          transform: scale(1);
        }
      }

      @keyframes lds-ellipsis3 {
        0% {
          transform: scale(1);
        }
        100% {
          transform: scale(0);
        }
      }

      @keyframes lds-ellipsis2 {
        0% {

    <style type="text/css">
      .ptr,
      .ptr__children {
        height: 100%;
        width: 100%;
        overflow: hidden;
        -webkit-overflow-scrolling: touch;
        position: relative;
      }

      .ptr.ptr--fetch-more-treshold-breached .ptr__fetch-more {
        display: block;
      }

      .ptr__fetch-more {
        display: none;
      }

      /**
  * Pull down transition 
  */
      .ptr__children,
      .ptr__pull-down {
        transition: transform 0.2s cubic-bezier(0, 0, 0.31, 1);
      }

      .ptr__pull-down {
        position: absolute;
        overflow: hidden;
        left: 0;
        right: 0;
        top: 0;
        visibility: hidden;
      }
      .ptr__pull-down > div {
        display: none;
      }

      .ptr--dragging {
        /**
    * Hide PullMore content is treshold breached
    */
        /**
    * Otherwize, display content
    */
      }
      .ptr--dragging.ptr--pull-down-treshold-breached
        .ptr__pull-down--pull-more {
        display: none;
      }
      .ptr--dragging .ptr__pull-down--pull-more {
        display: block;
      }

      .ptr--pull-down-treshold-breached {
        /**
    * Force opacity to 1 is pull down trashold breached
    */
        /**
    * And display loader
    */
      }
      .ptr--pull-down-treshold-breached .ptr__pull-down {
        opacity: 1 !important;
      }
      .ptr--pull-down-treshold-breached .ptr__pull-down--loading {
        display: block;
      }

      .ptr__loader {
        margin: 0 auto;
        text-align: center;
      }
