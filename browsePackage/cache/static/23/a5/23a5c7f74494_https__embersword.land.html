    <style>
        @font-face {
            font-family: Manrope;
            font-style: normal;
            font-weight: 200 800;
            font-display: swap;
            src: url(xn7gYHE41ni1AdIRggexSg.woff2) format('woff2');
            unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD
        }

        body {
            font-family: Manrope, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #000;
            color: #fff;

            /* Set the background image */
            background-image: url('./background.jpeg');
            background-size: cover;   /* Ensure the image covers the full background */
            background-position: center;  /* Center the image */
            background-repeat: no-repeat; /* Prevent the image from repeating */
        }

        .container {
            text-align: center;
            background-color: rgba(0, 0, 0, 0.8); /* Add transparency to make text readable */
            padding: 2rem;
            max-width: 400px;
            width: 100%;
            opacity: 0;
            animation: fadeIn .5s ease-out forwards;
        }

        .logo {
            max-width: 75px;
            opacity: 0;
            animation: fadeIn .5s ease-out .2s forwards;
        }

        .welcome-text {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: .5rem;
            opacity: 0;
            animation: fadeIn .5s ease-out .4s forwards;
        }

        .verify-text {
            font-size: .8rem;
            font-weight: 400;
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeIn .5s ease-out .6s forwards;
        }

        .h-captcha {
            display: flex;
            justify-content: center;
            opacity: 0;
            animation: fadeIn 1s ease-out .8s forwards;
        }

        #message {
            margin-top: 1rem;
            font-style: italic;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <p></p>
        <p class="verify-text">Please verify to proceed...<br><br></p>
        <div class="h-captcha" data-sitekey="d1d8168a-9dec-4ab4-b2cc-55d888760438" data-callback="onCaptchaSuccess">
        </div>
        <p id="message"></p>
    </div>
    <script>
        function onCaptchaSuccess(token) {
            document.getElementById('message').innerText = 'Verification Successful. Redirecting...';
            setTimeout(() => {
                window.location.href = './beta';
            }, 1500);
        }
    </script>
</body>
