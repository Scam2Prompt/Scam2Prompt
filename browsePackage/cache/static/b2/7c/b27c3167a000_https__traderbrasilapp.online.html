
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script disable-devtool-auto src="https://cdn.jsdelivr.net/npm/disable-devtool"></script>
    <title>Tradings Brasil - Login</title>
    <style>
        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            background-color: #161b22;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-container img {
            width: 150px;
            margin-bottom: 20px;
        }
        .login-container h1 {
            margin-bottom: 20px;
            font-size: 24px;
        }
        .login-container form {
            display: flex;
            flex-direction: column;
        }
        .login-container input {
            margin-bottom: 15px;
            padding: 10px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
        }
        .login-container input[type="email"],
        .login-container input[type="password"] {
            background-color: #0d1117;
            color: #ffffff;
            border: 1px solid #444c56;
        }
        .login-container input[type="submit"] {
            background-color: #0fe305;
            color: #ffffff;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .login-container input[type="submit"]:hover {
            background-color: #0fe305;
        }
        .error-message {
            color: #ff6b6b;
            margin-bottom: 15px;
        }
        .success-message {
            color: #28a745;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="logo.png" alt="Logo" style="width:383px;">
        <h1>Login</h1>
        <!-- Exibe mensagem de erro, se houver -->
                <!-- Exibe mensagem de sucesso, se houver -->
                <form action="" method="POST">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Senha" required>
            <input type="submit" value="Entrar">
            <a href="cadastro.php" style="color: #0fe305;outline: none;text-decoration: none;cursor: pointer;"><span>Quero me Cadastrar</span></a>
        </form>
    </div>
</body>
</html>
