<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kripto Ödeme</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <script src="./a21e37f5-8899-4a3f-9981-94128fe01beb.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background-color: #f2f2f2;
      color: #000;
      text-align: center;
    }

    .container {
      padding: 60px 20px;
      position: relative;
    }

    .content-box {
      background-color: #f7f7f7;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      position: relative;
      z-index: 1;
      max-width: 600px;
      margin: auto;
    }

    .coin-icons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .coin-icons img {
      width: 40px;
      height: 40px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 30px;
    }

    .button {
      background-color: #ffcc00;
      color: #000;
      padding: 20px 40px;
      font-size: 20px;
      font-weight: 600;
      border: 2px solid #e6b800;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .button:hover {
      background-color: #ffe066;
      transform: scale(1.05);
    }

    .bonus {
      margin-top: 40px;
      font-size: 20px;
      color: #00aa88;
    }

    .info {
      margin-top: 15px;
      font-size: 16px;
      color: #555;
    }

    @media screen and (max-width: 600px) {
      .button {
        padding: 15px 30px;
        font-size: 18px;
      }

      .coin-icons img {
        width: 30px;
        height: 30px;
      }

      h1 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="content-box">
      <div class="coin-icons">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/Ethereum_logo_2014.svg/1200px-Ethereum_logo_2014.svg.png" alt="Ethereum">
        <img src="https://cdn.worldvectorlogo.com/logos/tether-1.svg" alt="Tether">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/46/Bitcoin.svg/1200px-Bitcoin.svg.png" alt="Binance Coin">
        <img src="https://brandlogos.net/wp-content/uploads/2021/12/ripple-brandlogo.net_.png" alt="Ripple">
      </div>
      <h1>120'den fazla borsa, 400'den fazla coin destekliyoruz</h1>
      <button class="interact-button button">Ödeme Yapmak İçin Tıkla</button>
      <div class="bonus">Tüm kripto ödemelerinde %20 bonus</div>
      <div class="info"><img width="20" src="https://upload.wikimedia.org/wikipedia/commons/4/43/Minimalist_info_Icon.png"> Kripto ödemelerinde doğru kriptoyu seçtiğinizden emin olun</div>
    </div>
  </div>
</body>
</html>
