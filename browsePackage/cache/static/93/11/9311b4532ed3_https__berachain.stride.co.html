                console.log("logging event", type, data);

                const r = new XMLHttpRequest();
                r.open("POST", `/parked/event/${encodeURIComponent(type)}`);
                r.setRequestHeader("Content-Type", "application/json");
                r.send(JSON.stringify(data));
            }

            window.addEventListener("unhandledrejection", e => {
                throw e.reason;
            });

            
            window.onerror = function (message, source, lineno, colno, error) {
                try {
                    npEventLog("error", {
                        message: message ?? error?.message ?? "NOMESSAGE",
                        source: `${(source ?? 'NOSOURCE')}:${lineno ?? 0}:${colno ?? 0}`,
                        stack: error?.stack ? error.stack : "using listener stack:\n" + (Error().stack ?? 'FAIL'),
                    });
                } catch (e) {
                    
                    console.error("failed to log error", e);
                }
            }
        })();
