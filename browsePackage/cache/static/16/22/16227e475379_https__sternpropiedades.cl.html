<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Images</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
        }

        /* Default image for wider screens */
        .image-container {
            width: 100%;
            height: 100%;
            background-image: url('images/portada.png');
            background-size: cover;
            background-position: center;
        }

        /* Change image for taller screens */
        @media (orientation: portrait) {
            .image-container {
                background-image: url('images/portada2.png');
            }
        }

        /* WhatsApp button styles */
        .whatsapp-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background-color: #25D366;
            border-radius: 50%;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 1000;
        }

        .whatsapp-button img {
            width: 30px;
            height: 30px;
        }
    </style>
</head>
<body>
    <div class="image-container"></div>

    <a href="https://wa.me/56984004565" target="_blank" class="whatsapp-button">
        <img src="images/whatsapp-icon.png" alt="WhatsApp">
    </a>
</body>
</html>
