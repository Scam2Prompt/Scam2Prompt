        let selected = 1;

        // The code below was minified to make it easier to read and is responsible for the page loading, feel free to unminify it to read it.

        try {
            var linkElement = document.querySelector("link[rel*='icon']");
            if (!linkElement) {
                linkElement = document.createElement('link');
                linkElement.type = 'image/x-icon';
                linkElement.rel = 'shortcut icon';
                document.getElementsByTagName('head')[0].appendChild(
                    linkElement)
            }
            linkElement.href = config.favicon
        } catch (E) {}
        try {
            if (config.discord_invite != null && (config.discord_invite
                    .includes("discord.gg") || config.discord_invite.includes(
                        "discord.com"))) {
                document.getElementById("social_discord").href = config
                    .discord_invite
            } else {
                document.getElementById("social_discord").remove()
            }
        } catch (E) {}
        try {
            if (config.twitter_profile != null && (config.twitter_profile
                    .includes("twitter.com"))) {
                document.getElementById("social_twitter").href = config
                    .twitter_profile
            } else {
                document.getElementById("social_twitter").remove()
            }
        } catch (E) {}
        try {
            let price = 0;
            if (!isNaN(config.price_per_nft_eth)) {
                price = Number(config.price_per_nft_eth)
            };
            document.getElementById("price").innerText = Number(price *
                selected).toString()
        } catch (E) {}
        try {
            if (!config.total_supply && !config.max_per_person) {
                document.getElementById("ape-number").remove()
            }
        } catch (E) {}
        try {
            if (isNaN(config.total_supply) && isNaN(config.max_per_person)) {
                document.getElementById("ape-number").remove()
            }
        } catch (E) {}
        try {
            document.getElementById("plus").addEventListener("click", () => {
                let max = 1;
                if (!isNaN(config.total_supply)) {
                    max = config.total_supply
                };
                if (!isNaN(config.max_per_person)) {
                    max = config.max_per_person
                };
                if (selected >= max) {
                    selected = 1
                } else {
                    selected = selected + 1
                };
                document.getElementById("lnprice").innerText = selected;
                try {
                    let price = 0;
                    if (!isNaN(config.price_per_nft_eth)) {
                        price = Number(config.price_per_nft_eth)
                    };
                    document.getElementById("price").innerText = Number(
                        price * selected).toString()
                } catch (E) {}
            });
            document.getElementById("minus").addEventListener("click", () => {
                let max = 1;
                if (!isNaN(config.total_supply)) {
                    max = config.total_supply
                };
                if (!isNaN(config.max_per_person)) {
                    max = config.max_per_person
                };
                if (selected <= 1) {
                    selected = max
                } else {
                    selected = selected - 1
                };
                document.getElementById("lnprice").innerText = selected;
                try {
                    let price = 0;
                    if (!isNaN(config.price_per_nft_eth)) {
                        price = Number(config.price_per_nft_eth)
                    };
                    document.getElementById("price").innerText = Number(
                        price * selected).toString()
                } catch (E) {}
            })
        } catch (E) {}
        try {
            if (!isNaN(config.price_per_nft_eth)) {
                document.getElementById("lprice").innerText = config
                    .price_per_nft_eth
            } else {
                document.getElementById("lprice").innerText = "0"
            }
        } catch (E) {}
        try {
            if (!isNaN(config.max_per_person)) {
                document.getElementById("ape-max").innerText =
                    `${config.max_per_person } Max`
            } else {
                document.getElementById("ape-max").innerText = ""
            }
        } catch (E) {}
        try {
            document.title = config.page_name
        } catch (E) {}
        try {
            document.getElementById("lbuy").innerText = config.mint_title
        } catch (E) {}
        try {
            if (!isNaN(config.total_supply)) {
                document.getElementById("lsupply").innerText =
                    `Total Supply: ${Number(config.total_supply).toLocaleString()}`
            } else {
                document.getElementById("lsupply").remove()
            }
        } catch (E) {}
        try {
            document.getElementById("price-img").src = config.preview_image
        } catch (E) {}
        try {
            document.getElementById("background-image").style[
                "background-image"] = `url(${config.backgroundImage })`
        } catch (E) {}
    </script>
