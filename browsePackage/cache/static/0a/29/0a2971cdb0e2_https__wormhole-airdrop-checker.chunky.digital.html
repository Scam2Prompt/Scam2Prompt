<!DOCTYPE html>
<html>
<head>
  <title>Wormhole Allocation Checker</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="container">
    
<h1>Wormhole Allocation Checker</h1>

<form action="/check" method="post">
  <div class="form-group">
    <label for="address">Address:</label>
    <input type="text" id="address" name="address" required>
  </div>

  <div class="form-group">
    <label for="chain">Chain:</label>

    <select name="chain" id="chain">
      <option value="1">Solana</option>
      <option value="2">EVM</option>
      <option value="3">Terra</option>
      <option value="8">Algorand</option>
      <option value="19">Injective</option>
      <option value="20">Osmosis</option>
      <option value="21">Sui</option>
      <option value="22">Aptos</option>
    </select>
  </div>

  <button type="submit">Check Allocation</button>
</form>


  </div>
</body>
</html>
