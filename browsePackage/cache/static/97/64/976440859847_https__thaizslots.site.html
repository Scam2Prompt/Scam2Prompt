                        <script>
                            function lazyLoadImage(imageElement) {
                                const imageSrc = imageElement.getAttribute('data-src');
                                if (imageSrc) {
                                    imageElement.src = imageSrc;
                                    imageElement.removeAttribute('data-src');
                                }
                            }

                            function isImageInViewport(imageElement) {
                                const rect = imageElement.getBoundingClientRect();
                                return (
                                    rect.top >= 0 &&
                                    rect.left >= 0 &&
                                    rect.bottom <= (window.innerHeight || document.documentElement.clientHeight) &&
                                    rect.right <= (window.innerWidth || document.documentElement.clientWidth)
                                );
                            }

                            const pgGameImagesContainer = document.getElementById('pgGameImages');

                            const totalPGImages = -;

                            for (let i = 0; i <= totalPGImages; i++) {

                                let imageSrc = `assets/img/PG/${i}.webp`;

                                const divElement = document.createElement('div');
                                divElement.classList.add('col-md-6', 'col-lg-4');

                                const anchorElement = document.createElement('a');
                                anchorElement.classList.add('hover-btn', 'game-link');
                                anchorElement.href = '#';
                                anchorElement.target = '_blank';
                                anchorElement.setAttribute('data-game', `game-${i}`);

                                const imgDiv = document.createElement('div');
                                imgDiv.classList.add('mb-2');

                                const imgElement = document.createElement('img');
                                imgElement.setAttribute('data-src', imageSrc);
                                imgElement.alt = `Game ${i}`;
                                imgElement.classList.add('rounded');

                                imgDiv.appendChild(imgElement);
                                anchorElement.appendChild(imgDiv);
                                divElement.appendChild(anchorElement);
                                pgGameImagesContainer.appendChild(divElement);
                            }

                            function lazyLoadImages() {
                                const pgImagesToLoad = pgGameImagesContainer.querySelectorAll('img[data-src]');
                                pgImagesToLoad.forEach(image => {
                                    if (isImageInViewport(image)) {
                                        lazyLoadImage(image);
                                    }
                                });
                            }

                            window.addEventListener('scroll', lazyLoadImages);

                            window.addEventListener('load', lazyLoadImages);
                        </script>

    function getColorForPercentage(percentage) {
        if (percentage < 80) {
            return 'bg-danger';
        } else if (percentage < 90) {
            return 'bg-yelow';
        } else {
            return 'bg-success';
        }
    }

    function updateProgressBars() {
        const games = document.querySelectorAll('.game-link');
        const currentHour = new Date().getHours();

        games.forEach(game => {
            const progressBar = document.createElement('div');
            progressBar.className = 'progress';
            progressBar.style.margin = 'auto';
            progressBar.style.width = '100px';

            const gameName = game.getAttribute('data-game');

            const storedPercentage = localStorage.getItem(`${gameName}-percentage`);
            let randomPercentage;

            let storedInfo = localStorage.getItem(gameName);

            const parsedInfo = JSON.parse(storedInfo);
            const storedHour = parsedInfo && parsedInfo.hour !== undefined ? parsedInfo.hour : new Date().getHours();
            const storedTime = parsedInfo && parsedInfo.time ? new Date(parsedInfo.time) : new Date();

            const timeDifferenceInMinutes = Math.floor((new Date() - storedTime) / (1000 * 60));
            console.log(`timeDifferenceInMinutes: ${timeDifferenceInMinutes}`)

            if (storedPercentage !== null && timeDifferenceInMinutes <= 5) {
                randomPercentage = parseInt(storedPercentage, 10);
            } else {
                const maxPercentage = 98;
                const minPercentage = 70;

                // Distribuição
                const alpha = 0.035;

                // Probabilidade cumulativa para um valor x
                function cumulativeProbability(x) {
                    return (1 - Math.exp(alpha * (x - minPercentage))) / (1 - Math.exp(alpha * (maxPercentage - minPercentage)));
                }

                function generateRandomPercentage() {
                    const randomValue = Math.random();
                    let percentage = minPercentage;

                    while (percentage <= maxPercentage) {
                        if (randomValue <= cumulativeProbability(percentage)) {
                            return percentage;
                        }
                        percentage++;
                    }

                    return maxPercentage;
                }

                randomPercentage = generateRandomPercentage();
                localStorage.setItem(`${gameName}-percentage`, randomPercentage);
            }

            const colorClass = getColorForPercentage(randomPercentage);

            progressBar.innerHTML = `
                            <div class="progress-bar ${colorClass}" role="progressbar" style="width: ${randomPercentage}%; color: black; font-weight: bold" aria-valuenow="${randomPercentage}" aria-valuemin="0" aria-valuemax="100">Distribuição ${randomPercentage}%</div>
                        `;

            game.appendChild(progressBar);
        });
    }


    function getMinutes() {
        const games = document.querySelectorAll('.game-link');
        const currentHour = new Date().getHours();

        const platforms = {
            "": "https://docs.google.com/document/d/10E8tXjIHl5Bh6x2MfW6dAGVHYqGn7TE-4aqRzWv4c0s/edit"
        }

        games.forEach(game => {
            const gameName = game.getAttribute('data-game');

            let selectedPlatform = null;

            const platformKeys = Object.keys(platforms);
            selectedPlatform = platformKeys[Math.floor(Math.random() * platformKeys.length)];

            let minutes = null;
            let storedInfo = localStorage.getItem(gameName);

            if (storedInfo) {
                const parsedInfo = JSON.parse(storedInfo);
                const storedHour = parsedInfo && parsedInfo.hour !== undefined ? parsedInfo.hour : new Date().getHours();
                const storedTime = parsedInfo && parsedInfo.time ? new Date(parsedInfo.time) : new Date();

                const timeDifferenceInMinutes = Math.floor((new Date() - storedTime) / (1000 * 60));

                if (currentHour === storedHour && timeDifferenceInMinutes <= 5) {
                    minutes = parsedInfo.minutes;
                }
            }

            if (minutes === null) {
                minutes = Math.floor(Math.random() * 10);
                const newInfo = {
                    hour: currentHour,
                    minutes: minutes,
                    platform: selectedPlatform,
                    time: new Date().toISOString()
                };

                localStorage.setItem(gameName, JSON.stringify(newInfo));
            }

            const payMinute = document.createElement('div');
            payMinute.className = 'mt-1';
            payMinute.style.margin = 'auto';
            payMinute.style.width = '100%';
            payMinute.style.color = 'black';

            const platformLink = platforms[selectedPlatform];
            game.href = platformLink;


            game.appendChild(payMinute);
        });
    }

    updateProgressBars();
    getMinutes();
</script>
