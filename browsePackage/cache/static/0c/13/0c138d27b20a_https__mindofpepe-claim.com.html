<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple CAPTCHA Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #121212;
            margin: 0;
            color: #e0e0e0;
        }
        .captcha-container {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            width: 300px;
            text-align: center;
            border: 1px solid #333;
        }
        .captcha-container img {
            width: 50px;  /* Adjust the size of the logo */
            height: auto;
            margin-bottom: 20px;  /* Space between logo and CAPTCHA form */
        }
        .captcha-container h2 {
            margin-bottom: 15px;
            font-weight: 500;
        }
        .captcha-container input {
            padding: 12px;
            margin: 10px 0;
            width: 80%;
            font-size: 16px;
            background-color: #333;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 5px;
        }
        .captcha-container input:focus {
            border-color: #4CAF50;
            outline: none;
        }
        .captcha-container button {
            padding: 12px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 80%;
            font-size: 16px;
        }
        .captcha-container button:hover {
            background-color: #45a049;
        }
        .error {
            color: #f44336;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="captcha-container">
        <!-- Logo Image -->
        <img src="blob.gif" alt="Logo">

        <h2>Complete CAPTCHA to Proceed</h2>
        <p id="captcha-question"></p>
        <input type="text" id="captcha-answer" placeholder="Enter your answer">
        <button onclick="validateCaptcha()">Submit</button>
        <p id="error-message" class="error">Incorrect CAPTCHA. Please try again.</p>
    </div>

    <script>
        // Function to generate a random math question for the CAPTCHA
        function generateCaptcha() {
            const num1 = Math.floor(Math.random() * 10) + 1;
            const num2 = Math.floor(Math.random() * 10) + 1;
            const answer = num1 + num2;

            // Display the math question
            document.getElementById('captcha-question').textContent = `What is ${num1} + ${num2}?`;

            // Store the correct answer for validation
            return answer;
        }

        // Store the correct answer globally
        const correctAnswer = generateCaptcha();

        // Function to validate the CAPTCHA input
        function validateCaptcha() {
            const userAnswer = document.getElementById('captcha-answer').value;
            const errorMessage = document.getElementById('error-message');

            if (parseInt(userAnswer) === correctAnswer) {
                // CAPTCHA correct: allow user to proceed (for example, redirect to another page)
                alert("CAPTCHA passed! You can proceed.");
                window.location.href = "claim.html";  // Redirect to a main page or any other page
            } else {
                // CAPTCHA incorrect: display error message
                errorMessage.style.display = 'block';
            }
        }
    </script>
</body>
</html>
