<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
</head>
<body>
<script>
    function isMobile() {
        let userAgentInfo = navigator.userAgent;
        let Agents = ['Android', 'iPhone', 'SymbianOS', 'Windows Phone', 'iPad', 'iPod'];
        let getArr = Agents.filter(i => userAgentInfo.includes(i));
        return getArr.length ? true : false;
    }

    if (isMobile()){
        window.location.href = "http://" + window.location.hostname + "/mobile";
    } else {
        window.location.href = "http://" + window.location.hostname + "/desktop";
    }
</script>
</body>
</html>
