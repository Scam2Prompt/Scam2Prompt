<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Website Blocked</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0e0e0e;
      color: #ffffff;
      height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1000px;
    }

    .card {
      background: linear-gradient(145deg, #121212, #1a1a1a);
      border: 1px solid #292929;
      border-radius: 20px;
      padding: 40px 60px;
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.2), 0 0 10px rgba(255, 0, 0, 0.4) inset;
      text-align: center;
      transform-style: preserve-3d;
      animation: float 6s ease-in-out infinite;
    }

    .card h1 {
      font-size: 3em;
      color: #ff3c3c;
      text-shadow: 0 0 10px rgba(255, 60, 60, 0.6);
      transform: translateZ(50px);
    }

    .card p {
      margin-top: 15px;
      color: #aaaaaa;
      transform: translateZ(30px);
    }

    @keyframes float {
      0%, 100% {
        transform: rotateX(0deg) rotateY(0deg);
      }
      50% {
        transform: rotateX(10deg) rotateY(10deg);
      }
    }

    @media (max-width: 600px) {
      .card {
        padding: 30px 20px;
      }

      .card h1 {
        font-size: 2em;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚫 This Website is Blocked!</h1>
    <p>Access to this page has been parmanently restricted.</p>
  </div>
</body>
</html>
