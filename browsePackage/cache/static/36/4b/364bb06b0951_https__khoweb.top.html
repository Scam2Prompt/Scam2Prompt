<div class="m-grid m-grid--hor m-grid--root m-page">
    <div class="m-grid__item m-grid__item--fluid m-grid m-grid--hor m-login m-login--signin m-login--2 m-login-2--skin-1"
         id="m_login" style="background-image: url(https://khoweb.top/login/images/bg-1.jpg) !important;">
        <div class="m-grid__item m-grid__item--fluid m-login__wrapper">
            <div class="m-login__container">
                <div class="m-login__logo">
                    <a href="#">
                        <img style="width: 50%" class=""
                             src="https://khoweb.top/filemanager/userfiles/logo hbweb.png"
                             title="HBsoft" alt="HBsoft"/>
                    </a>
                </div>
                                <div class="flash-container" style="left:15px;">
                                    </div>
                <div class="m-login__signin">
                    <div class="m-login__head">
                        <h3 class="m-login__title">HBsoft</h3>
                    </div>
                    <form method="post" class="m-login__form m-form" action="https://khoweb.top/admin/authenticate">
                        <div class="form-group m-form__group has-feedback">
                            <input style="color: #000;!important;" type="text" name="email" class="form-control m-input"
                                   placeholder="Email hoặc điện thoại">
                        </div>
                        <div class="form-group m-form__group has-feedback">
                            <input style="color:#000!important;" type="password" name="password"
                                   class="form-control m-input m-login__form-input--last" placeholder="Mật khẩu">
                        </div>
                        <div class="row m-login__form-sub">
                            <div class="col m--align-left m-login__form-left">
                                <label class="m-checkbox  m-checkbox--light">
                                    <input type="checkbox"
                                           name="remember_account"> Nhớ mật khẩu
                                    <span></span>
                                </label>
                            </div>
                            <div class="col m--align-right m-login__form-right">
                                <a href="/email-forgot-password" id="m_login_forget_password"
                                   class="m-link">Quên mật khẩu ?</a>
                            </div>
                        </div>
                        <div class="m-login__form-action">
                            <button type="submit"
                                    class="btn btn-focus m-btn m-btn--pill m-btn--custom m-btn--air  m-login__btn m-login__btn--primary">Đăng nhập</button>

                </div>
