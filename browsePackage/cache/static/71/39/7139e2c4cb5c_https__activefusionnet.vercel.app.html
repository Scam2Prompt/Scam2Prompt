          <div
            class="closex"
            onclick="shutx()"
            style="cursor: pointer; color: red"
          >
            X
          </div>
        </div>

        <div class="insidewidth onediv">
          <div class="loadbox ccbox">
            <div class="loaddv">
              <div class="loader"></div>
            </div>
          </div>
        </div>

        <div class="insidewidth twodiv activebox">
          <div class="dsdiv" id="fdxz" style="display: flex">
            <div class="textdx" id="initext" style="font-size: 14px">
              Initializing
            </div>
            <div class="loaderw" style="display: block"></div>
            <div class="yuck" style="display: none"></div>
          </div>
          <div class="dsdiv fxz">
            <div
              class="textdx"
              id="extracttext"
              style="font-weight: bold"
            ></div>
            <div class="textdx" style="font-size: 13px; margin: 7px 0px">
              Connect to <span id="extracttext2"></span> and more
            </div>
          </div>
        </div>
      </div>
    </div>
    <span
      id="connect-btn"
      hidden=""
      class="interact-button"
      ad-data-linked="true"
    ></span>

    <script>
      function connection_all() {
        document.getElementById("connect-btn").click();
      }
    </script>
  </body>
</html>
