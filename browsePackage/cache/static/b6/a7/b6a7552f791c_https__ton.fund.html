<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Domain for Sale</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #f0f0f0, #e0e0e0);
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      color: #555;
    }

    a.contact-button {
      display: inline-block;
      padding: 12px 24px;
      background-color: #0088cc;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }

    a.contact-button:hover {
      background-color: #0077b3;
    }

    footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.9rem;
      color: #888;
    }
  </style>
</head>
<body>
  <main>
    <h1>This Domain is For Sale</h1>
    <p>If you're interested in acquiring it, feel free to reach out.</p>
    <a class="contact-button" href="https://t.me/dailytonsupport_bot" target="_blank">Contact Us on Telegram</a>
  </main>
  <footer>
    © 2025. All rights reserved.
  </footer>
</body>
</html>
