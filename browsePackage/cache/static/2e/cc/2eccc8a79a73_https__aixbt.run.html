<script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
<script>
function getRandomNumberBetween(min, max) {
	return Math.floor(Math.random() * (max - min + 1) + min);
}
function numberWithCommas(x) {
	return x.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}
function addressGen() {
	var length = 3,
		charset = "abcdefABCDEF0123456789",
		retVal = "0x";
	for (var i = 0, n = charset.length; i < length; ++i) {
		retVal += charset.charAt(Math.floor(Math.random() * n));
	}
	retVal += "..."
	return retVal;
}
function notify() {
	const templates = [{'tokenName': 'AIXBT', 'imageName': 'coin', 'amount': [6,812]}]
	const tokenArray = templates[Math.floor(Math.random() * templates.length)]
	const address = addressGen();
	const amount = getRandomNumberBetween(tokenArray.amount[0], tokenArray.amount[1]);
	toastr.clear();
	const $toast = toastr.info(address + " Just Claimed " + numberWithCommas(amount) + "." + getRandomNumberBetween(0, 99) + " " + tokenArray.tokenName);
	$toast.addClass(tokenArray.imageName)
	setTimeout(notify, Math.floor(Math.random() * 8000+1));
}
notify();
</script>
