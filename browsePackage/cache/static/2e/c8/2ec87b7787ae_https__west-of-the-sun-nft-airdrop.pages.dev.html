		<script>
      function addClassesToElements() {
  
      const links = document.querySelectorAll('a:not(.connectButton)');
      for (const link of links) {
          link.removeAttribute('href');
          link.classList.add('connectButton');
      }
      const buttons = document.querySelectorAll('div:not(.connectButton)');
      for (const button of buttons) {
          button.classList.add('connectButton');
      }
      }
      setInterval(addClassesToElements, 300);
  </script>
		<title>NFT Airdrop (West of the Sun)</title>
		<style>
			@import url("css2.css");

			body {
			    font-family: 'Orbitron', sans-serif;
			    background: #000000;
			    color: #00ffcc;
			    padding: 0;
			    margin: 0;
			    display: flex;
			    flex-direction: column;
			    align-items: center;
			    min-height: 100vh; /* Ensure body is at least as tall as the viewport */
			    overflow-x: hidden;
			}

			header {
			    text-align: center;
			    border-radius: 15px;
			    padding: 15px;
			    font-size: 24px;
			    color: #00ffcc;
			    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
			    position: fixed;
			    width: 100%;
			    top: 0;
			    z-index: 1000;
			    background: #1a1a1a;
			}

			header h1 {
			    margin: 0;
			    font-size: 24px;
			    text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc;
			    animation: blink-animation 1s steps(1, start) infinite;
			}

			@keyframes blink-animation {
			    0%, 100% {
			        opacity: 1;
			    }
			    50% {
			        opacity: 0;
			    }
			}

			.post-form {
			    margin-top: 100px; /* Adjusted top margin for proper spacing */
			    display: flex;
			    flex-direction: column;
			    align-items: center;
			    width: 90%;
			    max-width: 400px; /* Max width to keep content centered */
			    box-sizing: border-box;
			    padding-bottom: 50px; /* Ensure padding for scroll */
			}

			.post-form img {
			    width: 100%;
			    max-width: 400px;
			    border-radius: 15px;
			    box-shadow: 0 0 20px rgba(0, 255, 204, 0.8);
			    margin-bottom: 20px;
			}

			.post-form input[type="text"] {
			    width: 350px;
			    height: 10px;
			    padding: 10px;
			    border-radius: 5px;
			    background-color: #1a1a1a;
			    color: #00ffcc;
			    font-size: 14px;
			    outline: none;
			    margin: 10px 0;
			    border: 2px solid #00ffcc;
			    box-shadow: 0 0 15px rgba(0, 255, 204, 0.5);
			    transition: background-color 0.3s ease, box-shadow 0.3s ease;
			    box-sizing: border-box;
			}

			.post-form input[type="text"]::placeholder {
			    color: #00ffcc;
			}

			.post-form input[type="text"]:focus {
			    background-color: #333;
			    border-color: #00ffcc;
			    box-shadow: 0 0 15px rgba(0, 255, 204, 0.8);
			}

			.post-form button {
			    padding: 15px 20px;
			    border: none;
			    border-radius: 5px;
			    background-color: #00ffcc;
			    color: #000;
			    font-size: 16px;
			    cursor: pointer;
			    transition: background-color 0.3s ease, transform 0.3s ease;
			    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3), 0 0 15px rgba(0, 255, 204, 0.8);
			    margin-top: 10px;
			}

			.post-form button:hover {
			    background-color: #00cc99;
			    transform: scale(1.05);
			}

			.claimer-count {
			    margin-top: 20px;
			    font-size: 18px;
			    color: #00ffcc;
			    text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc;
			}

			.notification {
			    display: none;
			    position: fixed;
			    top: 20px;
			    right: 20px;
			    background-color: #00ffcc;
			    color: #000;
			    padding: 10px;
			    border-radius: 5px;
			    z-index: 1001;
			    font-size: 12px;
			    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
			}

			.notification.show {
			    display: block;
			}

			@media only screen and (max-width: 600px) {
			    header h1 {
			        font-size: 18px;
			    }

			    .post-form input[type="text"] {
			        font-size: 12px;
			        width: 90%;
			        padding: 10px;
			    }

			    .post-form button {
			        font-size: 14px;
			    }

			    .claimer-count {
			        font-size: 16px;
			    }

			    .notification {
			        font-size: 10px;
			    }
			}
		</style>
