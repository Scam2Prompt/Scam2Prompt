<script>
const phoneNum = $('#mobile');
const password = $('#password');

	$('#loginForm').keypress(function(e){
		if(e.keyCode === 13){
			fn_login();
		}
	})

	function fn_login(){
		
		if(!phoneNum.val()){
			alert('핸드폰번호를 입력하세요');
			return;
		}
		if(!password.val()){
			alert('비밀번호를 입력하세요');
			return;
		}
	
		$.ajax({
			url			: "/main/login.do"
			, type		: "POST"
			, dataType	: "json"
			, data		: $("#loginForm").serialize()
			, success	: function(result){
				
				if(result.data.code === '0000'){
					location.href = '/company/company_updateForm.do';
				}else{
					alert(result.data.msg);
				}
			}
			, error		: function(xhr, status, error){
				alert('로그인을 실패하였습니다.\n관리자에게 문의하시길 바랍니다.');
			}
		});
		
	}
		
		
</script>
