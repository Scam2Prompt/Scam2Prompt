	<style>
		.init-loader{
			position: fixed;
			width: 95%;
			max-width: 600px;
			top: 50%;
			left: 50%;
			-webkit-transform: translate3d(-50%, -50%, 0);
    		transform: translate3d(-50%, -50%, 0);
			text-align: center;
		}
			
		.init-loader .init-progress{
			width: 100%;
			height: 10px;
			background: #ececec;
			position: relative;
			border-radius: 3px;
			overflow: hidden;
		}

		.init-loader .init-progress i{
			position: absolute;
			top: 0;
			left: 0;
			height: 100%;
			width: 0;
			transition: width 0.2s ease-in-out;
		}

		.init-loader .init-info {
			color: #636363;
			font-size: 90px;
			width: 3em;
			height: 1em;
			margin: 72px auto;
			position: relative;
			display: block;
			font-style: normal;
		}

		.init-loader .init-info strong{
			font-weight: normal;
		}

		.init-loader .init-file {
			color: #CCC;
			font-size: 6px;
			float: right;
			width: 100px;
			line-break: anywhere;
			border: 0;
			border-left: 1px solid #CCC;
			padding: 10px;
			box-sizing: border-box;
			margin-top: 20px;
			min-height: 65px;
			resize : none;
			outline: 0;
			overflow: hidden;
		}

		.preloader-logo {
			margin: 0 auto 50px;
			display: inline-block;
			max-width: 80%;
			min-height: 200px;
			object-fit: contain;
		}
		.init-loader h3{	
			font-size: 32px !important;
			font-weight: bold;
			font-family: IBM, 'sans-serif' !important;
		}
		.init-loader p{	
			font-size: 22px !important;
			color: #999;
			font-family: IBM, 'sans-serif' !important;
		}

<script>
	// Check that service workers are registered
	if ('serviceWorker' in navigator) {
	  // Use the window load event to keep the page load performant
	  window.addEventListener('load', () => {

		navigator.serviceWorker.getRegistration().then(function(reg) {
			// There's an active SW, but no controller for this tab.
			if (reg && reg.active && !navigator.serviceWorker.controller) {
				// Perform a soft reload to load everything from the SW and get
				// a consistent set of resources.
				window.location.reload();
			}
		});

	    navigator.serviceWorker.register('/sw.js')
	    .then(function(registration) {
			registration.update().then(function(update){
				setTimeout(function(){
					if(update && update.waiting){
						window.waitingSW = true;
					}
				}, 1000)
			})
	        console.log("Service Worker Registered", registration);
	    })
	    .catch(function(err) {
	        console.log("Service Worker Failed to Register", err);
	    })
	  });
	}
</script>
