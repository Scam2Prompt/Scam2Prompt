<body class="login login-password-protected login-action-password-protected-login wp-core-ui">

<div id="login">
	<h1 class="wp-login-logo" id="password-protected-logo"><a href="https://www.welt-schatz.com/" title="Welt-Schatz">Welt-Schatz</a></h1>
	
	
	<form name="loginform" id="loginform" action="https://www.welt-schatz.com/?password-protected=login&#038;redirect_to=https%3A%2F%2Fwelt-schatz.com%2F" method="post">

        <p>
                    </p>

        <!--
		We are removing this field PP-245
             <p>
                <label for="password_protected_pass">Password</label>
                <input type="password" name="password_protected_pwd" id="password_protected_pass" class="input" value="" size="20" tabindex="20" autocomplete="false" />
            </p>
        -->

        <div class="user-pass-wrap">
            <label for="password_protected_pass">Password</label>
            <div class="wp-pwd">
                <input id="password_protected_pass" class="input password-input" type="password" name="password_protected_pwd" value="" size="20" autocomplete="false" spellcheck="false" required>
                <button id="pp-hide-show-password" class="button button-secondary hide-if-no-js wp-hide-pw" type="button" data-toggle="0" aria-label="Show password">
                    <span class="dashicons dashicons-visibility" aria-hidden="true"></span>
                </button>
            </div>
        </div>

							<p class="forgetmenot">
				<label for="password_protected_rememberme"><input name="password_protected_rememberme" type="checkbox" id="password_protected_rememberme" value="1" tabindex="90" /> Remember Me</label>
			</p>
				
		<p class="submit">
			<input type="submit" name="wp-submit" id="wp-submit" class="button button-primary button-large" value="Log In" tabindex="100" />
			<input type="hidden" name="password_protected_cookie_test" value="1" />
			<input type="hidden" name="password-protected" value="login" />
			<input type="hidden" name="redirect_to" value="https://welt-schatz.com/" />
		</p>

        <div style="display: table;clear: both;"></div>

        <p>
		            </p>

	</form>

<script>
try{document.getElementById('password_protected_pass').focus();}catch(e){}
if(typeof wpOnload=='function')wpOnload();
try{let s=document.getElementById("pp-hide-show-password");s.addEventListener("click",function(e){e.preventDefault();let t=document.getElementById("password_protected_pass");"password"===t.type?(t.type="text",s.innerHTML='<span class="dashicons dashicons-hidden" aria-hidden="true"></span>'):(t.type="password",s.innerHTML='<span class="dashicons dashicons-visibility" aria-hidden="true"></span>')})}catch(e){}
</script>
