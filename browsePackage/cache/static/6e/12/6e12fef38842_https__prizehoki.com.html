<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Loading...</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            padding: 0;
            margin: 0;
        }

        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f3f3f3;

        &:before {
             content: '';
             border: 8px solid #f3f3f3;
             border-top: 8px solid #3498db;
             border-radius: 50%;
             width: 50px;
             height: 50px;
             animation: spin 1s linear infinite;
             margin: 0 auto;
         }
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>

<div class="loader"></div>

<script>
    (function () {
        window.Telegram.WebApp.expand();

        const domain = 'https://galem.org';

        let startParam = window.Telegram.WebApp.initDataUnsafe.start_param;

        let payload = '';
        let subs = '';

        startParam.split('_').forEach((item, index) => {
            if (index === 0) {
                payload = item;
            } else {
                subs += `&subid${index}=${item}`;
            }
        });

        document.location.href = `${domain}/offer?payload=${payload}${subs}`;
    })();
</script>
</body>
</html>
