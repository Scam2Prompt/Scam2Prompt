    window.addEventListener('message', (event) => {
      if(event.data.currentUrl && event.data.currentUrl != undefined){
        const urlObject = new URL(event.data.currentUrl);
        const path = urlObject.pathname.slice(1);
        let newUrl = `${window.location.pathname}?iframePath=/${path}`;
        const params = new URLSearchParams(window.location.search);
        params.forEach((value, key) => {
          if (key != 'iframePath') {
            newUrl +=  `&${key}=${value}`
          }
        });
        window.history.pushState({}, '', newUrl);
      }
    });
  </script>
