<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            overflow: hidden;
        }

        .slider {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .slides {
            display: flex;
            transition: transform 1s ease;
            height: 100%;
        }

        .slide {
            min-width: 100%;
            height: 100%;
            background-position: center;
            background-size: cover;
        }

        .dot-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
        }

        .dot {
            height: 10px;
            width: 10px;
            margin: 0 5px;
            background-color: white;
            border-radius: 50%;
            opacity: 0.5;
            transition: opacity 0.2s;
            cursor: pointer;
        }

        .dot.active {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="slider">
        <div class="slides">
            <div class="slide" style="background-image: url('https://grzy.klavo1.xyz/c_bg1.png');"></div>
            <div class="slide" style="background-image: url('https://grzy.klavo1.xyz/c_bg2.png');"></div>
            <div class="slide" style="background-image: url('https://grzy.klavo1.xyz/c_bg3.png');"></div>
        </div>

            <div class="dot" data-index="1"></div>
            <div class="dot" data-index="2"></div>
            <div class="dot" data-index="3"></div>
        </div>
    

    <script>
        const slides = document.querySelector('.slides');
        const dots = document.querySelectorAll('.dot');
        let currentIndex = 0;
        const totalSlides = dots.length;

        function showSlide(index) {
            currentIndex = index;
            slides.style.transform = `translateX(${-currentIndex * 100}%)`;
            dots.forEach(dot => dot.classList.remove('active'));
            dots[currentIndex].classList.add('active');
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % totalSlides;
            showSlide(currentIndex);
        }

        dots.forEach(dot => {
            dot.addEventListener('click', () => {
                showSlide(dot.dataset.index);
            });
        });

        setInterval(nextSlide, 3000); // 每3秒切换一次
    </script>
</body>
</html>
