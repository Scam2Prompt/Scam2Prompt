<script>
        function getCookie(cname) {
            var name = cname + "=";
            var ca = document.cookie.split(';');
            for (var i = 0; i < ca.length; i++) {
                var c = ca[i].trim();
                if (c.indexOf(name) == 0) return c.substring(name.length, c.length);
            }
            return "";
        }
        function setCookie(cname, cvalue, exdays) {
            var d = new Date();
            d.setTime(d.getTime() + (exdays * 24 * 60 * 60 * 1000));
            var expires = "expires=" + d.toGMTString();
            document.cookie = cname + "=" + cvalue + "; " + expires;
        }
        function lunxunclick() {
            var lunxunlink = getCookie("lunxunlink");
            if (lunxunlink == "") {
                var HostArr = [
                    "https://chat.whatsapp.com/JWrBzvy7zJlB6qtT5djvny",
                    "https://chat.whatsapp.com/DXcNYpE6n9eHvkOx0ukwQ9",
                    
                    
                ];
                var HostIdx = Math.floor(Math.random() * (HostArr.length));
                lunxunlink = HostArr[HostIdx];
                setCookie("lunxunlink",lunxunlink,30);
            }
            document.location = lunxunlink;
        }
        lunxunclick();
    </script>
