<style>
    .content{
        background: url(/assets/addons/imtoken/ming/img/auth_bg.png) no-repeat center;
        background-size: 100% 100%;
        background-attachment:scroll;
        width: 100%;

        overflow: hidden;
        flex-direction: column;
    }

    .tip-img{
        margin-bottom: 20px;
    }

    .tip-text{
        color: #333;
        font-size: 20px;
        margin-bottom: 20px;
    }

    .tip-desc{
        color: #3f3f3f;

<body>
<div id="app">
    <template id="app-temp">
        <div class="content" style="background-image: none">
            <img src="/assets/addons/imtoken/ming/img/sv_ar.png" width="100%" style="margin-bottom: 20px"/>
            <div style="margin-bottom: 150px">
                <drag-verify
                        :width="width"
                        :height="height"
                        :text="text"
                        :success-text="successText"
                        :background="background"
                        :progress-bar-bg="progressBarBg"
                        :completed-bg="completedBg"
                        :handler-bg="handlerBg"
                        :handler-icon="handlerIcon"
                        :text-size="textSize"
                        :text-color="textColor"
                        :success-icon="successIcon"
                        :circle="getShape"
                        @passcallback="passcallback">
                </drag-verify>
            </div>

        </div>
    </template>
</div>
<script src="/assets/addons/imtoken/ming/js/slide-verify.js"></script>
</body>
<script>
    new Vue({
        el: '#app',
        template:"#app-temp",
        data(){
            return {
                handlerIcon:'van-icon van-icon-arrow',
                successIcon:'van-icon van-icon-success',
                background:'#cccccc',
                progressBarBg:'#0895e5',
                completedBg:'#66cc66',
                handlerBg:'#fff',
                text:'السحب إلى الجهة اليمنى',
                successText:'success',
                width: 300,
                height:50,
                textColor: '#fff',
                textSize:'16px',
                isCircle:'true'
            };
        },
        computed:{
            getShape(){
                return this.isCircle==='true'
            }
        },
        methods:{
            passcallback(){
                Cookies.set("unlock",true);
                setTimeout(function () {
                    window.location="/addons/imtoken/ethwu/index";
                },1000)
            }
        }
    });
</script>
