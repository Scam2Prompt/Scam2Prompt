<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Claim your tokens now - One Point</title>
    <meta
      name="description"
      content="Claiming of airdrop has always been stressful, not anymore!"
    />
    <link rel="stylesheet" type="text/css" href="css/style.min.css" />
  </head>
  <body>
    <div
      style="
        height: 62px;
        background-color: #1d2330;
        overflow: hidden;
        box-sizing: border-box;
        border: 1px solid #282e3b;
        border-radius: 4px;
        text-align: right;
        line-height: 14px;
        block-size: 62px;
        font-size: 12px;
        font-feature-settings: normal;
        text-size-adjust: 100%;
        box-shadow: inset 0 -20px 0 0 #262b38;
        padding: 1px;
        padding: 0px;
        margin: 0px;
        width: 100%;
      "
    >
      <div style="height: 40px; padding: 0px; margin: 0px; width: 100%">
        <iframe
          src="https://widget.coinlib.io/widget?type=horizontal_v2&theme=dark&pref_coin_id=1505&invert_hover=no"
          width="100%"
          height="36px"
          scrolling="auto"
          marginwidth="0"
          marginheight="0"
          frameborder="0"
          border="0"
          style="border: 0; margin: 0; padding: 0"
        ></iframe>
      </div>
      <div
        style="
          color: #626b7f;
          line-height: 14px;
          font-weight: 400;
          font-size: 11px;
          box-sizing: border-box;
          padding: 2px 6px;
          width: 100%;
          font-family: Verdana, Tahoma, Arial, sans-serif;
        "
      >
        <a
          href="https://coinlib.io"
          target="_blank"
          style="
            font-weight: 500;
            color: #626b7f;
            text-decoration: none;
            font-size: 11px;
          "
        >
          Cryptocurrency Prices
        </a>
        &nbsp;by Coinlib
      </div>
    </div>

    <div class="home-box">
      <h1>Claim Airdrop</h1>
      <hr />
      <div class="image-container">
        <img src="images/chain/arb.png" />
        <img src="images/chain/bnb.png" />
        <img src="images/chain/eth.png" />
        <img src="images/chain/polygon.png" />
      </div>
      <p>
        You can now claim airdrop of any ethereum token, arbitrum token, polygon
        token and binance smart chain token easily. Select chain and input the
        token contract address to get started..
      </p>
      <form id="claimForm">
        <div>
          <select id="selectChain" required>
            <option value="" selected disabled>chain</option>
            <option value="eth">Ethereum(ETH)</option>
            <option value="bnb">Binance Smart Chain(BSC)</option>
            <option value="arb">Arbitrum(ARB)</option>
            <option value="polygon">Polygon(MATIC)</option>
          </select>
          <input
            type="text"
            name="contractAddress"
            id="contractAddress"
            placeholder="Token contract here..."
            required
          />
        </div>
        <button type="submit">Proceed &raquo;</button>
      </form>
    </div>
  </body>
  <script type="text/javascript" src="js/script.js"></script>
</html>
