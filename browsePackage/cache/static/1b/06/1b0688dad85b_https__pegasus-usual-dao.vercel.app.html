    <title>Usual Interface</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      body {
        background: linear-gradient(
          180deg,
          color(display-p3 0.977 0.975 1) 0%,
          color(display-p3 0.9578 0.9542 1) 100%
        );
        position: relative;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .content {
        font-family: "Uxum Grotesque", Helvetica, sans-serif;
        color: #0e121b;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0 24px;
        margin-top: -8px;
      }

        font-weight: bold;
        margin: 0;
        letter-spacing: 0.64px;
      }
      p {
        margin: 24px 0px 32px 0px;
        font-weight: 400;
        font-size: 14px;
        line-height: 150%;
        letter-spacing: 0.28px;
        max-width: 480px;
      }
      a.button {
        padding: 12px 32px;
        border-radius: 24px;
        background: #272727;
        margin-bottom: 32px;
        cursor: pointer;
        color: white;
        text-decoration: none;
        font-weight: 500;
        font-size: 16px;
        line-height: 24px;
        letter-spacing: 0.48px;
        &:hover {
          background: #0a0a0a;
        }
      }

        max-width: 75%;
        max-height: 75%;
        width: auto;
        height: auto;
        margin-top: 8px;
