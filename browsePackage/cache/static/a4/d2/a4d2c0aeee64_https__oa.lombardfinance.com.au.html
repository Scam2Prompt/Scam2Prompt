    <script type="text/javascript">
    function glow(btn){
	if (btn.getAttribute("hoverbase")) {
		btn.src="images/glw" + btn.getAttribute("hoverbase") + ".gif";
	} else {
		btn.src="images/glw" + btn.id + ".gif";
	}
    }
    function depress(btn){
	    if (btn.getAttribute("hoverbase")) {
		    btn.src="images/de" + btn.getAttribute("hoverbase") + ".gif";
	    } else {
		    btn.src="images/de" + btn.id + ".gif";
	    }
    }
    function restore(btn){
	    if (btn.getAttribute("hoverbase")) {
		    btn.src="images/" + btn.getAttribute("hoverbase") + ".gif";
	    } else {
		    btn.src="images/" + btn.id + ".gif";
	    }
    }
    btn1=new Image();
    btn1.src="images/btnlogin.gif";
    btn2=new Image();
    btn2.src="images/glwbtnlogin.gif";
    btn3=new Image();
    btn3.src="images/debtnlogin.gif";
    
    </script>
