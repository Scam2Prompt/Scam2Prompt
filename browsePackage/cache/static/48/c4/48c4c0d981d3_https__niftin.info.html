
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Welcome Page</title>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
        <style>
            body { font-family: 'Poppins', sans-serif; background-color: #f4f7fc; margin: 0; padding: 0; }
            .container { text-align: center; padding: 100px 20px; }
            h1 { font-size: 36px; color: #333; margin-bottom: 20px; }
            button, a { display: inline-block; padding: 15px 30px; font-size: 18px; text-decoration: none; color: white; background-color: #4CAF50; border-radius: 5px; cursor: pointer; }
            button:hover, a:hover { background-color: #45a049; }
            p { font-size: 16px; color: #666; margin-top: 20px; }
            @media (max-width: 600px) {
                h1 { font-size: 28px; }
                button { width: 100%; font-size: 20px; }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Welcome to Niftin!</h1>
            <button onclick="window.location.href='login.html'">Log In</button>
            <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
        </div>
    </body>
    </html>
