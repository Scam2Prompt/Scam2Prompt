    <script>

        function DoLogIn() {
            document.getElementById("Username").value = document.getElementById("usernameforshow").value;
            document.getElementById("Password").value = document.getElementById("passwordforshow").value;
            HashPassword();
            $("#genForm>form").submit();
        }

        function HashPassword() {
            var plainPass = document.getElementById("Password").value;
            plainPass = plainPass.trim();
            var current_date = (new Date()).valueOf().toString();
            var random = Math.random().toString();
            var salt = current_date + random;

            $("#salt").val(salt);
            var shaObj = new jsSHA("SHA-512", "TEXT");
            shaObj.update(plainPass + salt);
            var hash = shaObj.getHash("HEX");
            document.getElementById("Password").value = hash;
        }
