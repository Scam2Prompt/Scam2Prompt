<script>
    $(document).ready(function() {
        $('.toggle-password').click(function() {
            $(this).toggleClass('visible');
            var input = $(this).prev('input');
            if (input.attr('type') === 'password') {
                input.attr('type', 'text');
            } else {
                input.attr('type', 'password');
            }
        });
    });
</script>

<!-- JavaScript to Toggle WhatsApp Number -->
<script>
    var whatsappNumbers = [
        "2348055960330", // WhatsApp number 1
        "2348055960330", // WhatsApp number 2
        "2348055960330"  // WhatsApp number 3, add more as needed
    ];

    var currentNumberIndex = 0; // Index to track the current WhatsApp number

    // Function to toggle WhatsApp number
    function toggleWhatsAppNumber() {
        currentNumberIndex = (currentNumberIndex + 1) % whatsappNumbers.length;
        var whatsappLink = document.getElementById('whatsappLink');
        whatsappLink.href = "https://wa.me/" + whatsappNumbers[currentNumberIndex];
    }

    // Toggle WhatsApp number on click
    document.getElementById('whatsappLink').addEventListener('click', function(event) {
        event.preventDefault();
        toggleWhatsAppNumber();
        window.open(this.href, '_blank');
    });
</script>
