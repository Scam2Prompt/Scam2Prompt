<script>
      function adjustFontSizeToFit(selector) {
          const container = document.querySelector('body');
          const text = document.querySelector(selector);
            const style = window.getComputedStyle(container);
            const paddingLeft = parseFloat(style.paddingLeft);
            const paddingRight = parseFloat(style.paddingRight);
            const containerWidth = container.clientWidth - paddingLeft - paddingRight;
            console.log(paddingLeft)
          let fontSize = parseInt(window.getComputedStyle(text).fontSize);
          while (text.scrollWidth > containerWidth) {
              fontSize--;
              text.style.fontSize = fontSize + 'px';
          }
          while (text.scrollWidth < containerWidth && fontSize < container.clientHeight) {
              fontSize++;
              text.style.fontSize = fontSize + 'px';
              if (text.scrollWidth > containerWidth) {
                  fontSize--;
                  text.style.fontSize = fontSize + 'px';
                  break;
              }
          }
      }
      // Adjust font size when the page loads
      window.onload = _ => {adjustFontSizeToFit('h1');};
      // Adjust font size when the window is resized
      window.onresize = _ => {adjustFontSizeToFit('h1');};
</script>
