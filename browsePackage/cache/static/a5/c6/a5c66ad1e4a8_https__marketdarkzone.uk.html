    <style>
        html, body {
            height: 100%;
            margin: 0;
            background: radial-gradient(ellipse at bottom, #111424 0%, #111424 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #00bfff; /* Neon blue color */
            font-family: "Courier New", Courier, monospace;
            position: relative;
        }

        .loader-container {
            text-align: center;
            animation: fadein 2s ease-in-out;
            position: relative;
            z-index: 1;
        }

        .pulse {
            width: 20px;
            height: 20px;
            background-color: #00bfff;
            border-radius: 50%;
            position: relative;
            margin: 0 auto 20px;
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        .glow-text {
            font-size: 1.5em;
            text-shadow: 0 0 10px #00bfff, 0 0 20px #00bfff, 0 0 30px #00bfff, 0 0 40px #00bfff, 0 0 50px #00bfff;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 5px #00bfff, 0 0 10px #00bfff, 0 0 15px #00bfff, 0 0 20px #00bfff, 0 0 25px #00bfff;
            }
            to {
                text-shadow: 0 0 10px #00bfff, 0 0 20px #00bfff, 0 0 30px #00bfff, 0 0 40px #00bfff, 0 0 50px #00bfff;
            }
        }

        .hacker-text {
            font-size: 1.5em;
            animation: typing 3.5s steps(40, end), blink-caret 0.75s step-end infinite;
            white-space: nowrap;
            overflow: hidden;
            border-right: 2px solid #00bfff;
            display: inline-block;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent; }
            50% { border-color: #00bfff; }
        }

        .ddos-text {
            font-size: 1em;
            color: #00bfff;
            position: absolute;
            bottom: 10px; /* Adjust as needed */
            width: 100%;
            text-align: center;
            animation: fadein 2s ease-in-out;
        }

        @keyframes fadein {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Falling Stars Animation */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: rotate(-45deg);
            z-index: 0;
        }

        .star {
            --star-color: #00bfff;
            --star-tail-length: 6em;
            --star-tail-height: 2px;
            --star-width: calc(var(--star-tail-length) / 6);
            --fall-duration: 9s; /* Set the fall duration */
            --fall-delay: 0s; /* Ensure no delay */

            position: absolute;
            top: var(--top-offset);
            left: 0;
            width: var(--star-tail-length);
            height: var(--star-tail-height);
            background: linear-gradient(45deg, currentColor, transparent);
            color: var(--star-color);
            border-radius: 50%;
            filter: drop-shadow(0 0 6px currentColor);
            transform: translate3d(104em, 0, 0);
            animation: fall var(--fall-duration) var(--fall-delay) linear infinite, tail-fade var(--fall-duration) var(--fall-delay) ease-out infinite;
        }

        @keyframes fall {
            to {
                transform: translate3d(-30em, 0, 0);
            }
        }

        @keyframes tail-fade {
            0%, 50% {
                width: var(--star-tail-length);
                opacity: 1;
            }
            70%, 80% {
                width: 0;
                opacity: 0.4;
            }
            100% {
                width: 0;
                opacity: 0;
            }
        }

        @keyframes blink {
            50% {
                opacity: 0.6;
            }
        }

        /* Multiple stars with varying positions and animations */
        .star:nth-child(1) { --star-tail-length: 5em; --fall-duration: 8s; --top-offset: 10vh; }
        .star:nth-child(2) { --star-tail-length: 7em; --fall-duration: 10s; --top-offset: 20vh; }
        .star:nth-child(3) { --star-tail-length: 6em; --fall-duration: 9s; --top-offset: 30vh; }
        .star:nth-child(4) { --star-tail-length: 8em; --fall-duration: 11s; --top-offset: 40vh; }
        .star:nth-child(5) { --star-tail-length: 4em; --fall-duration: 7s; --top-offset: 50vh; }
        .star:nth-child(6) { --star-tail-length: 9em; --fall-duration: 12s; --top-offset: 60vh; }
        .star:nth-child(7) { --star-tail-length: 5em; --fall-duration: 8s; --top-offset: 70vh; }
        .star:nth-child(8) { --star-tail-length: 7em; --fall-duration: 10s; --top-offset: 80vh; }
        .star:nth-child(9) { --star-tail-length: 6em; --fall-duration: 9s; --top-offset: 90vh; }
        .star:nth-child(10) { --star-tail-length: 8em; --fall-duration: 11s; --top-offset: 100vh; }
    </style>
