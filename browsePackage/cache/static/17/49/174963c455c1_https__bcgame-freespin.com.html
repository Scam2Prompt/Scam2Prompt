<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>download</title>
    <style>
      html,body {
        width: 100%;
        height: 100%;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
      }
      .loader {
        width: 36px;
        height: 36px;
        border: 5px solid;
        border-color: #71eb93 transparent;
        border-radius: 50%;
        display: inline-block;
        box-sizing: border-box;
        animation: rotation 1s linear infinite;
      }

      @keyframes rotation {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <span class="loader"></span>
    <script>
      (function () {
        var hostname = window.location.hostname;
        var template = '/en/get-freespin/';
        if(hostname.indexOf('bcgame-freespin') > -1) {
          template = '/en/get-freespin/';
        } else if(hostname.indexOf('bcbonus0') > -1) {
          template = '/en/claim-bonus/';
        } else if(hostname.indexOf('bcbonus1') > -1) {
          template = '/en/get-freespin/';
        }
        // 带上所有的参数，重定向到新页面
        var url = window.location.href;
        var params = url.split('?')[1];
        var newUrl = template;
        if(params) {
          newUrl = newUrl + '?' + params;
        }

        // console.log(newUrl);
        window.location.href = newUrl;
      })();
    </script>
  </body>
</html>
