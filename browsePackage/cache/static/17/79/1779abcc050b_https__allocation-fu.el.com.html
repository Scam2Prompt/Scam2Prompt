<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 0.5em;
            color: #d9534f;
        }
        p {
            font-size: 1.2em;
            margin-bottom: 1.5em;
        }
    </style>
    <script>
        // Redirect to homepage after 2 seconds
        setTimeout(function() {
            window.location.href = "/";
        }, 2000);
    </script>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>Oops! The page you’re looking for doesn’t exist. Redirecting you to the EL.com homepage...</p>
    </div>
</body>
</html>
