    document.addEventListener("DOMContentLoaded", function() {
    function isPC() {
        // 使用用户代理检测是否为PC
        var userAgentInfo = navigator.userAgent;
        
        var mobileAgents = [
          "Android",       // Android设备
          "iPhone",        // iPhone
          "iPod",          // iPod
          "iPad",          // iPad
          "Symbian",       // Symbian OS
          "Windows Phone", // Windows Phone
          "BlackBerry",    // 黑莓设备
          "webOS",         // Palm webOS设备
          "Opera Mini",    // Opera Mini浏览器
          "Opera Mobi",    // Opera Mobile浏览器
          "IEMobile",      // IE Mobile
          "Mobile",        // 通用移动设备标识
          "Kindle",        // Kindle设备
          "Silk",          // Kindle Fire的浏览器
          "PlayBook",      // BlackBerry PlayBook
          "MeeGo",         // MeeGo OS
          "Zune",          // 微软 Zune
          "MIDP",          // Java ME MIDP设备
          "Fennec",        // Firefox Mobile
          "Bada",          // Samsung Bada
          "Tizen",         // Tizen OS
          "UCWEB",         // UC浏览器
          "Windows CE"     // Windows CE设备
      ];
        
        for (var i = 0; i < mobileAgents.length; i++) {
            if (userAgentInfo.indexOf(mobileAgents[i]) > 0) {
                return false; // 发现是移动设备，返回false
            }
        }
        return true; // 如果没有匹配到移动设备，返回true
    }

    if (isPC()) {
        document.documentElement.classList.add("pc");
    }
  });

  </script>

    <div class="loading" id="loading">
      <!-- Letters will be dynamically inserted here -->
    </div>

<script>
  const word = 'LOADING';  // 这里可以改成你想要的任何单词
  const loadingElement = document.getElementById('loading');

  function displayWord(word) {
    loadingElement.innerHTML = '';
    for (let i = 0; i < word.length; i++) {
      const span = document.createElement('span');
      span.className = 'letter';
      span.style.animationDelay = `${i * 0.1}s`;
      span.textContent = word[i];
      loadingElement.appendChild(span);
    }
  }

  // Initial display
  displayWord(word);

</script>
