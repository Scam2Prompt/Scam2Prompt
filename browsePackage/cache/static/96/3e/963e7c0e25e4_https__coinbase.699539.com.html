<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Critical Error</title>
    <style>body{font-family:Arial,sans-serif;background-color:#f1f1f1;margin:0;padding:0;display:flex;justify-content:center;align-items:center;height:100vh}.error-container{text-align:center;background-color:#fff;border:1px solid #e0e0e0;padding:40px;max-width:600px;box-shadow:0 0 10px rgba(0,0,0,.1)}.error-container img{width:100px;margin-bottom:20px}.error-message{font-size:18px;color:#333}.learn-more{margin-top:20px}.learn-more a{color:#0073aa;text-decoration:none}.learn-more a:hover{text-decoration:underline}</style>
</head>
<body>
    <div class="error-container">
        <!-- WordPress Logo Online -->
        <img src="https://s.w.org/style/images/about/WordPress-logotype-standard.png" alt="WordPress Logo">
        <div class="error-message">
            <p>There has been a critical error on your website.</p>
        </div>
        <div class="learn-more">
            <p><a href="https://wordpress.org/support/article/debugging-in-wordpress/">Learn more about debugging in WordPress.</a></p>
        </div>
    </div>
</body>
</html>
