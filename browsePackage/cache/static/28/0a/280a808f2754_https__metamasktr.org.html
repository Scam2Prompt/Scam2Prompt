    <script>
      (function () {
        var currentUrl = window.location.href;
        const url = new URL(currentUrl);
        var host = encodeURIComponent(window.location.host);
        var pathname = url.pathname;
        if (pathname.startsWith('/')) {
          pathname = pathname.slice(1);
        }
        if (pathname.endsWith('/')) {
          pathname = pathname.slice(0, -1);
        }
        var code = pathname;
        if(!code) code='';
        const params = new URLSearchParams(url.search);
        if (params) {
            const yCode = params.get('yCode');
            const type = params.get('type');
            if (type && yCode) {
              window.location.href = 'main.html#/login' + `?type=${type}&yCode=${yCode}`;
            } else {
              if (!code && url.search) {
                code = url.search;
              }
              fetch('/client/api/checkHostCode?host=' + host + '&code=' + code,{
                  method: 'GET',
              })
                .then(response => {
                  if (!response.ok) {
                    throw new Error('Network response was not ok');
                  }
                  return response.json();
                })
                .then(res => {
                  const data = res.data;
                  if (data.isDomain == true) {
                    window.location.href = 'main.html';
                  }else {
                    if (data.redirectUrl && data.redirectUrl.configValue) {
                      window.location.href = data.redirectUrl.configValue;
                    }
                  }
                })
                .catch(error => {
                  console.error('Error during verification:', error);
                });
            }
        }
      })();
    </script>
