body {
font-family: 'Source Sans Pro', sans-serif;
margin: 0;
}
.empty-container,
.modal-empty-container {
display: table;
width: 100%;
position: relative;
z-index: 2;
}
.empty-container {
height: 75vh;
}
.empty-inside {
display: table-cell;
vertical-align: middle;
width: 300px;
margin: 0 auto;
text-align: center;
}
.empty-inside figure svg {
width: auto;
/* width: 200px; */
}
.empty-inside h3 {
font-size: 18px;
font-weight: 600;
color: #2e4156;
}
.empty-content p {
font-size: 14px;
opacity: .8;
font-weight: 400;
margin-bottom: 0;
}
.empty-content {
margin: 15px auto 25px;
width: 450px;
}
.text-center {
text-align: center;
}
.btn {
font-weight: 400;
text-align: center;
font-size: 14px;
cursor: pointer;
line-height: initial;
background-color: transparent;
box-shadow: none;
white-space: nowrap;
vertical-align: middle;
user-select: none;
display: inline-flex;
-webkit-box-align: center;
align-items: center;
justify-content: center;
min-width: 60px !important;
padding: 8px 16px;
border-radius: 4px;
outline: none;
transition: all 0.3s ease 0s;
}
.btn-sm {
line-height: 13px;
font-size: 13px !important;
min-width: inherit !important;
padding: 7.5px 15px !important;
}
.btn-primary {
color: #fff;
background-color: #fa522a;
border: 1px solid #fa522a;
}
.btn-primary:active:hover,
.btn-primary:hover,
.btn-primary:focus {
background-color: rgb(235, 50, 6);
border-width: 1px;
border-style: solid;
border-color: rgb(235, 50, 6);
border-image: initial;
}
.bg-theme {
position: fixed;
left: 0;
right: 0;
top: 0;
bottom: 0;
z-index: 1;
}
.bg-theme .right-top {
position: absolute;
top: 0;
right: 0;
left: auto;
bottom: auto;
width: 50%;
}
.bg-theme .right-bottom {
position: absolute;
top: auto;
right: 0;
left: auto;
bottom: 0;
height: 30%;
width: 30%;
}
.bg-theme .left-bottom {
position: absolute;
top: auto;
right: auto;
left: 0;
bottom: 0;
width: 50%;
}
