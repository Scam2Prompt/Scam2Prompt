    <script>
      function beginTransition() {
        var bg2 = document.getElementById("bg2");
        bg2.style.opacity = 1;
      }

      function particlesInit() {
        var generator = document.getElementById("particleGenerator");
        var particleCount = 200;
        for (var i = 0; i < particleCount; i++) {
          var size = getRandomInt(2, 6);
          var n =
            '<div class="particle" style="top:' +
            getRandomInt(15, 95) +
            "%; left:" +
            getRandomInt(5, 95) +
            "%; width:" +
            size +
            "px; height:" +
            size +
            "px; animation-delay:" +
            getRandomInt(0, 30) / 10 +
            "s; background-color:rgba(" +
            getRandomInt(80, 160) +
            "," +
            getRandomInt(185, 255) +
            "," +
            getRandomInt(160, 255) +
            "," +
            getRandomInt(2, 8) / 10 +
            ');"></div>';
          var node = document.createElement("div");
          node.innerHTML = n;
          generator.appendChild(node.firstChild);
        }
      }

      function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min)) + min;
      }

      window.onload = function () {
        particlesInit();
      };
    </script>
